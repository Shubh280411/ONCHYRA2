<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONCHYRA — Test</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
<style>
:root { --primary:#a78bfa; --secondary:#60a5fa; --bg:#03040a; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.1); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:white; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.card { background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:32px; padding:48px 32px; max-width:420px; width:100%; text-align:center; }
h1 { font-family:'Space Grotesk'; font-weight:900; font-size:24px; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:12px; }
p { font-size:13px; color:rgba(255,255,255,0.5); line-height:1.6; }
</style>
</head>
<body>
<div class="card">
  <h1>ONCHYRA</h1>
  <p>Test page working</p>
</div>
</body>
</html>
