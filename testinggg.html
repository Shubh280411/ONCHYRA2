<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Transfer | ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a78bfa; --secondary: #60a5fa; --bg: #03040a; --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.1); }
        * { margin:0; padding:0; box-sizing:border-box; outline:none; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:white; min-height:100vh; overflow-x:hidden; display:flex; flex-direction:column; align-items:center; padding:20px; }

        #loader { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; gap:15px; }
        .spinner { width:45px; height:45px; border:3px solid rgba(167,139,250,0.1); border-top:3px solid var(--primary); border-radius:50%; animation:spin 1s linear infinite; }
        #loadingText { font-size:10px; letter-spacing:2px; color:var(--primary); font-weight:800; text-transform:uppercase; animation:pulse 1.5s infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        .phone-frame {
            position:relative; width:100%; max-width:400px;
            display:flex; flex-direction:column; gap:18px; padding-top:12px;
        }

        /* ── Header ── */
        .header {
            display:flex; align-items:center; gap:14px;
            background:var(--card); border:1px solid var(--border);
            border-radius:22px; padding:14px 18px;
            backdrop-filter:blur(25px);
        }
        .header .logo {
            font-family:'Space Grotesk'; font-weight:900; font-size:18px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .header .spacer { flex:1; }
        .header .back-btn {
            width:36px; height:36px; display:flex; align-items:center; justify-content:center;
            background:rgba(255,255,255,0.04); border:1px solid var(--border);
            border-radius:12px; cursor:pointer; color:white; font-size:18px;
            text-decoration:none; transition:0.2s;
        }
        .header .back-btn:hover { background:rgba(255,255,255,0.08); }

        /* ── Top Label ── */
        .top-label {
            display:flex; align-items:center; gap:10px; margin-bottom:4px;
        }
        .top-label .badge {
            font-size:9px; font-weight:800; letter-spacing:2px; text-transform:uppercase;
            color:var(--primary); background:rgba(167,139,250,0.1);
            border:1px solid rgba(167,139,250,0.2); padding:4px 12px;
            border-radius:100px; display:inline-flex; align-items:center; gap:6px;
        }
        .top-label .badge .dot {
            width:5px; height:5px; border-radius:50%; background:var(--primary);
            box-shadow:0 0 8px var(--primary); animation:pulse 1.5s infinite;
        }
        .top-label .fire {
            font-size:20px; margin-left:auto;
            filter:drop-shadow(0 0 10px rgba(251,191,36,0.4));
            animation:fire-glow 2s infinite;
        }
        @keyframes fire-glow {
            0%,100% { filter:drop-shadow(0 0 6px rgba(251,191,36,0.4)) drop-shadow(0 0 12px rgba(251,191,36,0.2)); }
            50% { filter:drop-shadow(0 0 10px rgba(251,191,36,0.7)) drop-shadow(0 0 20px rgba(251,191,36,0.4)); }
        }

        .main-heading {
            font-family:'Space Grotesk'; font-size:32px; font-weight:800;
            letter-spacing:-0.5px; line-height:1.1; margin-bottom:4px;
        }

        /* ── Balance Pill ── */
        .balance-pill {
            display:inline-flex; align-items:center; gap:8px;
            background:rgba(167,139,250,0.08); border:1px solid rgba(167,139,250,0.15);
            border-radius:100px; padding:8px 18px; font-size:13px; font-weight:600;
            margin-top:4px; width:fit-content;
        }
        .balance-pill .num {
            font-family:'Space Grotesk'; font-weight:800;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            font-size:16px;
        }

        /* ── Transfer Card ── */
        .transfer-card {
            background:var(--card); border:1px solid var(--border);
            border-radius:28px; padding:26px 22px;
            position:relative; overflow:hidden;
            backdrop-filter:blur(25px);
        }
        .transfer-card::before {
            content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%;
            background:radial-gradient(circle at 30% 20%,rgba(167,139,250,0.03) 0%,transparent 60%);
            pointer-events:none;
        }
        .transfer-card::after {
            content:''; position:absolute; top:0; left:15%; width:70%; height:1px;
            background:linear-gradient(90deg,transparent,rgba(167,139,250,0.2),rgba(96,165,250,0.3),transparent);
        }

        .input-group { margin-bottom:20px; }
        .input-group:last-of-type { margin-bottom:0; }

        .input-label {
            font-size:9px; font-weight:800; letter-spacing:1.8px;
            text-transform:uppercase; color:rgba(255,255,255,0.5);
            margin-bottom:8px; display:flex; align-items:center; gap:8px;
        }
        .input-label .bar {
            width:16px; height:2px; background:var(--primary);
            border-radius:2px; box-shadow:0 0 8px rgba(167,139,250,0.3);
        }

        .input-field {
            width:100%; background:rgba(255,255,255,0.03);
            border:1px solid rgba(255,255,255,0.07);
            border-radius:16px; padding:16px 18px;
            font-family:'Inter',sans-serif; font-size:16px;
            color:white; outline:none;
            transition:0.25s ease; letter-spacing:0.3px;
        }
        .input-field::placeholder { color:rgba(255,255,255,0.2); font-weight:400; font-size:14px; }
        .input-field:focus {
            border-color:rgba(167,139,250,0.3);
            box-shadow:0 0 0 1px rgba(167,139,250,0.1), 0 0 30px rgba(167,139,250,0.05);
            background:rgba(255,255,255,0.06);
        }

        /* ── Breakdown Box ── */
        .breakdown {
            margin-top:20px;
            background:rgba(255,255,255,0.02);
            border:1px solid rgba(255,255,255,0.05);
            border-radius:18px; padding:16px 18px;
        }
        .breakdown-row {
            display:flex; justify-content:space-between; align-items:center;
            padding:6px 0; font-size:13px;
        }
        .breakdown-row .label { color:rgba(255,255,255,0.45); font-weight:500; }
        .breakdown-row .value { font-weight:700; }
        .breakdown-row .value.blue { color:var(--secondary); }
        .breakdown-row .value.pink { color:#f472b6; }
        .breakdown-row .value.green { color:#22c55e; }
        .breakdown-divider {
            height:1px; background:rgba(255,255,255,0.04); margin:8px 0;
        }
        .breakdown-row.total .label { font-weight:700; color:rgba(255,255,255,0.8); }
        .breakdown-row.total .value { font-family:'Space Grotesk'; font-size:18px; font-weight:800; color:white; }
        .breakdown-row .burn-highlight {
            background:rgba(244,114,182,0.1); padding:2px 10px; border-radius:6px;
            border:1px solid rgba(244,114,182,0.15);
        }

        /* ── Send Button ── */
        .send-btn {
            margin-top:24px; width:100%; padding:20px;
            border:none; border-radius:20px;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            color:#000; font-family:'Space Grotesk'; font-size:15px; font-weight:800;
            letter-spacing:1.5px; text-transform:uppercase;
            cursor:pointer; position:relative; overflow:hidden;
            box-shadow:0 4px 30px rgba(167,139,250,0.25);
            transition:all 0.3s ease;
        }
        .send-btn::before {
            content:''; position:absolute; inset:0;
            background:linear-gradient(135deg,var(--secondary),var(--primary));
            opacity:0; transition:opacity 0.4s ease;
        }
        .send-btn:hover::before { opacity:1; }
        .send-btn:hover {
            box-shadow:0 6px 40px rgba(167,139,250,0.4);
            transform:translateY(-1px);
        }
        .send-btn:active { transform:translateY(0); }
        .send-btn span { position:relative; z-index:1; display:flex; align-items:center; justify-content:center; gap:10px; }
        .send-btn .arrow { font-size:18px; transition:transform 0.3s; }
        .send-btn:hover .arrow { transform:translateX(4px); }
        .send-btn:disabled {
            background:#1a1a1a; color:#444; cursor:not-allowed; box-shadow:none; transform:none;
        }
        .send-btn:disabled::before { display:none; }
        .send-btn:disabled .arrow { transform:none; }

        /* ── Bottom Links ── */
        .bottom-links {
            display:flex; align-items:center; justify-content:center; gap:20px;
            font-size:11px; font-weight:600; color:rgba(255,255,255,0.25);
            padding:12px 0 20px;
        }
        .bottom-links a {
            color:rgba(255,255,255,0.4); text-decoration:none; transition:0.2s;
        }
        .bottom-links a:hover { color:var(--primary); }
        .bottom-links .sep { width:3px; height:3px; border-radius:50%; background:rgba(255,255,255,0.15); }

        /* ── Toast ── */
        #toast {
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px);
            background:#0b0d18; border:1px solid var(--border);
            padding:14px 24px; border-radius:16px;
            font-size:12px; font-weight:600; color:white;
            box-shadow:0 8px 40px rgba(0,0,0,0.6);
            opacity:0; transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
            z-index:100; pointer-events:none; white-space:nowrap;
            backdrop-filter:blur(12px);
        }
        #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
        #toast.error { border-color:rgba(239,68,68,0.3); color:#f87171; }
        #toast.success { border-color:rgba(34,197,94,0.3); color:#4ade80; }

        @media (max-width:420px) {
            .phone-frame { padding:0 4px; }
            .transfer-card { padding:20px 16px; }
            .main-heading { font-size:28px; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loadingText">Securing Channel...</div>
</div>

<div class="phone-frame">

    <!-- Header -->
    <div class="header">
        <a href="dashboard.html" class="back-btn">←</a>
        <div class="logo">ONCHYRA</div>
        <div class="spacer"></div>
        <div style="font-size:9px;font-weight:800;color:rgba(255,255,255,0.25);letter-spacing:1px;">P2P</div>
    </div>

    <!-- Top Label + Heading -->
    <div class="top-label">
        <div class="badge"><span class="dot"></span> P2P TRANSFER</div>
        <div class="fire">🔥</div>
    </div>
    <div class="main-heading">Send ONC</div>
    <div class="balance-pill">
        Balance <span class="num" id="balanceDisplay">0.00</span> ONC
    </div>

    <!-- Transfer Card -->
    <div class="transfer-card">

        <!-- Recipient -->
        <div class="input-group">
            <div class="input-label"><span class="bar"></span> Recipient Network ID</div>
            <input class="input-field" id="recipientInput" type="text" placeholder="Enter referral code" maxlength="12" autocomplete="off" spellcheck="false">
        </div>

        <!-- Amount -->
        <div class="input-group">
            <div class="input-label"><span class="bar"></span> Amount</div>
            <input class="input-field" id="amountInput" type="text" inputmode="decimal" placeholder="Minimum 1 ONC" autocomplete="off">
        </div>

        <!-- Breakdown -->
        <div class="breakdown" id="breakdownBox">
            <div class="breakdown-row">
                <span class="label">Total Amount</span>
                <span class="value blue" id="totalDisplay">0.00 ONC</span>
            </div>
            <div class="breakdown-row">
                <span class="label">🔥 10% Network Burn</span>
                <span class="value pink" id="burnDisplay">0.00 ONC</span>
            </div>
            <div class="breakdown-divider"></div>
            <div class="breakdown-row total">
                <span class="label">Receivable Amount</span>
                <span class="value green" id="receiveDisplay">0.00 ONC</span>
            </div>
        </div>

        <!-- Hidden: user UID & recipient UID -->
        <div style="display:none;" id="senderUid"></div>
        <div style="display:none;" id="recipientUid"></div>

        <!-- Send Button -->
        <button class="send-btn" id="sendBtn" disabled>
            <span>
                Send ONC
                <span class="arrow">→</span>
            </span>
        </button>
        <div style="text-align:center;margin-top:10px;font-size:10px;color:rgba(255,255,255,0.2);" id="statusText"></div>

    </div>

    <!-- Bottom -->
    <div class="bottom-links">
        <a href="dashboard.html">Dashboard</a>
        <span class="sep"></span>
        <a href="#" id="maxLink">Max</a>
        <span class="sep"></span>
        <a href="#" id="clearLink">Clear</a>
        <span class="sep"></span>
        <a href="#" id="historyLink">History</a>
    </div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
    doc, getDoc, updateDoc, collection, addDoc,
    query, where, getDocs, orderBy, limit as fsLimit,
    increment, serverTimestamp,
    initializeFirestore
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
    authDomain: "onchyra.firebaseapp.com",
    projectId: "onchyra",
    storageBucket: "onchyra.firebasestorage.app",
    messagingSenderId: "441822770982",
    appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = initializeFirestore(app, {
    experimentalAutoDetectLongPolling: true,
    useFetchStreams: false
});

// ── DOM refs ──
const recipientInput = document.getElementById('recipientInput');
const amountInput = document.getElementById('amountInput');
const balanceDisplay = document.getElementById('balanceDisplay');
const totalDisplay = document.getElementById('totalDisplay');
const burnDisplay = document.getElementById('burnDisplay');
const receiveDisplay = document.getElementById('receiveDisplay');
const sendBtn = document.getElementById('sendBtn');
const toast = document.getElementById('toast');
const statusText = document.getElementById('statusText');
const senderUidEl = document.getElementById('senderUid');
const recipientUidEl = document.getElementById('recipientUid');
const breakdownBox = document.getElementById('breakdownBox');

let uid = null;
let userBalance = 0;
let recipientId = null;

// ── Toast ──
let toastTimer;
function showToast(msg, type) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.className = 'toast ' + (type || '') + ' show';
    toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── Format helpers ──
function parseAmount(val) {
    const cleaned = val.replace(/[^0-9.]/g, '');
    const num = parseFloat(cleaned);
    return isNaN(num) ? 0 : num;
}

// ── Update breakdown ──
function updateBreakdown() {
    const amt = parseAmount(amountInput.value);
    const burn = amt * 0.1;
    const receive = amt - burn;
    totalDisplay.textContent = amt.toFixed(2) + ' ONC';
    burnDisplay.textContent = burn.toFixed(2) + ' ONC';
    receiveDisplay.textContent = receive.toFixed(2) + ' ONC';
}
amountInput.addEventListener('input', updateBreakdown);

// ── Lookup recipient ──
let lookupTimeout = null;
recipientInput.addEventListener('input', () => {
    clearTimeout(lookupTimeout);
    recipientId = null;
    recipientUidEl.textContent = '';
    const val = recipientInput.value.trim().toUpperCase();
    if (val.length < 3) {
        statusText.textContent = '';
        return;
    }
    statusText.textContent = '🔍 Looking up...';
    lookupTimeout = setTimeout(() => lookupRecipient(val), 500);
});

async function lookupRecipient(code) {
    try {
        const q = query(collection(db, "users"), where("referralCode", "==", code));
        const snap = await getDocs(q);
        if (snap.empty) {
            statusText.textContent = '❌ Network ID not found';
            recipientId = null;
            recipientUidEl.textContent = '';
            return;
        }
        const rData = snap.docs[0];
        if (rData.id === uid) {
            statusText.textContent = '❌ Cannot send to yourself';
            recipientId = null;
            recipientUidEl.textContent = '';
            return;
        }
        recipientId = rData.id;
        recipientUidEl.textContent = recipientId;
        const name = rData.data().name || rData.data().referralCode || 'User';
        statusText.textContent = '✓ Sending to ' + name;
    } catch (e) {
        console.error('Lookup error:', e);
        statusText.textContent = '⚠ Error looking up ID';
    }
}

// ── Validate & enable button ──
function validateForm() {
    const amt = parseAmount(amountInput.value);
    const ok = uid && recipientId && amt >= 1 && amt <= userBalance;
    sendBtn.disabled = !ok;
}
[recipientInput, amountInput].forEach(el => el.addEventListener('input', validateForm));

// ── Max / Clear ──
document.getElementById('maxLink').addEventListener('click', (e) => {
    e.preventDefault();
    if (userBalance < 1) { showToast('Insufficient balance', 'error'); return; }
    amountInput.value = userBalance.toFixed(2);
    updateBreakdown();
    validateForm();
});
document.getElementById('clearLink').addEventListener('click', (e) => {
    e.preventDefault();
    amountInput.value = '';
    updateBreakdown();
    validateForm();
});
document.getElementById('historyLink').addEventListener('click', (e) => {
    e.preventDefault();
    showToast('Coming soon', '');
});

// ── Send ──
sendBtn.addEventListener('click', async () => {
    if (sendBtn.disabled) return;
    const amt = parseAmount(amountInput.value);
    const burn = amt * 0.1;
    const receive = amt - burn;
    const recipientCode = recipientInput.value.trim().toUpperCase();

    if (!recipientId) {
        showToast('Recipient not found', 'error');
        return;
    }
    if (amt < 1) {
        showToast('Minimum transfer is 1 ONC', 'error');
        return;
    }
    if (amt > userBalance) {
        showToast('Insufficient balance', 'error');
        return;
    }

    sendBtn.disabled = true;
    sendBtn.innerHTML = '<span>Processing...</span>';

    try {
        // Step 1: Create transfer audit record
        const txRef = await addDoc(collection(db, "transfers"), {
            from: uid,
            to: recipientId,
            toCode: recipientCode,
            amount: amt,
            burn: burn,
            receive: receive,
            timestamp: serverTimestamp(),
            status: 'completed'
        });

        // Step 2: Deduct from sender
        await updateDoc(doc(db, "users", uid), {
            balance: increment(-amt)
        });

        // Step 3: Add to recipient (after 10% burn)
        await updateDoc(doc(db, "users", recipientId), {
            balance: increment(receive)
        });

        // Update local
        userBalance -= amt;
        balanceDisplay.textContent = userBalance.toFixed(2);
        showToast(`✅ Sent ${receive.toFixed(2)} ONC • Burned ${burn.toFixed(2)} ONC`, 'success');

        recipientInput.value = '';
        amountInput.value = '';
        recipientId = null;
        recipientUidEl.textContent = '';
        statusText.textContent = '';
        updateBreakdown();
        validateForm();
    } catch (e) {
        console.error('Transfer error:', e);
        showToast('Transfer failed: ' + e.message, 'error');
    }

    sendBtn.innerHTML = '<span>Send ONC <span class="arrow">→</span></span>';
    sendBtn.disabled = false;
    validateForm();
});

// ── Enter key ──
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !sendBtn.disabled) sendBtn.click();
});

// ── Auth ──
onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location = 'login.html'; return; }
    uid = user.uid;
    senderUidEl.textContent = uid;

    try {
        const snap = await getDoc(doc(db, "users", uid));
        if (snap.exists()) {
            if (snap.data().banned === true) {
                window.location = 'banned.html';
                return;
            }
            userBalance = snap.data().balance || 0;
            balanceDisplay.textContent = userBalance.toFixed(2);
        }
    } catch (e) {
        console.error('Error loading user:', e);
        showToast('Error loading profile', 'error');
    }

    document.getElementById('loader').style.display = 'none';
    validateForm();
});
</script>

</body>
</html>
