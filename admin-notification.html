<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONCHYRA — Admin Notifications</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
<style>
:root { --primary:#a78bfa; --secondary:#60a5fa; --bg:#03040a; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.1); --red:#ef4444; --green:#22c55e; --yellow:#eab308; }
* { box-sizing: border-box; }
body { margin:0; font-family:'Inter'; background:var(--bg); color:white; }
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 240px; background: rgba(10,12,25,0.95); border-right: 1px solid var(--border); padding: 20px 0; z-index: 100; }
.sidebar h2 { font-family:'Space Grotesk'; font-size: 22px; font-weight: 800; padding: 0 20px; margin: 0 0 30px; letter-spacing: -1px; }
.sidebar h2 span { color: var(--primary); }
.nav-item { padding: 12px 20px; cursor: pointer; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.5); transition: 0.2s; display: flex; align-items: center; gap: 10px; }
.nav-item:hover, .nav-item.active { color: white; background: rgba(255,255,255,0.05); }
.nav-item.active { border-right: 3px solid var(--primary); }
.main { margin-left: 240px; padding: 30px; min-height: 100vh; }
.page { display: none; }
.page.active { display: block; }
.page-title { font-family:'Space Grotesk'; font-size: 28px; font-weight: 800; margin: 0 0 25px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
.stat-card .label { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
.stat-card .value { font-family:'Space Grotesk'; font-size: 32px; font-weight: 800; margin-top: 5px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 20px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 12px 10px; color: rgba(255,255,255,0.5); border-bottom: 1px solid var(--border); }
td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); }
input, select, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); color: white; outline: none; margin-bottom: 15px;}
.btn-primary { background: linear-gradient(135deg,var(--primary),var(--secondary)); color: #000; padding: 12px 24px; border:none; border-radius:12px; font-weight:800; cursor:pointer; width: 100%; }
.btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border:none; padding: 6px 12px; border-radius:8px; cursor:pointer; }
.toast { position: fixed; bottom: 30px; right: 30px; background: var(--green); color: #000; padding: 14px 24px; border-radius: 12px; font-weight: 700; display: none; z-index: 3000; }
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed;inset:0;background:#03040a;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;">
  <div style="width:40px;height:40px;border:3px solid rgba(167,139,250,0.1);border-top:3px solid #a78bfa;border-radius:50%;animation:spin 1s linear infinite;"></div>
  <div style="font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;font-weight:700;">Verifying Admin Access...</div>
</div>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<nav class="sidebar">
  <h2>ONCHY<span>RA</span></h2>
  <div class="nav-item active" onclick="showPage('send')"><span>🚀 Send</span></div>
  <div class="nav-item" onclick="showPage('history')"><span>📜 History</span></div>
  <div class="nav-item" onclick="showPage('users')"><span>👥 Users</span></div>
</nav>

<div class="main">
  <div id="send" class="page active">
    <h1 class="page-title">Send Notification</h1>
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Total Sent</div><div class="value" id="statTotal" style="color:var(--primary)">0</div></div>
      <div class="stat-card"><div class="label">Total Users</div><div class="value" id="statUsers" style="color:var(--green)">0</div></div>
    </div>

    <div class="card">
      <label style="font-size:12px;color:rgba(255,255,255,0.5)">TARGET USER</label>
      <select id="notiTarget"><option value="all">🌐 All Users</option></select>
      
      <label style="font-size:12px;color:rgba(255,255,255,0.5)">TITLE</label>
      <input id="notiTitle" placeholder="Update Title...">
      
      <label style="font-size:12px;color:rgba(255,255,255,0.5)">MESSAGE</label>
      <textarea id="notiMsg" style="min-height:100px;" placeholder="Write your message here..."></textarea>
      
      <label style="font-size:12px;color:rgba(255,255,255,0.5)">REDIRECT LINK</label>
      <input id="notiLink" placeholder="e.g. index.html">

      <button class="btn-primary" onclick="sendNotification()">🚀 Broadcast Now</button>
    </div>
  </div>

  <div id="history" class="page">
    <h1 class="page-title">History</h1>
    <div class="card" style="padding:0; overflow:hidden;">
      <table>
        <thead><tr><th>Title</th><th>Target</th><th>Actions</th></tr></thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>

  <div id="users" class="page">
    <h1 class="page-title">Users List</h1>
    <div class="card" style="padding:0; overflow:hidden;">
      <table>
        <thead><tr><th>Name</th><th>Email</th><th>Balance</th></tr></thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, query, orderBy, onSnapshot, getDocs, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
  authDomain: "onchyra.firebaseapp.com",
  projectId: "onchyra"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location = "login.html"; return; }
  
  try {
    // 🔥 Screenshot ke mutabiq 'admins' collection check kar raha hai
    const adminSnap = await getDoc(doc(db, 'admins', user.uid));
    
    if (adminSnap.exists() && adminSnap.data().role === 'admin') {
      document.getElementById('loginScreen').style.display = 'none';
      loadStats();
      loadUsers();
      loadHistory();
    } else {
      document.getElementById('loginScreen').innerHTML = `
        <h2 style="color:red">Access Denied</h2>
        <p style="font-size:12px;opacity:0.5">UID: ${user.uid}</p>
        <p>Aapka account 'admins' collection mein nahi mila.</p>
      `;
    }
  } catch (e) {
    console.error(e);
  }
});

async function loadStats() {
  const nSnap = await getDocs(collection(db, 'notifications'));
  const uSnap = await getDocs(collection(db, 'users'));
  document.getElementById('statTotal').innerText = nSnap.size;
  document.getElementById('statUsers').innerText = uSnap.size;

  const targetSelect = document.getElementById('notiTarget');
  uSnap.forEach(d => {
    const data = d.data();
    targetSelect.innerHTML += `<option value="${d.id}">${data.name || data.email || d.id}</option>`;
  });
}

window.showPage = (page) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(page).classList.add('active');
};

window.sendNotification = async () => {
  const title = document.getElementById('notiTitle').value;
  const msg = document.getElementById('notiMsg').value;
  const target = document.getElementById('notiTarget').value;
  const link = document.getElementById('notiLink').value;

  if(!title || !msg) return alert('Title aur Message likho bhai!');

  try {
    await setDoc(doc(collection(db, 'notifications')), {
      userId: target,
      title: title,
      message: msg,
      link: link || '',
      createdAt: serverTimestamp(),
      read: false
    });
    alert('Bheji gayi! Notification Sent ✅');
    document.getElementById('notiTitle').value = '';
    document.getElementById('notiMsg').value = '';
  } catch(e) {
    alert('Error: ' + e.message);
  }
};

function loadHistory() {
  onSnapshot(query(collection(db, 'notifications'), orderBy('createdAt', 'desc'), limit(20)), (snap) => {
    let html = '';
    snap.forEach(d => {
      const n = d.data();
      html += `<tr>
        <td>${n.title}</td>
        <td>${n.userId === 'all' ? 'All' : 'Single'}</td>
        <td><button class="btn-danger" onclick="deleteNoti('${d.id}')">Delete</button></td>
      </tr>`;
    });
    document.getElementById('historyTable').innerHTML = html;
  });
}

window.deleteNoti = async (id) => {
  if(confirm('Pakka delete karna hai?')) await deleteDoc(doc(db, 'notifications', id));
};

async function loadUsers() {
  const uSnap = await getDocs(collection(db, 'users'));
  let html = '';
  uSnap.forEach(d => {
    const u = d.data();
    html += `<tr>
      <td>${u.name || 'N/A'}</td>
      <td>${u.email || 'N/A'}</td>
      <td>${u.balance || 0}</td>
    </tr>`;
  });
  document.getElementById('usersTable').innerHTML = html;
}
</script>
</body>
</html>
