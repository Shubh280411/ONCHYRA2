<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ONCHYRA — Popup Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root { --primary:#a78bfa; --secondary:#60a5fa; --bg:#03040a; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.1); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:white; padding:24px; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
.container { max-width:480px; width:100%; }
h1 { font-family:'Space Grotesk'; font-weight:900; font-size:24px; text-align:center; margin-bottom:24px; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:24px; margin-bottom:16px; }
label { display:block; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,0.3); margin-bottom:6px; }
.input, textarea { width:100%; padding:10px 14px; border-radius:10px; border:1px solid var(--border); background:rgba(0,0,0,0.3); color:white; font-family:'Inter',sans-serif; font-size:13px; outline:none; }
.input:focus, textarea:focus { border-color:var(--primary); }
textarea { resize:vertical; min-height:120px; font-family:'Courier New',monospace; font-size:12px; line-height:1.5; }
.btn { display:inline-flex; align-items:center; gap:6px; padding:10px 24px; border-radius:10px; border:none; font-weight:700; font-size:13px; cursor:pointer; transition:all .2s; }
.btn-primary { background:var(--primary); color:white; }
.btn-primary:hover { opacity:0.85; }
.btn-danger { background:rgba(239,68,68,0.15); color:#ef4444; border:1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background:rgba(239,68,68,0.25); }
.btn-success { background:rgba(34,197,94,0.15); color:#22c55e; border:1px solid rgba(34,197,94,0.2); }
.btn-success:hover { background:rgba(34,197,94,0.25); }
.btn-group { display:flex; gap:10px; margin-top:16px; }
.status-badge { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; padding:6px 14px; border-radius:100px; }
.status-on { background:rgba(34,197,94,0.1); color:#22c55e; border:1px solid rgba(34,197,94,0.15); }
.status-off { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.4); border:1px solid var(--border); }
.dot { width:6px; height:6px; border-radius:50%; }
.dot-on { background:#22c55e; animation:pulse 1.5s infinite; }
.dot-off { background:rgba(255,255,255,0.3); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.85); backdrop-filter:blur(12px); padding:12px 24px; border-radius:12px; font-size:13px; font-weight:600; border:1px solid var(--border); opacity:0; transition:opacity .3s; pointer-events:none; z-index:999; }
.toast.show { opacity:1; }
.toast.error { border-color:rgba(239,68,68,0.3); color:#ef4444; }
.back-link { display:inline-flex; align-items:center; gap:6px; color:rgba(255,255,255,0.3); text-decoration:none; font-size:12px; font-weight:600; margin-bottom:20px; }
.back-link:hover { color:var(--primary); }
.preview-box { background:var(--bg); border:1px solid var(--border); border-radius:16px; padding:20px; min-height:60px; }
.preview-box:empty::before { content:'HTML preview yahan dikhega...'; color:rgba(255,255,255,0.15); font-size:12px; }
.popup-active-card { background:rgba(34,197,94,0.05); border:1px solid rgba(34,197,94,0.15); border-radius:16px; padding:16px; }
.popup-active-card .title { font-weight:700; font-size:14px; margin-bottom:4px; }
.popup-active-card .meta { font-size:11px; color:rgba(255,255,255,0.35); }
.popup-active-card .btn-group { margin-top:12px; }
.section-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,0.2); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.section-label::after { content:''; flex:1; height:1px; background:var(--border); }
</style>
</head>
<body>
<div class="container">
<a href="admin.html" class="back-link"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to Admin</a>
<h1>Popup Manager</h1>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <div>
      <div style="font-weight:700;font-size:14px;">Current Status</div>
      <div id="statusBadge" class="status-badge status-off" style="margin-top:6px;"><span class="dot dot-off"></span> Loading...</div>
    </div>
  </div>
  <div id="activePopupInfo" style="display:none;"></div>
</div>

<div class="card">
  <label>Title</label>
  <input type="text" id="popupTitle" class="input" placeholder="e.g. Join our Telegram Group">
</div>

<div class="card">
  <label>Expires (optional)</label>
  <input type="datetime-local" id="popupExpiry" class="input" style="color-scheme:dark;">
  <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.2);margin-top:6px;">Blank = never expires</div>
</div>

<div class="card">
  <label>HTML Content</label>
  <textarea id="popupHtml" placeholder='<div style="text-align:center">
  <h2 style="color:#22c55e">Join our Telegram!</h2>
  <p>Stay updated with latest news</p>
  <a href="https://t.me/onchyra" style="display:inline-block;padding:12px 24px;background:#22c55e;color:#000;border-radius:12px;font-weight:700;text-decoration:none;">Join Now</a>
</div>'></textarea>
</div>

<div class="card">
  <div class="btn-group">
    <button id="deleteBtn" class="btn btn-danger" onclick="deletePopup()" style="display:none;">Delete</button>
    <button class="btn btn-primary" id="saveBtn" onclick="savePopup()" style="flex:1;">Create Popup</button>
  </div>
</div>

<div class="card">
  <div class="section-label">Live Preview</div>
  <div class="preview-box" id="previewBox"></div>
</div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({ apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI", authDomain: "onchyra.firebaseapp.com", projectId: "onchyra" });
const auth = getAuth(app);
const API = localStorage.getItem('onc_api') || (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:' ? 'http://localhost:5000/api' : 'https://onchyra-backend.onrender.com/api');
let adminUid = null;
let currentPopupId = null;

onAuthStateChanged(auth, async user => {
  if (!user) { window.location = 'admin-login.html'; return; }
  adminUid = user.uid;
  try {
    const r = await fetch(API + '/admin/check', { headers: { 'x-auth-uid': user.uid } });
    if (!r.ok) { window.location = 'dashboard.html'; return; }
  } catch(e) { window.location = 'dashboard.html'; return; }
  loadCurrentPopup();
});

function showToast(m, isError) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function loadCurrentPopup() {
  try {
    const r = await fetch(API + '/admin/popup/status', { headers: { 'x-auth-uid': adminUid } });
    const data = await r.json();
    const badge = document.getElementById('statusBadge');
    const info = document.getElementById('activePopupInfo');
    const deleteBtn = document.getElementById('deleteBtn');
    const saveBtn = document.getElementById('saveBtn');

    if (data.active && data.popup) {
      badge.className = 'status-badge status-on';
      badge.innerHTML = '<span class="dot dot-on"></span> Active';

      currentPopupId = data.popup.id;
      document.getElementById('popupTitle').value = data.popup.title || '';
      document.getElementById('popupHtml').value = data.popup.html_content || '';
      if (data.popup.expires_at) {
        const d = new Date(data.popup.expires_at);
        const pad = n => String(n).padStart(2, '0');
        document.getElementById('popupExpiry').value = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
      }
      updatePreview();
      deleteBtn.style.display = 'inline-flex';
      saveBtn.textContent = 'Update Popup';
    } else {
      badge.className = 'status-badge status-off';
      badge.innerHTML = '<span class="dot dot-off"></span> No Active Popup';
      currentPopupId = null;
      deleteBtn.style.display = 'none';
      saveBtn.textContent = 'Create Popup';
    }
  } catch(e) { showToast('Load error: ' + e.message, true); }
}

document.getElementById('popupHtml').addEventListener('input', updatePreview);

function updatePreview() {
  const html = document.getElementById('popupHtml').value;
  document.getElementById('previewBox').innerHTML = html || '';
}

window.savePopup = async () => {
  const title = document.getElementById('popupTitle').value.trim();
  const html = document.getElementById('popupHtml').value.trim();
  const expiryVal = document.getElementById('popupExpiry').value;

  if (!title) { showToast('Title likho pehle!', true); return; }
  if (!html) { showToast('HTML content likho!', true); return; }

  const body = { title, html_content: html };
  if (expiryVal) body.expires_at = new Date(expiryVal).getTime();

  try {
    let r;
    if (currentPopupId) {
      body.id = currentPopupId;
      r = await fetch(API + '/admin/popup/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-auth-uid': adminUid },
        body: JSON.stringify(body)
      });
    } else {
      r = await fetch(API + '/admin/popup/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-auth-uid': adminUid },
        body: JSON.stringify(body)
      });
    }
    const res = await r.json();
    if (!r.ok) { showToast(res.error || 'Failed', true); return; }
    showToast(currentPopupId ? 'Popup updated!' : 'Popup created!');
    loadCurrentPopup();
  } catch(e) { showToast(e.message, true); }
};

window.deletePopup = async () => {
  if (!currentPopupId) return;
  if (!confirm('Ye popup permanently delete ho jayega. Sure ho?')) return;
  try {
    const r = await fetch(API + '/admin/popup/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-auth-uid': adminUid },
      body: JSON.stringify({ id: currentPopupId })
    });
    const res = await r.json();
    if (!r.ok) { showToast(res.error || 'Failed', true); return; }
    document.getElementById('popupTitle').value = '';
    document.getElementById('popupHtml').value = '';
    document.getElementById('popupExpiry').value = '';
    document.getElementById('previewBox').innerHTML = '';
    showToast('Popup deleted!');
    loadCurrentPopup();
  } catch(e) { showToast(e.message, true); }
};
</script>
</body>
</html>
