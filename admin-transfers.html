<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONCHYRA Admin — Transfers</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05060f;
            --card: rgba(255,255,255,0.03);
            --card-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.08);
            --primary: #a78bfa;
            --secondary: #60a5fa;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #fbbf24;
            --text: rgba(255,255,255,0.7);
            --text-dim: rgba(255,255,255,0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: none;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(167,139,250,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(96,165,250,0.04) 0%, transparent 50%);
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px 80px; }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; margin-bottom: 30px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; backdrop-filter: blur(20px);
        }
        .header-left { display: flex; align-items: center; gap: 14px; }
        .header-logo {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900; font-size: 18px; color: #000;
        }
        .header-title { font-family: 'Space Grotesk'; font-weight: 800; font-size: 18px; }
        .header-title span { color: var(--primary); }
        .header-nav { display: flex; gap: 8px; }
        .header-nav a {
            padding: 8px 16px; border-radius: 10px; font-size: 12px; font-weight: 700;
            text-decoration: none; color: var(--text); transition: 0.2s;
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
        }
        .header-nav a:hover, .header-nav a.active {
            background: rgba(167,139,250,0.1); color: var(--primary); border-color: rgba(167,139,250,0.2);
        }
        .header-nav a.logout { color: var(--danger); }
        .header-nav a.logout:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); }

        .page-title { font-family: 'Space Grotesk'; font-size: 26px; font-weight: 800; margin: 0 0 20px; display: flex; align-items: center; gap: 12px; }
        .page-title .sub { font-size: 13px; font-weight: 600; color: var(--text-dim); font-family: 'Inter'; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 28px; }
        .stat-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 18px 20px;
        }
        .stat-card .slabel { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
        .stat-card .svalue { font-family: 'Space Grotesk'; font-size: 28px; font-weight: 800; margin-top: 4px; }
        .stat-card .svalue.purple { color: var(--primary); }
        .stat-card .svalue.blue { color: var(--secondary); }
        .stat-card .svalue.green { color: var(--success); }
        .stat-card .svalue.pink { color: #f472b6; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; margin-bottom: 20px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .card-title { font-family: 'Space Grotesk'; font-size: 16px; font-weight: 700; }
        .card-actions { display: flex; gap: 8px; align-items: center; }

        .search-box { display: flex; gap: 10px; flex-wrap: wrap; }
        .search-box input, .search-box select {
            padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: white; font-size: 13px; font-family: 'Inter'; outline: none;
        }
        .search-box input:focus, .search-box select:focus { border-color: var(--primary); }
        .search-box input { min-width: 200px; flex: 1; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th {
            text-align: left; padding: 10px 10px; color: var(--text-dim);
            font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid var(--border); white-space: nowrap;
        }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.01); }

        .badge { padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; display: inline-block; }
        .badge-green { background: rgba(34,197,94,0.12); color: var(--success); }
        .badge-blue { background: rgba(96,165,250,0.12); color: var(--secondary); }
        .badge-pink { background: rgba(244,114,182,0.12); color: #f472b6; }

        .mono { font-family: 'Space Grotesk', monospace; font-weight: 700; }
        .positive { color: var(--success); }
        .negative { color: #f472b6; }
        .dim { color: var(--text-dim); font-size: 11px; }

        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-dim); font-size: 14px; }

        .load-more-wrap { text-align: center; padding: 20px 0; }
        .load-more {
            padding: 12px 32px; border: 1px solid var(--border); border-radius: 12px;
            background: rgba(255,255,255,0.03); color: var(--text); font-size: 13px;
            font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .load-more:hover { background: rgba(255,255,255,0.06); border-color: var(--primary); }
        .load-more:disabled { opacity: 0.3; cursor: default; }

        .tx-detail-row { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
        .tx-detail-row .field { flex: 1; min-width: 140px; }
        .tx-detail-row .field .flabel { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 2px; }
        .tx-detail-row .field .fvalue { font-size: 13px; font-weight: 600; word-break: break-all; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #0b0d18; border: 1px solid var(--border); border-radius: 24px;
            padding: 30px; width: 100%; max-width: 520px;
        }
        .modal h3 { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 800; margin: 0 0 16px; }
        .modal-close {
            float: right; background: none; border: none; color: var(--text-dim);
            font-size: 20px; cursor: pointer;
        }
        .modal-close:hover { color: white; }

        .toast {
            position: fixed; bottom: 30px; right: 30px;
            padding: 14px 24px; border-radius: 12px; font-weight: 700; font-size: 13px;
            display: none; z-index: 3000; animation: slideIn 0.3s ease;
        }
        .toast.success { background: var(--success); color: #000; }
        .toast.error { background: var(--danger); color: white; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } }

        @media (max-width: 768px) {
            .container { padding: 12px 10px 60px; }
            .header { flex-direction: column; gap: 12px; align-items: stretch; }
            .header-nav { flex-wrap: wrap; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .search-box input { min-width: 140px; }
            table { font-size: 11px; }
            th, td { padding: 8px 6px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-logo">O</div>
            <div class="header-title">ONCHYRA <span>Admin</span></div>
        </div>
        <div class="header-nav">
            <a href="admin-user-panel.html">Users</a>
            <a href="admin.html">Contests</a>
            <a href="admin-notifications.html">Notifications</a>
            <a href="#" class="active">Transfers</a>
            <a href="dashboard.html" class="logout">Exit</a>
        </div>
    </div>

    <!-- Page Title -->
    <div class="page-title">
        P2P Transfers
        <span class="sub" id="txSubtitle">Monitor all peer-to-peer activity</span>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="slabel">Total Transfers</div>
            <div class="svalue purple" id="statCount">0</div>
        </div>
        <div class="stat-card">
            <div class="slabel">Total Volume</div>
            <div class="svalue blue" id="statVolume">0 ONC</div>
        </div>
        <div class="stat-card">
            <div class="slabel">Total Burned</div>
            <div class="svalue pink" id="statBurned">0 ONC</div>
        </div>
        <div class="stat-card">
            <div class="slabel">24h Transfers</div>
            <div class="svalue green" id="stat24h">0</div>
        </div>
    </div>

    <!-- Card -->
    <div class="card">
        <div class="card-header">
            <div class="card-title">Transfer Log</div>
            <div class="card-actions">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search by name or ID..." oninput="filterTransfers()">
                    <select id="sortSelect" onchange="loadAllTransfers()">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="largest">Largest First</option>
                    </select>
                </div>
            </div>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>From</th>
                        <th>To</th>
                        <th>Amount</th>
                        <th>Burn 10%</th>
                        <th>Received</th>
                        <th>Time</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="transfersTable">
                    <tr><td colspan="7" class="empty-state">Loading transfers...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
            <button class="load-more" id="loadMoreBtn" onclick="loadMore()">Load More</button>
        </div>
    </div>

</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <button class="modal-close" onclick="closeDetail()">&times;</button>
        <h3>Transfer Details</h3>
        <div id="detailContent"></div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
    getFirestore, doc, getDoc, getDocs, collection, query, where, orderBy, limit, startAfter
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
    authDomain: "onchyra.firebaseapp.com",
    projectId: "onchyra",
    storageBucket: "onchyra.firebasestorage.app",
    messagingSenderId: "441822770982",
    appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allTransfers = [];
let displayedTransfers = [];
let lastDoc = null;
let hasMore = true;
const PAGE_SIZE = 30;
let adminUid = null;

function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (isError ? 'error' : 'success');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

function timeAgo(t) {
    if (!t) return '';
    const d = t.toDate ? t.toDate() : new Date(t);
    const s = Math.floor((new Date() - d) / 1000);
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
}

function formatTime(t) {
    if (!t) return '-';
    const d = t.toDate ? t.toDate() : new Date(t);
    return d.toLocaleString();
}

// -- Load all transfers --
async function loadAllTransfers(isReset = true) {
    try {
        const tbody = document.getElementById('transfersTable');
        if (isReset) {
            lastDoc = null;
            hasMore = true;
            allTransfers = [];
        }

        const sortVal = document.getElementById('sortSelect').value;
        let orderDir = 'desc';
        let orderField = 'timestamp';
        if (sortVal === 'oldest') orderDir = 'asc';
        if (sortVal === 'largest') { orderField = 'amount'; orderDir = 'desc'; }

        let q;
        if (lastDoc) {
            q = query(
                collection(db, "transfers"),
                orderBy(orderField, orderDir),
                startAfter(lastDoc),
                limit(PAGE_SIZE)
            );
        } else {
            q = query(
                collection(db, "transfers"),
                orderBy(orderField, orderDir),
                limit(PAGE_SIZE)
            );
        }

        const snap = await getDocs(q);
        if (snap.empty) {
            hasMore = false;
            document.getElementById('loadMoreWrap').style.display = 'none';
            if (allTransfers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No transfers found</td></tr>';
            }
            computeStats();
            return;
        }

        lastDoc = snap.docs[snap.docs.length - 1];
        if (snap.docs.length < PAGE_SIZE) hasMore = false;

        const newItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        allTransfers = isReset ? [...newItems] : [...allTransfers, ...newItems];

        // Batch-fetch user names
        const uidSet = new Set();
        newItems.forEach(tx => {
            if (tx.from) uidSet.add(tx.from);
            if (tx.to) uidSet.add(tx.to);
        });
        const nameMap = {};
        if (uidSet.size > 0) {
            const fetches = [...uidSet].map(id => getDoc(doc(db, "users", id)).catch(() => null));
            const snaps = await Promise.all(fetches);
            snaps.forEach(snap => {
                if (snap && snap.exists()) {
                    nameMap[snap.id] = snap.data().name || snap.data().referralCode || snap.id.slice(0, 6).toUpperCase();
                }
            });
        }

        // Attach names
        newItems.forEach(tx => {
            tx._fromName = nameMap[tx.from] || tx.from.slice(0, 6).toUpperCase();
            tx._toName = nameMap[tx.to] || tx.to.slice(0, 6).toUpperCase();
        });

        if (isReset) {
            displayedTransfers = [...newItems];
        } else {
            displayedTransfers = [...displayedTransfers, ...newItems];
        }

        renderTable();
        computeStats();
        document.getElementById('loadMoreWrap').style.display = hasMore ? 'block' : 'none';
    } catch (e) {
        console.error('Load error:', e);
        document.getElementById('transfersTable').innerHTML = '<tr><td colspan="7" class="empty-state">Error loading transfers</td></tr>';
        showToast('Error loading transfers', true);
    }
}

// -- Render table --
function renderTable() {
    const tbody = document.getElementById('transfersTable');
    const search = document.getElementById('searchInput').value.toLowerCase().trim();

    let items = displayedTransfers;
    if (search) {
        items = items.filter(tx => {
            const f = (tx._fromName || '').toLowerCase();
            const t = (tx._toName || '').toLowerCase();
            const fc = (tx.toCode || '').toLowerCase();
            return f.includes(search) || t.includes(search) || fc.includes(search);
        });
    }

    if (!items.length) {
        const msg = search ? 'No transfers match your search' : 'No transfers found';
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state">${msg}</td></tr>`;
        return;
    }

    tbody.innerHTML = items.map(tx => `
        <tr onclick="openDetail('${tx.id}')" style="cursor:pointer;">
            <td style="font-weight:600;">${tx._fromName || tx.from.slice(0,6).toUpperCase()}</td>
            <td style="font-weight:600;">${tx._toName || (tx.toCode || tx.to.slice(0,6).toUpperCase())}</td>
            <td class="mono negative">${Number(tx.amount || 0).toFixed(2)}</td>
            <td class="mono pink" style="color:#f472b6;">${Number(tx.burn || 0).toFixed(2)}</td>
            <td class="mono positive">${Number(tx.receive || 0).toFixed(2)}</td>
            <td class="dim" style="white-space:nowrap;" title="${formatTime(tx.timestamp)}">${timeAgo(tx.timestamp)}</td>
            <td style="text-align:right;">
                <span class="badge badge-green">completed</span>
            </td>
        </tr>
    `).join('');
}

// -- Stats --
function computeStats() {
    const all = allTransfers;
    let count = all.length;
    let volume = 0;
    let burned = 0;
    let count24h = 0;
    const cutoff = Date.now() - 86400000;

    all.forEach(tx => {
        volume += Number(tx.amount || 0);
        burned += Number(tx.burn || 0);
        const ms = tx.timestamp?.toMillis ? tx.timestamp.toMillis() : 0;
        if (ms >= cutoff) count24h++;
    });

    document.getElementById('statCount').textContent = count;
    document.getElementById('statVolume').textContent = volume.toFixed(2) + ' ONC';
    document.getElementById('statBurned').textContent = burned.toFixed(2) + ' ONC';
    document.getElementById('stat24h').textContent = count24h;

    document.getElementById('txSubtitle').textContent =
        `Showing ${displayedTransfers.length} transfers · ${count} total loaded`;
}

// -- Search --
window.filterTransfers = () => renderTable();

// -- Load more --
window.loadMore = () => loadAllTransfers(false);

// -- Detail modal --
window.openDetail = async (id) => {
    const tx = allTransfers.find(t => t.id === id) || displayedTransfers.find(t => t.id === id);
    if (!tx) { showToast('Transfer not found', true); return; }

    // Get full names
    let fromName = tx._fromName || tx.from;
    let toName = tx._toName || tx.to;
    try {
        const [fSnap, tSnap] = await Promise.all([
            getDoc(doc(db, "users", tx.from)),
            getDoc(doc(db, "users", tx.to))
        ]);
        if (fSnap.exists()) fromName = fSnap.data().name || fSnap.data().referralCode || tx.from.slice(0,6).toUpperCase();
        if (tSnap.exists()) toName = tSnap.data().name || tSnap.data().referralCode || tx.to.slice(0,6).toUpperCase();
    } catch (e) {}

    document.getElementById('detailContent').innerHTML = `
        <div class="tx-detail-row">
            <div class="field"><div class="flabel">Transfer ID</div><div class="fvalue mono" style="font-size:11px;">${tx.id}</div></div>
            <div class="field"><div class="flabel">Status</div><div class="fvalue"><span class="badge badge-green">completed</span></div></div>
        </div>
        <div class="tx-detail-row">
            <div class="field"><div class="flabel">From</div><div class="fvalue">${fromName}</div></div>
            <div class="field"><div class="flabel">From UID</div><div class="fvalue dim" style="font-size:11px;font-family:monospace;">${tx.from}</div></div>
        </div>
        <div class="tx-detail-row">
            <div class="field"><div class="flabel">To</div><div class="fvalue">${toName}</div></div>
            <div class="field"><div class="flabel">To UID</div><div class="fvalue dim" style="font-size:11px;font-family:monospace;">${tx.to}</div></div>
        </div>
        <div class="tx-detail-row">
            <div class="field"><div class="flabel">Gross Amount</div><div class="fvalue mono negative">${Number(tx.amount || 0).toFixed(2)} ONC</div></div>
            <div class="field"><div class="flabel">10% Network Burn</div><div class="fvalue mono" style="color:#f472b6;">${Number(tx.burn || 0).toFixed(2)} ONC</div></div>
        </div>
        <div class="tx-detail-row">
            <div class="field"><div class="flabel">Received by Recipient</div><div class="fvalue mono positive">${Number(tx.receive || 0).toFixed(2)} ONC</div></div>
            <div class="field"><div class="flabel">Timestamp</div><div class="fvalue" style="font-size:12px;">${formatTime(tx.timestamp)}</div></div>
        </div>
    `;
    document.getElementById('detailModal').classList.add('active');
};

window.closeDetail = () => document.getElementById('detailModal').classList.remove('active');

// -- Auth --
onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.replace('login.html'); return; }
    try {
        const adminSnap = await getDoc(doc(db, 'admins', user.uid));
        if (!adminSnap.exists() || adminSnap.data().role !== 'admin') {
            document.body.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#ef4444;font-family:Inter;"><div style="font-size:40px;margin-bottom:16px;">&#x1f512;</div><h2 style="font-family:Space Grotesk;">Access Denied</h2><p style="opacity:0.4;margin-top:8px;font-size:14px;">Admin privileges required.</p></div>';
            document.body.style.display = 'block';
            return;
        }
        adminUid = user.uid;
        document.body.style.display = 'block';
        loadAllTransfers();
    } catch (e) {
        console.error(e);
        document.body.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#ef4444;"><h2>Error</h2><p style="opacity:0.4;">' + e.message + '</p></div>';
        document.body.style.display = 'block';
    }
});
</script>

</body>
</html>
