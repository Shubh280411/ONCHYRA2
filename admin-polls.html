<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONCHYRA — Polls</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
<style>
:root { --primary:#a78bfa; --secondary:#60a5fa; --bg:#03040a; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.1); --red:#ef4444; --green:#22c55e; --yellow:#eab308; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Inter'; background:var(--bg); color:#fff; margin:0; }
.sidebar { position:fixed; left:0; top:0; bottom:0; width:240px; background:rgba(10,12,25,0.95); border-right:1px solid var(--border); padding:20px 0; z-index:100; }
.sidebar h2 { font-family:'Space Grotesk'; font-size:22px; font-weight:800; padding:0 20px; margin:0 0 30px; letter-spacing:-1px; }
.sidebar h2 span { color:var(--primary); }
.nav-item { padding:12px 20px; cursor:pointer; font-size:14px; font-weight:600; color:rgba(255,255,255,0.5); transition:0.2s; display:flex; align-items:center; gap:10px; text-decoration:none; }
.nav-item:hover, .nav-item.active { color:#fff; background:rgba(255,255,255,0.05); }
.nav-item.active { border-right:3px solid var(--primary); }
.main { margin-left:240px; padding:30px; min-height:100vh; }
.page-title { font-family:'Space Grotesk'; font-size:28px; font-weight:800; margin:0 0 25px; }

.card { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; margin-bottom:20px; }
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
.card-title { font-family:'Space Grotesk'; font-size:18px; font-weight:700; }

.btn { padding:10px 18px; border:none; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer; transition:0.2s; display:inline-flex; align-items:center; gap:6px; font-family:'Inter'; }
.btn-primary { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#000; }
.btn-primary:hover { opacity:0.9; }
.btn-danger { background:rgba(239,68,68,0.15); color:var(--red); }
.btn-danger:hover { background:rgba(239,68,68,0.25); }
.btn-sm { padding:6px 12px; font-size:11px; border-radius:8px; }

input, textarea { width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,0.03); color:#fff; font-size:14px; font-family:'Inter'; outline:none; }
input:focus, textarea:focus { border-color:var(--primary); }
textarea { resize:vertical; min-height:60px; }
.form-group { margin-bottom:15px; }
.form-group label { display:block; font-size:12px; font-weight:600; margin-bottom:6px; color:rgba(255,255,255,0.6); }

table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:12px 10px; color:rgba(255,255,255,0.5); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid var(--border); }
td { padding:12px 10px; border-bottom:1px solid rgba(255,255,255,0.03); vertical-align:middle; }
tr:last-child td { border-bottom:none; }

.badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; display:inline-block; }
.badge-green { background:rgba(34,197,94,0.15); color:var(--green); }

.opt-list { display:flex; flex-wrap:wrap; gap:4px; }
.opt-item { font-size:11px; background:rgba(255,255,255,0.05); padding:3px 8px; border-radius:6px; color:rgba(255,255,255,0.7); }

.bar-wrap { display:flex; align-items:center; gap:8px; margin:2px 0; }
.bar { height:6px; border-radius:4px; background:var(--primary); transition:width 0.3s; }
.bar-label { font-size:11px; color:rgba(255,255,255,0.6); min-width:80px; }
.bar-pct { font-size:11px; font-weight:700; color:var(--primary); min-width:35px; text-align:right; }

.toast { position:fixed; bottom:30px; right:30px; background:var(--green); color:#000; padding:14px 24px; border-radius:12px; font-weight:700; font-size:13px; display:none; z-index:3000; animation:slideIn 0.3s ease; }
.toast.error { background:var(--red); color:#fff; }
@keyframes slideIn { from { transform:translateY(20px); opacity:0; } }

.empty-state { text-align:center; padding:40px; color:rgba(255,255,255,0.3); font-size:14px; }

@media (max-width:768px) {
  .sidebar { width:60px; }
  .sidebar h2, .nav-item span { display:none; }
  .nav-item { justify-content:center; padding:15px; }
  .main { margin-left:60px; padding:20px; }
}
</style>
</head>
<body>

<nav class="sidebar">
  <h2>ONCHY<span>RA</span></h2>
  <a class="nav-item" href="admin.html">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="10" y="3" width="7" height="7" rx="1"/><rect x="3" y="10" width="7" height="7" rx="1"/><rect x="10" y="10" width="7" height="7" rx="1"/></svg>
    <span>Dashboard</span>
  </a>
  <a class="nav-item active" href="admin-polls.html">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span>Polls</span>
  </a>
</nav>

<div class="main">
  <h1 class="page-title">Polls</h1>

  <div class="card">
    <div class="card-header">
      <div class="card-title">Create Poll</div>
    </div>
    <div class="form-group">
      <label>Question</label>
      <input id="pollQuestion" placeholder="e.g. What feature should we build next?" />
    </div>
    <div class="form-group">
      <label>Options (one per line)</label>
      <textarea id="pollOptions" placeholder="Option A&#10;Option B&#10;Option C"></textarea>
    </div>
    <button class="btn btn-primary" onclick="createPoll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Create Poll
    </button>
  </div>

  <div class="card" id="pollsList">
    <div class="card-header">
      <div class="card-title">All Polls</div>
    </div>
    <div id="pollsContainer"><div class="empty-state">Loading...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { collection, getDocs, addDoc, deleteDoc, doc, query, orderBy, onSnapshot, serverTimestamp   } from "./supabase-adapter.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
  authDomain: "onchyra.firebaseapp.com",
  projectId: "onchyra"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = {};

let isAdmin = false;

auth.onAuthStateChanged(async (user) => {
  if (!user) { window.location.href = 'admin-login.html'; return; }
  const snap = await getDocs(collection(db, 'admins'));
  isAdmin = snap.docs.some(d => d.id === user.uid && d.data().role === 'admin');
  if (!isAdmin) { window.location.href = 'admin-login.html'; return; }
  loadPolls();
});

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast' + (type === 'error' ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function loadPolls() {
  const q = query(collection(db, 'polls'), orderBy('__name__', 'desc'));
  onSnapshot(q, (snap) => {
    const container = document.getElementById('pollsContainer');
    if (snap.empty) { container.innerHTML = '<div class="empty-state">No polls yet. Create one above.</div>'; return; }
    let html = '<table><thead><tr><th>Question</th><th>Options</th><th>Results</th><th>Action</th></tr></thead><tbody>';
    snap.forEach(d => {
      const data = d.data();
      const total = Object.values(data.results || {}).reduce((a, b) => a + b, 0);
      const opts = (data.options || []).map(o => {
        const c = (data.results || {})[o] || 0;
        const pct = total > 0 ? Math.round((c / total) * 100) : 0;
        return '<div class="bar-wrap"><span class="bar-label">' + o + '</span><div class="bar" style="width:' + pct + '%;max-width:150px;"></div><span class="bar-pct">' + pct + '%</span><span style="font-size:10px;color:rgba(255,255,255,0.4);">(' + c + ')</span></div>';
      }).join('');
      html += '<tr><td><strong>' + (data.question || 'Untitled') + '</strong></td>'
        + '<td><div class="opt-list">' + (data.options || []).map(o => '<span class="opt-item">' + o + '</span>').join('') + '</div></td>'
        + '<td><div style="min-width:220px;">' + opts + '</div></td>'
        + '<td><button class="btn btn-danger btn-sm" onclick="window.deletePoll(\'' + d.id + '\')">Delete</button></td></tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  });
}

window.createPoll = async () => {
  const question = document.getElementById('pollQuestion').value.trim();
  const raw = document.getElementById('pollOptions').value.trim();
  if (!question) { showToast('Enter a question', 'error'); return; }
  const options = raw.split('\n').map(l => l.trim()).filter(Boolean);
  if (options.length < 2) { showToast('Enter at least 2 options', 'error'); return; }

  const results = {};
  options.forEach(o => results[o] = 0);

  try {
    await addDoc(collection(db, 'polls'), {
      question,
      options,
      results,
      createdAt: serverTimestamp()
    });
    document.getElementById('pollQuestion').value = '';
    document.getElementById('pollOptions').value = '';
    showToast('Poll created!');
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
};

window.deletePoll = async (id) => {
  if (!confirm('Delete this poll?')) return;
  try {
    await deleteDoc(doc(db, 'polls', id));
    showToast('Poll deleted');
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
};
</script>
</body>
</html>
