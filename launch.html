<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Launch — ONCHYRA Predict</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#a78bfa; --secondary:#60a5fa; --bg:#03040a; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.1); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:white; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; padding:20px; }

        .bg-glow { position:fixed; top:-30%; left:-20%; width:140%; height:140%; background:radial-gradient(circle at 50% 40%, rgba(167,139,250,0.06) 0%, transparent 60%); pointer-events:none; }

        .container { position:relative; z-index:1; text-align:center; max-width:560px; width:100%; }

        .glass-card { background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.06); border-radius:32px; padding:40px 32px; margin:0 auto; text-align:center; }

        .badge { display:inline-flex; align-items:center; gap:6px; background:rgba(167,139,250,0.1); border:1px solid rgba(167,139,250,0.15); padding:6px 16px; border-radius:100px; font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--primary); margin-bottom:24px; }
        .badge .dot { width:6px; height:6px; border-radius:50%; background:var(--primary); animation:pulse-dot 1.5s ease-in-out infinite; }
        @keyframes pulse-dot { 0%,100% { opacity:0.3; } 50% { opacity:1; } }

        .logo { font-family:'Space Grotesk'; font-weight:900; font-size:28px; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px; letter-spacing:4px; text-align:center; }

        h1 { font-family:'Space Grotesk'; font-weight:900; font-size:clamp(28px,6vw,48px); line-height:1.1; margin-bottom:8px; background:linear-gradient(135deg,#fff 40%,rgba(167,139,250,0.6)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .sub { font-size:13px; color:rgba(255,255,255,0.4); font-weight:500; margin-bottom:40px; line-height:1.6; }
        .sub strong { color:rgba(255,255,255,0.7); font-weight:700; }

        .timer-wrap { display:flex; justify-content:center; gap:12px; margin-bottom:40px; flex-wrap:wrap; }
        .t-unit { display:flex; flex-direction:column; align-items:center; min-width:72px; }
        .t-num { font-family:'Space Grotesk'; font-weight:900; font-size:clamp(36px,8vw,64px); line-height:1; background:linear-gradient(180deg,#fff 30%,rgba(167,139,250,0.4)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .t-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,0.2); margin-top:6px; }
        .t-sep { font-family:'Space Grotesk'; font-weight:900; font-size:clamp(28px,6vw,48px); color:rgba(167,139,250,0.2); padding-top:4px; display:flex; align-items:flex-start; }

        .progress-track { width:100%; height:4px; background:rgba(255,255,255,0.05); border-radius:4px; margin-bottom:8px; overflow:hidden; }
        .progress-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--primary),var(--secondary)); border-radius:4px; transition:width 1s ease; }

        .info-row { display:flex; justify-content:center; gap:24px; flex-wrap:wrap; margin-top:8px; }
        .info-item { text-align:center; }
        .info-item .val { font-family:'Space Grotesk'; font-size:15px; font-weight:800; color:white; }
        .info-item .lbl { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:rgba(255,255,255,0.2); margin-top:2px; }

        .cta { margin-top:40px; }
        .cta a { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; text-decoration:none; padding:14px 32px; border-radius:16px; font-weight:700; font-size:13px; letter-spacing:0.5px; transition:0.3s; box-shadow:0 8px 32px rgba(167,139,250,0.15); }
        .cta a:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(167,139,250,0.25); }

        .footer { margin-top:48px; font-size:9px; font-weight:600; color:rgba(255,255,255,0.1); letter-spacing:1px; }

        @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
        .rocket { display:inline-flex; align-items:center; justify-content:center; animation:float 2.5s ease-in-out infinite; margin-bottom:16px; }
        .rocket svg { width:48px; height:48px; }
        .icon-wa svg { width:18px; height:18px; }
        .icon-star svg { width:48px; height:48px; }
        .rocket-end { display:none; }

        @media (max-width:400px) {
            .timer-wrap { gap:6px; }
            .t-unit { min-width:56px; }
            .t-sep { display:none; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <div class="glass-card">

    <div class="logo">ONCHYRA</div>

    <div class="rocket">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#rg)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient></defs>
            <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
            <path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
            <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
            <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
        </svg>
    </div>
    <div class="rocket-end" id="rocketEnd">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#rg2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <defs><linearGradient id="rg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient></defs>
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
    </div>
    <div class="badge"><span class="dot"></span> Prediction Market Launch</div>

    <h1>Biggest Launch of 2026</h1>
    <div class="sub">
        ONCHYRA Predict is landing on <strong>June 10</strong> —<br>
        Trade UP or DOWN on crypto with insane payouts
    </div>

    <div class="timer-wrap">
        <div class="t-unit"><div class="t-num" id="d">00</div><div class="t-label">Days</div></div>
        <div class="t-sep">:</div>
        <div class="t-unit"><div class="t-num" id="h">00</div><div class="t-label">Hours</div></div>
        <div class="t-sep">:</div>
        <div class="t-unit"><div class="t-num" id="m">00</div><div class="t-label">Minutes</div></div>
        <div class="t-sep">:</div>
        <div class="t-unit"><div class="t-num" id="s">00</div><div class="t-label">Seconds</div></div>
    </div>

    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

    <div class="info-row">
        <div class="info-item"><div class="val" id="infoDays">0</div><div class="lbl">Days Left</div></div>
        <div class="info-item"><div class="val" id="infoPct">0%</div><div class="lbl">Complete</div></div>
        <div class="info-item"><div class="val" id="infoTarget">Jun 10</div><div class="lbl">Target Date</div></div>
    </div>

    <div class="cta">
        <a href="https://chat.whatsapp.com/H0fPOVjfC47Fx7DQ446jqm" target="_blank" rel="noopener">
            <span class="icon-wa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></span>
            Join WhatsApp Group
        </a>
    </div>

    </div>

    <div class="footer">ONCHYRA © 2026</div>
</div>

<script>
    const START = new Date('2026-03-01T00:00:00').getTime();
    const TARGET = new Date('2026-06-10T00:00:00').getTime();
    const TOTAL = TARGET - START;

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
        const now = Date.now();
        const diff = TARGET - now;

        if (diff <= 0) {
            const units = ['d','h','m','s'];
            units.forEach(id => document.getElementById(id).textContent = '00');
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('infoPct').textContent = '100%';
            document.getElementById('infoDays').textContent = '0';
            document.querySelector('.rocket').style.display = 'none';
            document.getElementById('rocketEnd').style.display = 'inline-flex';
            document.querySelector('h1').textContent = 'ITS HERE!';
            return;
        }

        const days = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        const secs = Math.floor((diff % 60000) / 1000);

        document.getElementById('d').textContent = pad(days);
        document.getElementById('h').textContent = pad(hours);
        document.getElementById('m').textContent = pad(mins);
        document.getElementById('s').textContent = pad(secs);

        const elapsed = now - START;
        const pct = Math.min(100, Math.max(0, (elapsed / TOTAL) * 100));
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('infoDays').textContent = days;
        document.getElementById('infoPct').textContent = pct.toFixed(1) + '%';
    }

    tick();
    setInterval(tick, 1000);
</script>

</body>
</html>
