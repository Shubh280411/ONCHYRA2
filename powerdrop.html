<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerDrop — ONCHYRA</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root { --primary: #c084fc; --bg: #030712; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
*{margin:0;padding:0;box-sizing:border-box}
body{ font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: white; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, transparent 50%); }
.container{width: 100%; max-width: 420px;}
.nav-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
.back-btn { background: var(--glass); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; }
.header h1{ font-family: 'Space Grotesk'; font-size: 24px; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.card{ background: var(--glass); border: 1px solid var(--border); border-radius: 36px; padding: 30px 25px; backdrop-filter: blur(25px); text-align: center; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.7); margin-bottom: 20px; }
#eventTitle { display: block; color: var(--primary); font-weight: 800; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 15px; }
.reward-amount{ font-size: 50px; font-weight: 800; font-family: 'Space Grotesk'; color: #fff; line-height: 1; }
.timer-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
.time-plate { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 16px; padding: 10px; min-width: 60px; }
.time-num { display: block; font-size: 18px; font-weight: 700; color: var(--primary); }
.time-label { display: block; font-size: 7px; opacity: 0.3; text-transform: uppercase; }
.progress-bar{ height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 10px; }
#fill{ height: 100%; width: 0%; background: linear-gradient(90deg, #6366f1, #c084fc); transition: width 2s ease; }
input{ width: 100%; padding: 18px; border-radius: 18px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; margin-bottom: 15px; outline: none; text-align: center; }
.btn-main{ width: 100%; padding: 18px; border: none; border-radius: 20px; background: #fff; color: #000; font-weight: 800; cursor: pointer; }
.btn-main:disabled { opacity: 0.2; cursor: not-allowed; }
.btn-tg { width: 100%; padding: 15px; border-radius: 18px; background: transparent; color: #fff; font-weight: 600; border: 1px solid rgba(255, 255, 255, 0.1); margin-top: 15px; display: none; align-items: center; justify-content: center; gap: 10px; cursor: pointer; font-size: 13px; }
.rules-card { background: rgba(255, 255, 255, 0.01); border: 1px solid var(--border); border-radius: 24px; padding: 20px; }
.rules-card h3 { font-size: 11px; color: var(--primary); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
.rule-item { display: flex; gap: 8px; margin-bottom: 10px; font-size: 11px; color: rgba(255,255,255,0.5); text-align: left; }
#msg{ margin-top: 10px; font-size: 12px; font-weight: 600; text-align:center; }
</style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <div class="back-btn" onclick="window.location.href='dashboard.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </div>
        <div class="header"><h1>ONCHYRA</h1></div>
    </div>

    <div id="loader" style="text-align:center; opacity: 0.5; padding-top: 50px;">INITIALIZING...</div>

    <div id="eventUI" style="display:none;">
        <div class="card">
            <span id="eventTitle">POWER DROP</span>
            <div class="reward-box"><span class="reward-amount" id="reward">0</span><span style="font-size: 18px; font-weight: 700; color: var(--primary); vertical-align: super;"> USDT</span></div>
            <div class="timer-container">
                <div class="time-plate"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
                <div class="time-plate"><span class="time-num" id="hours">00</span><span class="time-label">Hrs</span></div>
                <div class="time-plate"><span class="time-num" id="mins">00</span><span class="time-label">Min</span></div>
                <div class="time-plate"><span class="time-num" id="secs">00</span><span class="time-label">Sec</span></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:10px; opacity:0.4;"><span>NETWORK LOAD</span><span id="pCount">0 / 0</span></div>
            <div class="progress-bar"><div id="fill"></div></div><br>
            <input type="text" id="wallet" placeholder="USDT BEP20 Address" spellcheck="false">
            <button id="joinBtn" class="btn-main" onclick="participate()" disabled>CONFIRM ENTRY</button>
            <div id="msg"></div>
            <button id="shareBtn" class="btn-tg" onclick="shareOnTG()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.11.02-1.93 1.23-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.46-.42-1.4-.88.03-.24.36-.48.99-.74 3.84-1.67 6.41-2.77 7.7-3.3 3.65-1.5 4.41-1.76 4.9-1.77.11 0 .35.03.5.15.13.1.17.24.18.33.01.07.01.2-.01.3z"/></svg>
                Invite via Telegram
            </button>
        </div>
        <div class="rules-card">
            <h3>Protocol Rules</h3>
            <div class="rule-item"><span>▹ One entry per node. Multi-accounts lead to instant ban.</span></div>
            <div class="rule-item"><span>▹ Valid USDT BEP20 (BSC) address is strictly required.</span></div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, serverTimestamp, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = { apiKey:"AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI", authDomain:"onchyra.firebaseapp.com", projectId:"onchyra", storageBucket:"onchyra.firebasestorage.app", messagingSenderId:"441822770982", appId:"1:441822770982:web:f22f6b95fd5148ce21b3e7" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentEventId = null, userUid = null, tInterval = null;

onAuthStateChanged(auth, async (user) => {
    if (user) { 
        userUid = user.uid; 
        const uSnap = await getDoc(doc(db, "users", userUid));
        // Check for 'banned' field specifically
        if (uSnap.exists() && uSnap.data().banned === true) { window.location.href = "banned.html"; return; }
        initEvent(); 
    } else { window.location.href="login.html"; }
});

async function initEvent() {
    onSnapshot(collection(db, "powerdrops"), (snap) => {
        if (!snap.empty) {
            const d = snap.docs[0];
            currentEventId = d.id;
            render(d.data());
            checkJoined();
        }
    });
}

function render(data) {
    document.getElementById('loader').style.display = "none";
    document.getElementById('eventUI').style.display = "block";
    document.getElementById('eventTitle').innerText = (data.title || "POWERDROP").toUpperCase();
    document.getElementById('reward').innerText = data.reward || "0";
    const c = data.participantsCount || 0, m = data.maxParticipants || 50;
    document.getElementById('pCount').innerText = `${c} / ${m}`;
    document.getElementById('fill').style.width = Math.min((c/m*100), 100) + "%";

    const start = data.startTime.toMillis(), end = start + (data.duration * 86400000);
    if(tInterval) clearInterval(tInterval);
    tInterval = setInterval(() => {
        const diff = end - Date.now();
        if (diff <= 0) { clearInterval(tInterval); return; }
        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById('days').innerText = d.toString().padStart(2,'0');
        document.getElementById('hours').innerText = h.toString().padStart(2,'0');
        document.getElementById('mins').innerText = m.toString().padStart(2,'0');
        document.getElementById('secs').innerText = s.toString().padStart(2,'0');
    }, 1000);
}

async function checkJoined() {
    const snap = await getDoc(doc(db, "powerdrops", currentEventId, "participants", userUid));
    if (snap.exists()) {
        const btn = document.getElementById('joinBtn');
        btn.disabled = true; btn.innerText = "ENTRY VERIFIED ✅";
        document.getElementById('wallet').value = snap.data().address;
        document.getElementById('wallet').disabled = true;
        document.getElementById('shareBtn').style.display = "flex";
    } else { document.getElementById('joinBtn').disabled = false; }
}

window.participate = async () => {
    const addr = document.getElementById('wallet').value.trim();
    if (addr.length < 20) return showMsg("Invalid BEP20 Address", "#f87171");
    const btn = document.getElementById('joinBtn');
    btn.disabled = true; btn.innerText = "PROCESSING...";
    try {
        await setDoc(doc(db, "powerdrops", currentEventId, "participants", userUid), { address: addr, joinedAt: serverTimestamp() });
        await updateDoc(doc(db, "powerdrops", currentEventId), { participantsCount: increment(1) });
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        showMsg("Registration Successful!", "#34d399");
        btn.innerText = "ENTRY VERIFIED ✅";
        document.getElementById('shareBtn').style.display = "flex";
    } catch (e) { 
        console.error(e);
        showMsg("Firestore Error. Check Rules.", "#f87171"); 
        btn.disabled = false; btn.innerText = "CONFIRM ENTRY";
    }
}

window.shareOnTG = () => {
    const t = `Join ONCHYRA PowerDrop! ${window.location.origin}/powerdrop.html`;
    window.open(`https://t.me/share/url?url=${encodeURIComponent(t)}`, '_blank');
}

function showMsg(t, c) { document.getElementById('msg').innerText = t; document.getElementById('msg').style.color = c; }
</script>
</body>
</html>
