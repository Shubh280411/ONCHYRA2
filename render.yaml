services:
  - type: web
    name: onchyra-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "*"
      - key: NODE_VERSION
        value: 18
