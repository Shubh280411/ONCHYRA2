<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokenomics — ONCHYRA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a78bfa; --bg: #03040a; --border: rgba(255, 255, 255, 0.08); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding-top: 80px; padding-bottom: 50px; display: flex; flex-direction: column; align-items: center; }

        /* NAVBAR */
        .navbar { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(3, 4, 10, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; z-index: 1000; }
        .nav-logo { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 800; color: var(--primary); }
        .nav-back { text-decoration: none; color: white; font-size: 11px; font-weight: 700; background: rgba(255,255,255,0.05); padding: 8px 15px; border-radius: 10px; border: 1px solid var(--border); }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-family: 'Space Grotesk'; font-size: 28px; color: var(--primary); text-transform: uppercase; }

        /* PIE CHART */
        .chart-container { width: 260px; height: 260px; margin-bottom: 35px; position: relative; }
        
        /* GRID */
        .grid { width: 92%; max-width: 420px; display: flex; flex-direction: column; gap: 14px; }
        .token-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 20px; border-radius: 25px; }
        
        .card-flex { display: flex; justify-content: space-between; align-items: center; }
        .label { font-family: 'Space Grotesk'; font-size: 15px; font-weight: 700; letter-spacing: 0.5px; }
        .percent { font-family: 'Space Grotesk'; font-size: 20px; color: var(--primary); font-weight: 800; }
        .token-val { font-size: 11px; opacity: 0.5; font-weight: 400; margin-left: 5px; }

        /* BREAKDOWN SECTION */
        .breakdown-box { margin-top: 12px; padding-top: 12px; border-top: 1px dashed rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 8px; }
        .b-row { display: flex; justify-content: space-between; font-size: 12px; }
        .b-item { color: var(--primary); font-weight: 700; }

        .burn { border-color: rgba(239, 68, 68, 0.2); }
        .burn .percent { color: #ef4444; }
        .liquidity { border-color: rgba(16, 185, 129, 0.2); }
        .liquidity .percent { color: #10b981; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">ONCHYRA</div>
        <a href="dashboard.html" class="nav-back">BACK</a>
    </nav>

    <div class="header">
        <h1>Tokenomics</h1>
        <p style="font-size: 11px; opacity: 0.5; margin-top: 5px;">Total Supply (1,000,000,000 ONC)</p>
    </div>

    <div class="chart-container">
        <canvas id="tokenChart"></canvas>
    </div>

    <div class="grid">
        <div class="token-card" style="border-color: var(--primary);">
            <div class="card-flex">
                <span class="label">Public Allocation</span>
                <span class="percent">55% <span class="token-val">(550M)</span></span>
            </div>
            <div class="breakdown-box">
                <div class="b-row">
                    <span>Cloud Mining Pool</span>
                    <span class="b-item">40% (400M)</span>
                </div>
                <div class="b-row">
                    <span>Presale Phase</span>
                    <span class="b-item">15% (150M)</span>
                </div>
            </div>
        </div>

        <div class="token-card burn">
            <div class="card-flex">
                <span class="label">Total Supply Burn</span>
                <span class="percent">20% <span class="token-val">(200M)</span></span>
            </div>
        </div>

        <div class="token-card liquidity">
            <div class="card-flex">
                <span class="label">Liquidity Locked</span>
                <span class="percent">15% <span class="token-val">(150M)</span></span>
            </div>
        </div>

        <div class="token-card">
            <div class="card-flex">
                <span class="label">Ecosystem & Dev</span>
                <span class="percent">10% <span class="token-val">(100M)</span></span>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('tokenChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Public', 'Burn', 'Liquidity', 'Ecosystem'],
                datasets: [{
                    data: [55, 20, 15, 10],
                    backgroundColor: ['#a78bfa', '#ef4444', '#10b981', '#222'],
                    borderWidth: 0,
                    hoverOffset: 15
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                cutout: '75%',
                responsive: true,
                maintainAspectRatio: true
            }
        });
    </script>
</body>
</html>
