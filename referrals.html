<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Hub — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Inter;background:#05060f;color:white;padding:15px;padding-bottom:100px;}
        .nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .logo{font-family:'Space Grotesk';font-size:20px;font-weight:800;color:#a78bfa;}
        .code-hero { background: linear-gradient(145deg, #1e1b4b, #0a0b1e); border: 2px solid rgba(167,139,250,0.3); border-radius: 28px; padding: 25px; text-align: center; margin-bottom: 20px;}
        .big-code { font-family: 'Space Grotesk'; font-size: 36px; font-weight: 800; color: #a78bfa; letter-spacing: 5px; margin: 10px 0; display:block; }
        .main-stats { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 15px; margin-bottom: 20px; text-align: center;}
        .total-rev{font-size:28px; font-family:'Space Grotesk'; color:#10b981; font-weight: 700;}
        .lvl-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 18px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom:10px;}
        .select-box { width: 100%; background: #111224; border: 1px solid #a78bfa; color: white; padding: 15px; border-radius: 16px; font-weight: 600; appearance: none; outline: none; margin-bottom: 15px; }
        .history-card { background: rgba(255,255,255,0.01); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; min-height: 100px;}
        .history-item { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .h-name { font-weight: 600; font-size: 14px; color: #fff; display: block;}
        .h-email { font-size: 11px; color: #a78bfa; opacity: 0.7; }
        .lvl-tag { font-size: 9px; padding: 4px 8px; border-radius: 5px; background: rgba(167,139,250,0.1); color: #a78bfa; font-weight: 800; border: 1px solid rgba(167,139,250,0.2); }
        .btn-copy { width: 100%; padding: 15px; border-radius: 15px; border: none; background: #a78bfa; color: #05060f; font-weight: 800; cursor: pointer; margin-top: 10px;}
        #loadMoreBtn { width: 100%; padding: 15px; background: transparent; border: none; color: #a78bfa; font-weight: 700; font-size: 13px; cursor: pointer; display: none; text-align: center;}
    </style>
</head>
<body>

<div class="nav">
    <a href="dashboard.html" style="color:white; text-decoration:none; font-size:24px;">←</a>
    <div class="logo">ONCHYRA</div>
    <div style="width:24px;"></div>
</div>

<div class="code-hero">
    <span style="font-size:10px; opacity:0.5;">INVITE CODE</span>
    <div class="big-code" id="bigCode">...</div>
    <button class="btn-copy" onclick="copyLink()">COPY LINK</button>
</div>

<div class="main-stats">
    <div class="total-rev" id="totalEarn">0.00 ONC</div>
    <span style="font-size:10px; opacity:0.4;">TOTAL NETWORK BALANCE</span>
</div>

<div class="level-list">
    <div class="lvl-card"><div class="lvl-info"><h4>Level 1</h4><p id="eb1">0.00 ONC</p></div><div id="c1" style="font-weight:700; color:#60a5fa;">0</div></div>
    <div class="lvl-card"><div class="lvl-info"><h4>Level 2</h4><p id="eb2">0.00 ONC</p></div><div id="c2" style="font-weight:700; color:#60a5fa;">0</div></div>
    <div class="lvl-card"><div class="lvl-info"><h4>Level 3</h4><p id="eb3">0.00 ONC</p></div><div id="c3" style="font-weight:700; color:#60a5fa;">0</div></div>
</div>

<select class="select-box" id="lvlFilter" onchange="resetAndLoad()">
    <option value="1">Details: Level 1 (refLevel1)</option>
    <option value="2">Details: Level 2 (refLevel2)</option>
    <option value="3">Details: Level 3 (refLevel3)</option>
</select>

<div class="history-card">
    <div id="history"></div>
    <div id="loadMoreBtn" onclick="loadData()">LOAD NEXT PAGE +</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, where, limit, startAfter } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
    authDomain: "onchyra.firebaseapp.com",
    projectId: "onchyra",
    storageBucket: "onchyra.firebasestorage.app",
    messagingSenderId: "441822770982",
    appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let myCode = "";
let lastDoc = null;
const PAGE_LIMIT = 10;

onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    const snap = await getDoc(doc(db, "users", user.uid));
    if (snap.exists()) {
        const d = snap.data();
        myCode = d.referralCode;
        document.getElementById("bigCode").innerText = myCode;

        // Balance calculation using your specific logic
        const c1 = d.refLevel1Count || 0; // Agar count alag field mein hai
        const c2 = d.refLevel2Count || 0;
        const c3 = d.refLevel3Count || 0;

        // Agar counts nahi hain, toh hum manually updateUI mein handle karenge niche
        resetAndLoad();
    }
});

window.resetAndLoad = () => {
    document.getElementById("history").innerHTML = "";
    lastDoc = null;
    loadData();
};

window.loadData = async () => {
    const lvl = parseInt(document.getElementById("lvlFilter").value);
    const container = document.getElementById("history");
    const btn = document.getElementById("loadMoreBtn");
    btn.style.display = "none";

    try {
        // BHAI YAHAN HAI FIX: Field names exactly refLevel1, refLevel2, refLevel3
        let fieldName = "refLevel" + lvl;
        
        let q = query(collection(db, "users"), where(fieldName, "==", myCode), limit(PAGE_LIMIT));
        
        if (lastDoc) q = query(q, startAfter(lastDoc));

        const snap = await getDocs(q);
        
        if (snap.empty && !lastDoc) {
            container.innerHTML = "<p style='padding:30px; text-align:center; opacity:0.3;'>No users found in this level.</p>";
            // Update Card Counts if 0
            document.getElementById("c"+lvl).innerText = "0";
            document.getElementById("eb"+lvl).innerText = "0.00 ONC";
            return;
        }

        // Card update (Approx logic based on results)
        if(!lastDoc) {
             document.getElementById("c"+lvl).innerText = snap.size;
             let rate = lvl===1 ? 0.25 : (lvl===2 ? 0.10 : 0.05);
             document.getElementById("eb"+lvl).innerText = (snap.size * rate).toFixed(2) + " ONC";
        }

        snap.forEach(s => {
            const u = s.data();
            const div = document.createElement("div");
            div.className = "history-item";
            div.innerHTML = `<div><span class="h-name">${u.name || 'User'}</span><span class="h-email">${u.email || 'No Email'}</span></div><div class="lvl-tag">L${lvl}</div>`;
            container.appendChild(div);
            lastDoc = s;
        });

        if (snap.docs.length === PAGE_LIMIT) btn.style.display = "block";
    } catch(e) { console.error("Error:", e); }
};

window.copyLink = () => {
    navigator.clipboard.writeText(window.location.origin + "/register.html?ref=" + myCode);
    alert("Copied! 🚀");
}
</script>
</body>
    </html>
