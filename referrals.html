<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Hub — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Inter;background:#05060f;color:white;padding:15px;padding-bottom:100px;}
        
        .nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .back-btn{color:#a78bfa; text-decoration:none; font-size:28px; font-weight:700; padding: 5px 10px;}
        .logo{font-family:'Space Grotesk';font-size:20px;font-weight:800;color:#a78bfa;}

        .code-hero { background: linear-gradient(145deg, #1e1b4b, #0a0b1e); border: 2px solid rgba(167,139,250,0.3); border-radius: 28px; padding: 25px; text-align: center; margin-bottom: 20px;}
        .big-code { font-family: 'Space Grotesk'; font-size: 36px; font-weight: 800; color: #a78bfa; letter-spacing: 5px; margin: 10px 0; display:block; }
        
        .main-stats { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 20px; margin-bottom: 20px; text-align: center;}
        .total-team-count { font-size: 36px; font-family: 'Space Grotesk'; color: #fff; font-weight: 800; }
        .total-rev{font-size:18px; font-family:'Space Grotesk'; color:#10b981; font-weight: 700; margin-top: 5px;}

        .level-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .lvl-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 18px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center;}
        .lvl-info h4 { font-size: 14px; color: #fff; }
        .lvl-info p { font-size: 10px; color: #10b981; font-weight: 600;}
        .lvl-count { font-weight: 800; color: #60a5fa; font-size: 18px;}

        .select-box { width: 100%; background: #111224; border: 1px solid #a78bfa; color: white; padding: 15px; border-radius: 16px; font-weight: 600; appearance: none; outline: none; margin-bottom: 15px; }

        .history-card { background: rgba(255,255,255,0.01); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden;}
        .history-item { padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; }
        .h-name { font-weight: 600; font-size: 14px; color: #fff; display: block;}
        .h-meta { font-size: 10px; color: #a78bfa; opacity: 0.6; margin-top: 4px; font-family: 'Inter'; display: flex; gap: 10px;}
        .team-badge { background: #10b98122; color: #10b981; padding: 2px 6px; border-radius: 4px; font-weight: 700; border: 1px solid #10b98144;}
        .lvl-tag { font-size: 9px; padding: 4px 8px; border-radius: 5px; background: rgba(167,139,250,0.1); color: #a78bfa; font-weight: 800; border: 1px solid rgba(167,139,250,0.2); text-transform: uppercase;}
        
        .btn-copy { width: 100%; padding: 15px; border-radius: 15px; border: none; background: #a78bfa; color: #05060f; font-weight: 800; cursor: pointer; margin-top: 10px;}
        #loadMoreBtn { width: 100%; padding: 18px; background: rgba(167,139,250,0.05); border: none; color: #a78bfa; font-weight: 800; cursor: pointer; display: none; text-align: center;}
    </style>
</head>
<body>

<div class="nav">
    <a href="dashboard.html" class="back-btn">←</a>
    <div class="logo">NETWORK HUB</div>
    <div style="width:40px;"></div>
</div>

<div class="code-hero">
    <div class="big-code" id="bigCode">...</div>
    <button class="btn-copy" onclick="copyLink()">COPY INVITE LINK</button>
</div>

<div class="main-stats">
    <div class="total-team-count" id="totalTeam">0</div>
    <span style="font-size:10px; opacity:0.4; letter-spacing:1px;">TOTAL NETWORK NODES</span>
    <div class="total-rev" id="totalEarn">0.00 ONC</div>
</div>

<div class="level-list">
    <div class="lvl-card"><div class="lvl-info"><h4>Vanguard (L1)</h4><p id="eb1">0.00 ONC</p></div><div id="c1" class="lvl-count">0</div></div>
    <div class="lvl-card"><div class="lvl-info"><h4>Guardians (L2)</h4><p id="eb2">0.00 ONC</p></div><div id="c2" class="lvl-count">0</div></div>
    <div class="lvl-card"><div class="lvl-info"><h4>Seekers (L3)</h4><p id="eb3">0.00 ONC</p></div><div id="c3" class="lvl-count">0</div></div>
</div>

<select class="select-box" id="lvlFilter" onchange="resetAndRender()">
    <option value="1">Sort by: Vanguard (L1)</option>
    <option value="2">Sort by: Guardians (L2)</option>
    <option value="3">Sort by: Seekers (L3)</option>
</select>

<div class="history-card">
    <div id="history"></div>
    <button id="loadMoreBtn" onclick="renderNextPage()">LOAD MORE MEMBERS +</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
    authDomain: "onchyra.firebaseapp.com",
    projectId: "onchyra",
    storageBucket: "onchyra.firebasestorage.app",
    messagingSenderId: "441822770982",
    appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let myRefCode = "";
let dataStore = { 1: [], 2: [], 3: [] };
let currentPageSize = { 1: 10, 2: 10, 3: 10 };
const teamNames = ["", "Vanguard", "Guardian", "Seeker"];

onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    const userDoc = await getDoc(doc(db, "users", user.uid));
    const d = userDoc.data();
    myRefCode = d.referralCode;
    document.getElementById("bigCode").innerText = myRefCode;

    const l1 = d.refLevel1 || 0;
    const l2 = d.refLevel2 || 0;
    const l3 = d.refLevel3 || 0;

    document.getElementById("totalTeam").innerText = l1 + l2 + l3;
    document.getElementById("c1").innerText = l1;
    document.getElementById("c2").innerText = l2;
    document.getElementById("c3").innerText = l3;
    document.getElementById("eb1").innerText = (l1 * 0.25).toFixed(2) + " ONC";
    document.getElementById("eb2").innerText = (l2 * 0.10).toFixed(2) + " ONC";
    document.getElementById("eb3").innerText = (l3 * 0.05).toFixed(2) + " ONC";
    document.getElementById("totalEarn").innerText = "Network Profit: " + ((l1*0.25)+(l2*0.10)+(l3*0.05)).toFixed(2) + " ONC";

    fetchAll();
});

async function fetchAll() {
    // Fetch all levels using chain logic
    const s1 = await getDocs(query(collection(db, "users"), where("referredBy", "==", myRefCode)));
    s1.forEach(d => dataStore[1].push(d.data()));
    resetAndRender();

    const l1Codes = dataStore[1].map(u => u.referralCode).filter(c => c);
    if(l1Codes.length > 0) {
        for (let i = 0; i < l1Codes.length; i += 10) {
            const s2 = await getDocs(query(collection(db, "users"), where("referredBy", "in", l1Codes.slice(i, i+10))));
            s2.forEach(d => dataStore[2].push(d.data()));
        }
    }
    const l2Codes = dataStore[2].map(u => u.referralCode).filter(c => c);
    if(l2Codes.length > 0) {
        for (let i = 0; i < l2Codes.length; i += 10) {
            const s3 = await getDocs(query(collection(db, "users"), where("referredBy", "in", l2Codes.slice(i, i+10))));
            s3.forEach(d => dataStore[3].push(d.data()));
        }
    }
}

window.resetAndRender = () => {
    const lvl = document.getElementById("lvlFilter").value;
    currentPageSize[lvl] = 10;
    renderDetails();
};

window.renderNextPage = () => {
    const lvl = document.getElementById("lvlFilter").value;
    currentPageSize[lvl] += 10;
    renderDetails();
};

window.renderDetails = () => {
    const lvl = document.getElementById("lvlFilter").value;
    const container = document.getElementById("history");
    const loadBtn = document.getElementById("loadMoreBtn");
    container.innerHTML = "";
    
    const fullList = dataStore[lvl];
    const visibleList = fullList.slice(0, currentPageSize[lvl]);

    if(fullList.length === 0) {
        container.innerHTML = `<p style="padding:40px; text-align:center; opacity:0.3; font-size:12px;">Empty network layer.</p>`;
        loadBtn.style.display = "none";
        return;
    }

    visibleList.forEach(u => {
        // Full Date Logic dd/mm/yy
        let joinDate = "N/A";
        if(u.createdAt) {
            const d = u.createdAt.toDate ? u.createdAt.toDate() : new Date(u.createdAt);
            joinDate = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
        }

        // BHAI YAHAN US BANDE KI TOTAL TEAM SUM HO RAHI HAI (L1+L2+L3)
        const memberTotalTeam = (u.refLevel1 || 0) + (u.refLevel2 || 0) + (u.refLevel3 || 0);

        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `
            <div>
                <span class="h-name">${u.name || 'User'}</span>
                <div class="h-meta">
                    <span>Date: ${joinDate}</span>
                    <span>Team: <b class="team-badge">${memberTotalTeam}</b></span>
                </div>
            </div>
            <div class="lvl-tag">${teamNames[lvl]}</div>
        `;
        container.appendChild(div);
    });

    loadBtn.style.display = (fullList.length > visibleList.length) ? "block" : "none";
};

window.copyLink = () => {
    navigator.clipboard.writeText(window.location.origin + "/register.html?ref=" + myRefCode);
    alert("Copied! 🚀");
}
</script>
</body>
</html>
