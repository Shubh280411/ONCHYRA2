<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONCHYRA — Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#a78bfa; --secondary:#60a5fa; --bg:#03040a; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.1); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:white; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; overflow:hidden; }
        .bg-glow { position:fixed; top:-30%; left:-20%; width:140%; height:140%; background:radial-gradient(circle at 50% 40%, rgba(167,139,250,0.06) 0%, transparent 60%); pointer-events:none; }
        .container { position:relative; z-index:1; text-align:center; max-width:480px; width:100%; }
        .logo { font-family:'Space Grotesk'; font-weight:900; font-size:32px; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:4px; margin-bottom:24px; }
        .icon-wrap { width:72px; height:72px; margin:0 auto 24px; border-radius:50%; background:rgba(167,139,250,0.08); border:1px solid rgba(167,139,250,0.12); display:flex; align-items:center; justify-content:center; animation:float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-8px); } }
        h1 { font-family:'Space Grotesk'; font-weight:900; font-size:clamp(24px,6vw,36px); line-height:1.2; margin-bottom:12px; }
        .sub { font-size:14px; color:rgba(255,255,255,0.4); line-height:1.7; margin-bottom:32px; }
        .sub strong { color:rgba(255,255,255,0.7); font-weight:700; }
        .countdown { display:flex; justify-content:center; gap:16px; margin-bottom:32px; }
        .c-unit { display:flex; flex-direction:column; align-items:center; min-width:64px; }
        .c-num { font-family:'Space Grotesk'; font-weight:900; font-size:clamp(32px,8vw,48px); line-height:1; background:linear-gradient(180deg,#fff 30%,rgba(167,139,250,0.4)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .c-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:rgba(255,255,255,0.2); margin-top:4px; }
        .launch-date { font-size:11px; font-weight:700; color:var(--primary); background:rgba(167,139,250,0.08); border:1px solid rgba(167,139,250,0.12); padding:8px 20px; border-radius:100px; display:inline-flex; align-items:center; gap:8px; }
        .launch-date .dot { width:5px; height:5px; border-radius:50%; background:var(--primary); animation:pulse-dot 1.5s ease-in-out infinite; }
        @keyframes pulse-dot { 0%,100% { opacity:0.3; } 50% { opacity:1; } }
        .features { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:32px; }
        .f-item { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:14px; padding:16px; text-align:center; }
        .f-item svg { width:20px; height:20px; margin-bottom:6px; }
        .f-item .f-label { font-size:10px; font-weight:700; color:rgba(255,255,255,0.5); }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container">
    <img src="https://onchyra.netlify.app/logo.png" alt="ONCHYRA" style="width:64px;height:64px;border-radius:50%;margin:0 auto 16px;display:block;object-fit:cover;" onerror="this.style.display='none'">
    <div class="logo">ONCHYRA</div>
    <div class="icon-wrap">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#ig)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <defs><linearGradient id="ig" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient></defs>
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
    </div>
    <h1>Something Big is Coming</h1>
    <div class="sub">
        We're building the next-generation <strong>Web3 ecosystem</strong> —<br>
        Mining, Trading, Packages, and much more.<br>
        <strong>Launching in a few days.</strong>
    </div>

    <div class="countdown" id="countdownWrap">
        <div class="c-unit"><div class="c-num" id="cdDays">00</div><div class="c-label">Days</div></div>
        <div class="c-unit"><div class="c-num" id="cdHours">00</div><div class="c-label">Hours</div></div>
        <div class="c-unit"><div class="c-num" id="cdMins">00</div><div class="c-label">Min</div></div>
        <div class="c-unit"><div class="c-num" id="cdSecs">00</div><div class="c-label">Sec</div></div>
    </div>

    <div class="launch-date"><span class="dot"></span> Launching June 10, 2026</div>

    <div class="features">
        <div class="f-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            <div class="f-label">Packages</div>
        </div>
        <div class="f-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            <div class="f-label">Deposits</div>
        </div>
        <div class="f-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
            <div class="f-label">Mining</div>
        </div>
        <div class="f-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <div class="f-label">Ranks</div>
        </div>
    </div>
</div>

<script>
    const TARGET = new Date('2026-06-10T00:00:00').getTime();
    function tick() {
        const diff = TARGET - Date.now();
        if (diff <= 0) { document.querySelectorAll('.c-num').forEach(e => e.textContent='00'); return; }
        document.getElementById('cdDays').textContent = String(Math.floor(diff/86400000)).padStart(2,'0');
        document.getElementById('cdHours').textContent = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
        document.getElementById('cdMins').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
        document.getElementById('cdSecs').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
    }
    tick(); setInterval(tick, 1000);
</script>
</body>
</html>
