<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PowerDrop Admin — ONCHYRA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#070816;
color:white;
padding:30px;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, #6d28d9aa, transparent 40%),
radial-gradient(circle at 80% 70%, #2563ebaa, transparent 40%);
z-index:-1;
}

.container{
max-width:900px;
margin:auto;
}

h1{
font-family:'Manrope';
margin-bottom:20px;
background:linear-gradient(90deg,#a78bfa,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.08);
color:white;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#a78bfa,#60a5fa);
color:#070816;
font-weight:700;
cursor:pointer;
width:100%;
}

.event{
margin-top:10px;
padding:14px;
background:rgba(255,255,255,0.06);
border-radius:10px;
}

.delete{
background:#ef4444;
color:white;
margin-top:8px;
}

.small{
font-size:13px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h1>ONCHYRA PowerDrop Admin</h1>

<div class="card">

<h3>Create PowerDrop Event</h3>

<input id="title" placeholder="Event Title">

<input id="reward" type="number" placeholder="Reward (USDT)">

<input id="winners" type="number" placeholder="Number of Winners">

<input id="maxParticipants" type="number" placeholder="Max Participants">

<input id="startTime" type="datetime-local">

<button onclick="createPowerDrop()">Create Event</button>

</div>

<div class="card">

<h3>All PowerDrops</h3>

<div id="events"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
serverTimestamp,
Timestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
authDomain: "onchyra.firebaseapp.com",
projectId: "onchyra",
storageBucket: "onchyra.firebasestorage.app",
messagingSenderId: "441822770982",
appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location="admin-login.html";
}

});

const eventsDiv=document.getElementById("events");

/* CREATE EVENT */

window.createPowerDrop = async()=>{

const title=document.getElementById("title").value;
const reward=Number(document.getElementById("reward").value);
const winners=Number(document.getElementById("winners").value);
const maxParticipants=Number(document.getElementById("maxParticipants").value);
const startTimeValue=document.getElementById("startTime").value;

const startTime=Timestamp.fromDate(new Date(startTimeValue));

await addDoc(collection(db,"powerdrops"),{

title,
reward,
winners,
maxParticipants,
participantsCount:0,
startTime,
createdAt:serverTimestamp()

});

alert("PowerDrop Created");

loadEvents();

}

/* LOAD EVENTS */

async function loadEvents(){

eventsDiv.innerHTML="";

const snap=await getDocs(collection(db,"powerdrops"));

snap.forEach(d=>{

const data=d.data();

eventsDiv.innerHTML+=`

<div class="event">

<b>${data.title}</b>

<div class="small">

Reward: ${data.reward} USDT<br>

Winners: ${data.winners}<br>

Max Participants: ${data.maxParticipants}

</div>

<button class="delete"
onclick="deleteEvent('${d.id}')">

Delete

</button>

</div>

`;

});

}

window.deleteEvent = async(id)=>{

await deleteDoc(doc(db,"powerdrops",id));

loadEvents();

}

loadEvents();

</script>

</body>
</html>
