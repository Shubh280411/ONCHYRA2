<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PowerDrop Admin — ONCHYRA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#070816;
color:white;
padding:30px;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, #6d28d9aa, transparent 40%),
radial-gradient(circle at 80% 70%, #2563ebaa, transparent 40%);
z-index:-1;
}

.container{
max-width:900px;
margin:auto;
}

h1{
font-family:'Manrope';
margin-bottom:20px;
background:linear-gradient(90deg,#a78bfa,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.08);
color:white;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#a78bfa,#60a5fa);
color:#070816;
font-weight:700;
cursor:pointer;
width:100%;
}

.event{
margin-top:10px;
padding:14px;
background:rgba(255,255,255,0.06);
border-radius:10px;
}

.delete{
background:#ef4444;
color:white;
margin-top:8px;
}

.small{
font-size:13px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="container">

<h1>ONCHYRA PowerDrop Admin</h1>

<div class="card">

<h3>Create PowerDrop Event</h3>

<input id="title" placeholder="Event Title">

<input id="reward" type="number" placeholder="Reward (USDT)">

<input id="winners" type="number" placeholder="Number of Winners">

<input id="maxParticipants" type="number" placeholder="Max Participants">

<input id="duration" type="number" placeholder="Duration (days)" value="7">

<input id="startTime" type="datetime-local">

<button onclick="createPowerDrop()">Create Event</button>

</div>

<div class="card">

<h3>All PowerDrops</h3>

<div id="events"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
authDomain: "onchyra.firebaseapp.com",
projectId: "onchyra",
storageBucket: "onchyra.firebasestorage.app",
messagingSenderId: "441822770982",
appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const API = 'https://onchyra-backend.onrender.com/api';

let adminUid = null;

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location="admin-login.html";
} else {
    adminUid = user.uid;
}

});

const eventsDiv=document.getElementById("events");

window.createPowerDrop = async()=>{

const title=document.getElementById("title").value;
const reward=Number(document.getElementById("reward").value);
const winners=Number(document.getElementById("winners").value);
const maxParticipants=Number(document.getElementById("maxParticipants").value);
const duration=Number(document.getElementById("duration").value) || 7;
const startTimeValue=document.getElementById("startTime").value;
const startTime = startTimeValue ? new Date(startTimeValue).getTime() : Date.now();

try {
    const res = await fetch(API + '/powerdrop/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-auth-uid': adminUid },
        body: JSON.stringify({ title, reward, winners, maxParticipants, duration, startTime })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    alert("PowerDrop Created");
    loadEvents();
} catch(e) {
    alert("Error: " + e.message);
}

}

async function loadEvents(){

eventsDiv.innerHTML="";

try {
    const res = await fetch(API + '/powerdrop/all', { headers: { 'x-auth-uid': adminUid } });
    const events = await res.json();

    events.forEach(d=>{
        eventsDiv.innerHTML+=`

        <div class="event">

        <b>${d.title}</b>

        <div class="small">

        Reward: ${d.reward} USDT<br>

        Winners: ${d.winners}<br>

        Max Participants: ${d.maxParticipants}<br>

        Duration: ${d.duration || 7} days

        </div>

        <button class="delete"
        onclick="deleteEvent('${d.id}')">

        Delete

        </button>

        </div>

        `;
    });
} catch(e) {
    eventsDiv.innerHTML = '<div class="small">Error loading events</div>';
}

}

window.deleteEvent = async(id)=>{

if (!confirm("Delete this PowerDrop?")) return;

try {
    const res = await fetch(API + '/powerdrop/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-auth-uid': adminUid },
        body: JSON.stringify({ id })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    loadEvents();
} catch(e) {
    alert("Error: " + e.message);
}

}

loadEvents();

</script>

</body>
</html>
