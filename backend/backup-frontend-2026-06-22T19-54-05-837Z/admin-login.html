<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login — ONCHYRA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#070816;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, #6d28d9aa, transparent 40%),
radial-gradient(circle at 80% 70%, #2563ebaa, transparent 40%);
z-index:-1;
}

.card{
width:360px;
padding:40px;
border-radius:18px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
text-align:center;
}

h1{
font-family:'Manrope';
margin-bottom:20px;
background:linear-gradient(90deg,#a78bfa,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.08);
color:white;
}

button{
width:100%;
margin-top:18px;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#a78bfa,#60a5fa);
color:#0b0b20;
font-weight:700;
cursor:pointer;
}

.note{
margin-top:10px;
font-size:0.8rem;
opacity:0.7;
}

</style>

</head>

<body>

<div class="card">

<h1>ONCHYRA ADMIN</h1>

<input id="email" type="email" placeholder="Admin Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="note">
Authorized admins only
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
authDomain: "onchyra.firebaseapp.com",
projectId: "onchyra",
storageBucket: "onchyra.firebasestorage.app",
messagingSenderId: "441822770982",
appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7",
measurementId: "G-JSKSQR2B29"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try{

const userCred = await signInWithEmailAndPassword(auth,email,password);

const uid = userCred.user.uid;

const adminDoc = await getDoc(doc(db,"admins",uid));

if(!adminDoc.exists()){

alert("Access denied. Not an admin.");
return;

}

window.location.href="admin.html";

}

catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
