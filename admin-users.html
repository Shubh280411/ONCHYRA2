<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #05060f; color: white; padding: 20px; display: none; }
        .container { max-width: 500px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; backdrop-filter: blur(10px); }
        h1 { text-align: center; margin-bottom: 20px; background: linear-gradient(90deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; border: 1px solid transparent; transition: 0.3s; }
        input:focus { border-color: #3b82f6; }
        
        .search-results { position: absolute; top: 100%; left: 0; width: 100%; background: #111225; border: 1px solid #3b82f6; border-radius: 12px; max-height: 250px; overflow-y: auto; z-index: 999; display: none; margin-top: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .search-item { padding: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-item:hover { background: #3b82f6; }

        .info-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: none; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .banned { background: #ef4444; color: white; }
        .active { background: #22c55e; color: white; }
        
        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .level-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.08); }
        .level-item b { font-size: 18px; color: #a78bfa; display: block; }

        .row { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .primary-btn { background: #3b82f6; color: white; }
        .ban-btn { background: #ef4444; color: white; }
        .unban-btn { background: #22c55e; color: white; }
        .quick-btn { background: rgba(255,255,255,0.1); color: white; font-size: 11px; padding: 8px; }
        .quick-btn:hover { background: #60a5fa; }

        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 14px 24px; border-radius: 12px; font-weight: 700; font-size: 13px; display: none; z-index: 3000; }
        .toast.success { background: #22c55e; color: white; }
        .toast.error { background: #ef4444; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>ONCHYRA Panel 🛰️</h1>
        <button onclick="logout()" style="flex:none; background:none; color:#ef4444; font-size:12px; cursor:pointer; font-weight:bold;">Logout</button>
    </div>

    <div class="card">
        <h3>Find Miner 🕵️‍♂️</h3>
        <input id="search" placeholder="Name, Email or Referral Code..." oninput="handleSearchInput(this.value)" autocomplete="off">
        <div id="searchResults" class="search-results"></div>

        <div id="info" class="info-box"></div>
    </div>

    <div class="card" id="actions" style="display:none;">
        <h3>Admin Actions ⚙️</h3>
        <input id="amount" type="number" placeholder="Enter ONC Amount">
        
        <div class="row">
            <button class="quick-btn" onclick="setAmt(10)">+10 ONC</button>
            <button class="quick-btn" onclick="setAmt(50)">+50 ONC</button>
            <button class="quick-btn" onclick="setAmt(100)">+100 ONC</button>
        </div>

        <div class="row">
            <button class="primary-btn" onclick="updateOnc(true)">Add Balance</button>
            <button style="background:#334155; color:white;" onclick="updateOnc(false)">Remove</button>
        </div>
        <div class="row" id="banToggleArea"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, updateDoc, collection, getDocs, increment, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
        authDomain: "onchyra.firebaseapp.com",
        projectId: "onchyra",
        storageBucket: "onchyra.firebasestorage.app",
        messagingSenderId: "441822770982",
        appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUID = null;
    let currentUserData = null;
    let adminUID = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            window.location.replace("login.html");
        } else {
            try {
                const adminSnap = await getDoc(doc(db, 'admins', user.uid));
                if (!adminSnap.exists() || adminSnap.data().role !== 'admin') {
                    document.body.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444;font-family:Inter;"><h2>Access Denied</h2><p style="opacity:0.4;margin-top:8px;">Admin access required.</p></div>';
                    document.body.style.display = 'block';
                    return;
                }
                adminUID = user.uid;
                document.body.style.display = "block";
            } catch(e) {
                console.error(e);
            }
        }
    });

    window.logout = () => {
        signOut(auth).then(() => {
            window.location.replace("login.html");
        });
    };

    window.handleSearchInput = (val) => {
        document.getElementById("info").style.display = "none";
        document.getElementById("actions").style.display = "none";
        fetchUsers(val);
    };

    window.fetchUsers = async (val) => {
        const resDiv = document.getElementById("searchResults");
        if (val.length < 2) { resDiv.style.display = "none"; return; }
        
        try {
            const snap = await getDocs(collection(db, "users"));
            resDiv.innerHTML = "";
            let found = false;
            
            snap.forEach(d => {
                const u = d.data();
                const sk = val.toLowerCase();
                const nameMatch = u.name && u.name.toLowerCase().includes(sk);
                const emailMatch = u.email && u.email.toLowerCase().includes(sk);
                const refMatch = u.referralCode && u.referralCode.toLowerCase().includes(sk);

                if (nameMatch || emailMatch || refMatch) {
                    found = true;
                    const item = document.createElement("div");
                    item.className = "search-item";
                    item.innerHTML = `
                        <b>${u.name}</b> <small style="color:#60a5fa;">[${u.referralCode || 'N/A'}]</small><br>
                        <small style="color:#94a3b8">${u.email}</small>
                    `;
                    item.onclick = () => selectUser(d.id, u);
                    resDiv.appendChild(item);
                }
            });
            resDiv.style.display = found ? "block" : "none";
        } catch (e) {
            console.error("Fetch Error:", e);
        }
    };

    window.setAmt = (val) => { document.getElementById("amount").value = val; };

    function selectUser(uid, data) {
        currentUID = uid;
        currentUserData = data;
        document.getElementById("searchResults").style.display = "none";
        document.getElementById("search").value = data.name;
        document.getElementById("info").style.display = "block";
        document.getElementById("actions").style.display = "block";

        const isBanned = data.banned === true;
        const lastSeen = data.lastActive ? new Date(data.lastActive).toLocaleString() : "Never";
        const referrer = data.referredBy || "Direct Join";
        const userRefCode = data.referralCode || "Not Set";

        document.getElementById("info").innerHTML = `
            <div class="status-badge ${isBanned ? 'banned' : 'active'}">${isBanned ? 'BANNED' : 'ACTIVE'}</div>
            <h2>${data.name} ${data.streak ? '🔥'+data.streak : ''}</h2>
            
            <div style="background:rgba(255,255,255,0.03); padding:10px; border-radius:10px; margin-top:10px; font-size:12px; line-height:1.5;">
                <p><b>Email:</b> ${data.email}</p>
                <p><b>Referral Code:</b> <span style="color:#facc15; font-weight:bold;">${userRefCode}</span></p>
                <p style="color:#60a5fa; margin-top:4px;"><b>Referred By:</b> ${referrer}</p>
                <p style="color:#a78bfa;"><b>Last Active:</b> ${lastSeen}</p>
                <p><b>UID:</b> <small style="color:#94a3b8">${uid}</small></p>
            </div>

            <p style="margin-top:15px; font-size:20px;">Balance: <b style="color:#22c55e">${Number(data.balance || 0).toFixed(4)} ONC</b></p>
            
            <div class="level-grid">
                <div class="level-item"><small>L1 Refs</small><b>${data.refLevel1 || 0}</b></div>
                <div class="level-item"><small>L2 Refs</small><b>${data.refLevel2 || 0}</b></div>
                <div class="level-item"><small>L3 Refs</small><b>${data.refLevel3 || 0}</b></div>
            </div>
        `;

        document.getElementById("banToggleArea").innerHTML = `
            <button class="${isBanned ? 'unban-btn' : 'ban-btn'}" onclick="handleBan(${!isBanned})">
                ${isBanned ? 'Unban User' : 'Ban User'}
            </button>
        `;
    }

    function showToast(msg, error = false) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.className = 'toast ' + (error ? 'error' : 'success');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    window.updateOnc = async (isAdd) => {
        const amtInput = document.getElementById("amount");
        const amt = parseFloat(amtInput.value);
        if (!currentUID || isNaN(amt)) {
            showToast("Please enter a valid amount", true);
            return;
        }
        if (!confirm(`Confirm ${isAdd ? 'Add' : 'Remove'} ${amt} ONC for ${currentUserData?.name || 'user'}?`)) return;

        try {
            // Step 1: Save transaction to admin_transactions (audit trail)
            await setDoc(doc(collection(db, "admin_transactions")), {
                adminId: adminUID,
                targetUserId: currentUID,
                targetUserName: currentUserData?.name || 'Unknown',
                amount: amt,
                type: isAdd ? 'add' : 'remove',
                previousBalance: currentUserData?.balance || 0,
                newBalance: (currentUserData?.balance || 0) + (isAdd ? amt : -amt),
                createdAt: serverTimestamp()
            });

            // Step 2: Update balance
            await updateDoc(doc(db, "users", currentUID), {
                balance: increment(isAdd ? amt : -amt)
            });

            showToast(`${amt} ONC ${isAdd ? 'added' : 'removed'} successfully!`);
            amtInput.value = '';
        } catch(e) {
            showToast('Error: ' + e.message, true);
        }
    };

    window.handleBan = async (newStatus) => {
        if (!currentUID) return;
        if (!confirm(`Are you sure you want to ${newStatus ? 'BAN' : 'UNBAN'} ${currentUserData?.name}?`)) return;
        try {
            await updateDoc(doc(db, "users", currentUID), { banned: newStatus });
            showToast(`User ${newStatus ? 'banned' : 'unbanned'}!`);
            currentUserData.banned = newStatus;
            selectUser(currentUID, currentUserData);
        } catch(e) {
            showToast('Error: ' + e.message, true);
        }
    };
</script>
</body>
</html>
