<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONCHYRA Admin — Fixed Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #070816; color: white; padding: 20px; opacity: 0; transition: opacity 0.5s; }
        .container { max-width: 500px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; }
        input { width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; }
        
        /* Dropdown Suggestions */
        .search-results { 
            position: absolute; top: 100%; left: 0; width: 100%; 
            background: #1a1b3a; border: 1px solid #3b82f6; border-radius: 12px; 
            max-height: 250px; overflow-y: auto; z-index: 999; display: none; margin-top: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .search-item { padding: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-item:hover { background: #2563eb; }
        .search-item b { color: #fff; display: block; }
        .search-item span { font-size: 11px; color: #cbd5e1; }

        .info-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: none; }
        .total-team { background: rgba(59, 130, 246, 0.2); padding: 10px; border-radius: 12px; text-align: center; margin: 15px 0; color: #60a5fa; font-weight: bold; }
        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .level-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .row { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .primary-btn { background: #3b82f6; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; margin-bottom:20px;">Admin Control</h1>

    <div class="card">
        <h3>Find Miner ⚡</h3>
        <input id="search" placeholder="Type Name or Email..." oninput="fetchUsers(this.value)" autocomplete="off">
        <div id="searchResults" class="search-results"></div>

        <div id="info" class="info-box">
            </div>
    </div>

    <div class="card" id="actions" style="display:none;">
        <h3>Manage Balance</h3>
        <input id="amount" type="number" placeholder="Enter Amount">
        <div class="row">
            <button class="primary-btn" onclick="updateOnc(true)">Add ONC</button>
            <button style="background:#475569; color:white;" onclick="updateOnc(false)">Remove</button>
        </div>
        <div class="row">
            <button style="background:#ef4444; color:white;" onclick="ban(true)">Ban User</button>
            <button style="background:#22c55e; color:white;" onclick="ban(false)">Unban</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, query, where, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
        authDomain: "onchyra.firebaseapp.com",
        projectId: "onchyra",
        storageBucket: "onchyra.firebasestorage.app",
        messagingSenderId: "441822770982",
        appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUID = null;
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "admin-login.html";
        else document.body.style.opacity = "1";
    });

    // --- SMART FETCH LOGIC ---
    window.fetchUsers = async (val) => {
        const resDiv = document.getElementById("searchResults");
        if (val.length < 2) { resDiv.style.display = "none"; return; }

        try {
            const snap = await getDocs(collection(db, "users"));
            resDiv.innerHTML = "";
            let found = false;

            snap.forEach(d => {
                const u = d.data();
                const nameMatch = u.name && u.name.toLowerCase().includes(val.toLowerCase());
                const emailMatch = u.email && u.email.toLowerCase().includes(val.toLowerCase());

                if (nameMatch || emailMatch) {
                    found = true;
                    const item = document.createElement("div");
                    item.className = "search-item";
                    item.innerHTML = `<b>${u.name}</b><span>${u.email}</span>`;
                    item.onclick = () => selectUser(d.id, u);
                    resDiv.appendChild(item);
                }
            });

            resDiv.style.display = found ? "block" : "none";
        } catch (e) { console.error(e); }
    };

    function selectUser(uid, data) {
        currentUID = uid;
        currentUser = data;
        document.getElementById("searchResults").style.display = "none";
        document.getElementById("search").value = data.name;
        document.getElementById("info").style.display = "block";
        document.getElementById("actions").style.display = "block";

        const l1 = Number(data.l1 || data.referrals || 0);
        const l2 = Number(data.l2 || 0);
        const l3 = Number(data.l3 || 0);

        document.getElementById("info").innerHTML = `
            <h2>${data.name} ${data.streak ? '🔥'+data.streak : ''}</h2>
            <p style="color:#94a3b8; font-size:12px;">UID: ${uid}</p>
            <p style="margin-top:10px;">Balance: <b style="color:#60a5fa">${Number(data.balance || 0).toFixed(4)} ONC</b></p>
            <div class="total-team">Team Size: ${l1 + l2 + l3}</div>
            <div class="level-grid">
                <div class="level-item"><small>L1</small><br><b>${l1}</b></div>
                <div class="level-item"><small>L2</small><br><b>${l2}</b></div>
                <div class="level-item"><small>L3</small><br><b>${l3}</b></div>
            </div>
        `;
    }

    window.updateOnc = async (isAdd) => {
        const amt = parseFloat(document.getElementById("amount").value);
        if (!currentUID || isNaN(amt)) return alert("Check user/amount!");
        const change = isAdd ? amt : -amt;
        await updateDoc(doc(db, "users", currentUID), { balance: increment(change) });
        alert("Balance Updated!");
        location.reload(); // Refresh to see changes
    };

    window.ban = async (status) => {
        if (!currentUID) return;
        await updateDoc(doc(db, "users", currentUID), { banned: status });
        alert(status ? "User Banned" : "User Unbanned");
    };
</script>
</body>
</html>
