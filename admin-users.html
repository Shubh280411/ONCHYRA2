<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Users — ONCHYRA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter',sans-serif;
background:#070816;
color:white;
padding:30px;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, #6d28d9aa, transparent 40%),
radial-gradient(circle at 80% 70%, #2563ebaa, transparent 40%);
z-index:-1;
}

.container{
max-width:850px;
margin:auto;
}

h1{
font-family:'Manrope';
margin-bottom:25px;
background:linear-gradient(90deg,#a78bfa,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.08);
color:white;
}

button{
margin-top:12px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#a78bfa,#60a5fa);
color:#070816;
font-weight:700;
cursor:pointer;
width:100%;
}

.row{
display:flex;
gap:10px;
}

.smallBtn{
flex:1;
}

.ban{
background:#ef4444;
color:white;
}

.unban{
background:#22c55e;
color:#022c22;
}

.info{
margin-top:10px;
font-size:15px;
line-height:1.6;
}

</style>

</head>

<body>

<div class="container">

<h1>ONCHYRA User Management</h1>

<div class="card">

<h3>Search User (UID or Email)</h3>

<input id="search" placeholder="Enter UID or Email">

<button onclick="searchUser()">Search</button>

<div class="info" id="info"></div>

</div>

<div class="card">

<h3>Adjust Balance</h3>

<input id="amount" type="number" placeholder="ONC Amount">

<div class="row">

<button class="smallBtn" onclick="addOnc()">Add ONC</button>

<button class="smallBtn" onclick="removeOnc()">Remove ONC</button>

</div>

</div>

<div class="card">

<h3>User Control</h3>

<div class="row">

<button class="smallBtn ban" onclick="banUser()">Ban User</button>

<button class="smallBtn unban" onclick="unbanUser()">Unban User</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
collection,
query,
where,
getDocs,
increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
authDomain: "onchyra.firebaseapp.com",
projectId: "onchyra",
storageBucket: "onchyra.firebasestorage.app",
messagingSenderId: "441822770982",
appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

/* ADMIN LOGIN CHECK */

onAuthStateChanged(auth,(user)=>{

if(!user){

alert("Admin login required");

window.location="admin-login.html";

}

});

let currentUID=null;
let currentUser=null;

/* SEARCH USER */

window.searchUser = async()=>{

const value=document.getElementById("search").value.trim();

let userDoc = await getDoc(doc(db,"users",value));

if(userDoc.exists()){

currentUID=value;
currentUser=userDoc.data();

}else{

const q=query(collection(db,"users"),where("email","==",value));

const snap=await getDocs(q);

if(snap.empty){

info.innerHTML="User not found";
return;

}

const docSnap=snap.docs[0];

currentUID=docSnap.id;
currentUser=docSnap.data();

}

showUser();

}

/* SHOW USER INFO */

function showUser(){

info.innerHTML=`
Name: ${currentUser.name}<br>
Email: ${currentUser.email}<br>
Balance: ${currentUser.balance} ONC<br>
Referrals: ${currentUser.referrals}<br>
Banned: ${currentUser.banned}
`;

}

/* ADD ONC */

window.addOnc = async()=>{

if(!currentUID)return alert("Search user first");

const amount=Number(document.getElementById("amount").value);

await updateDoc(doc(db,"users",currentUID),{

balance:increment(amount)

});

currentUser.balance += amount;

showUser();

alert("ONC Added");

}

/* REMOVE ONC */

window.removeOnc = async()=>{

if(!currentUID)return alert("Search user first");

const amount=Number(document.getElementById("amount").value);

await updateDoc(doc(db,"users",currentUID),{

balance:increment(-amount)

});

currentUser.balance -= amount;

showUser();

alert("ONC Removed");

}

/* BAN USER */

window.banUser = async()=>{

if(!currentUID)return alert("Search user first");

await updateDoc(doc(db,"users",currentUID),{

banned:true

});

currentUser.banned=true;

showUser();

alert("User banned");

}

/* UNBAN USER */

window.unbanUser = async()=>{

if(!currentUID)return alert("Search user first");

await updateDoc(doc(db,"users",currentUID),{

banned:false

});

currentUser.banned=false;

showUser();

alert("User unbanned");

}

</script>

</body>
</html>
