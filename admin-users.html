<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #05060f; color: white; padding: 20px; opacity: 0; transition: opacity 0.5s; }
        .container { max-width: 500px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; backdrop-filter: blur(10px); }
        h1 { text-align: center; margin-bottom: 20px; background: linear-gradient(90deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; transition: 0.3s; }
        input:focus { background: rgba(255,255,255,0.15); box-shadow: 0 0 0 2px #3b82f6; }
        
        /* Search List */
        .search-results { position: absolute; top: 100%; left: 0; width: 100%; background: #111225; border: 1px solid #3b82f6; border-radius: 12px; max-height: 250px; overflow-y: auto; z-index: 999; display: none; margin-top: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .search-item { padding: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-item:hover { background: #3b82f6; }
        .search-item b { display: block; color: #fff; }
        .search-item span { font-size: 11px; color: #94a3b8; }

        /* Kundali UI */
        .info-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: none; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .banned { background: #ef4444; color: white; }
        .active { background: #22c55e; color: white; }
        .total-team { background: rgba(96, 165, 250, 0.1); border: 1px dashed #3b82f6; padding: 12px; border-radius: 12px; text-align: center; margin: 15px 0; color: #60a5fa; font-weight: bold; font-size: 18px; }
        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .level-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.08); }
        .level-item small { font-size: 10px; color: #94a3b8; text-transform: uppercase; }
        .level-item b { font-size: 18px; color: #a78bfa; display: block; }

        .row { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .primary-btn { background: #3b82f6; color: white; }
        .primary-btn:hover { background: #2563eb; }
    </style>
</head>
<body>

<div class="container">
    <h1>ONCHYRA Panel 🛰️</h1>

    <div class="card">
        <h3>Search Miner 🕵️‍♂️</h3>
        <input id="search" placeholder="Enter Name or Email..." oninput="fetchUsers(this.value)" autocomplete="off">
        <div id="searchResults" class="search-results"></div>

        <div id="info" class="info-box">
            </div>
    </div>

    <div class="card" id="actions" style="display:none;">
        <h3>Manage User ⚙️</h3>
        <input id="amount" type="number" placeholder="Enter ONC Amount">
        <div class="row">
            <button class="primary-btn" onclick="updateOnc(true)">Add Balance</button>
            <button style="background:#334155; color:white;" onclick="updateOnc(false)">Remove</button>
        </div>
        <div class="row">
            <button id="banBtn" onclick="toggleBan()"></button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
        authDomain: "onchyra.firebaseapp.com",
        projectId: "onchyra",
        storageBucket: "onchyra.firebasestorage.app",
        messagingSenderId: "441822770982",
        appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUID = null;
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (!user) window.location.href = "admin-login.html";
        else document.body.style.opacity = "1";
    });

    window.fetchUsers = async (val) => {
        const resDiv = document.getElementById("searchResults");
        if (val.length < 2) { resDiv.style.display = "none"; return; }

        try {
            const snap = await getDocs(collection(db, "users"));
            resDiv.innerHTML = "";
            let found = false;

            snap.forEach(d => {
                const u = d.data();
                const match = (u.name && u.name.toLowerCase().includes(val.toLowerCase())) || 
                              (u.email && u.email.toLowerCase().includes(val.toLowerCase()));

                if (match) {
                    found = true;
                    const item = document.createElement("div");
                    item.className = "search-item";
                    item.innerHTML = `<b>${u.name || 'No Name'}</b><span>${u.email}</span>`;
                    item.onclick = () => selectUser(d.id, u);
                    resDiv.appendChild(item);
                }
            });
            resDiv.style.display = found ? "block" : "none";
        } catch (e) { console.error(e); }
    };

    function selectUser(uid, data) {
        currentUID = uid;
        currentUser = data;
        document.getElementById("searchResults").style.display = "none";
        document.getElementById("search").value = data.name;
        document.getElementById("info").style.display = "block";
        document.getElementById("actions").style.display = "block";

        // Team Logic: Fetching from all possible field names
        const l1 = Number(data.l1 || data.referrals || 0);
        const l2 = Number(data.l2 || data.referrals_l2 || 0);
        const l3 = Number(data.l3 || data.referrals_l3 || 0);
        const isBanned = data.banned === true;

        const banBtn = document.getElementById("banBtn");
        banBtn.innerText = isBanned ? "✅ UNBAN USER" : "🚫 BAN USER";
        banBtn.style.background = isBanned ? "#22c55e" : "#ef4444";
        banBtn.style.color = "white";

        document.getElementById("info").innerHTML = `
            <div class="status-badge ${isBanned ? 'banned' : 'active'}">
                ${isBanned ? 'BANNED' : 'ACTIVE MINER'}
            </div>
            <h2 style="font-size:24px;">${data.name} ${data.streak ? '🔥'+data.streak : ''}</h2>
            <p style="color:#94a3b8; font-size:12px; margin-bottom:10px;">UID: ${uid}</p>
            
            <p>Balance: <b style="color:#60a5fa; font-size:18px;">${Number(data.balance || 0).toFixed(4)} ONC</b></p>
            
            <div class="total-team">Total Team: ${l1 + l2 + l3}</div>
            
            <div class="level-grid">
                <div class="level-item"><small>L1 (Direct)</small><b>${l1}</b></div>
                <div class="level-item"><small>L2 (Sub)</small><b>${l2}</b></div>
                <div class="level-item"><small>L3 (Deep)</small><b>${l3}</b></div>
            </div>
        `;
    }

    window.updateOnc = async (isAdd) => {
        const amt = parseFloat(document.getElementById("amount").value);
        if (!currentUID || isNaN(amt)) return alert("Select user & enter amount!");
        const change = isAdd ? amt : -amt;
        
        if(confirm(`Confirm ${isAdd?'Add':'Remove'} ${amt} ONC?`)) {
            await updateDoc(doc(db, "users", currentUID), { balance: increment(change) });
            alert("Success! Reloading...");
            location.reload();
        }
    };

    window.toggleBan = async () => {
        if (!currentUID) return;
        const newStatus = !currentUser.banned;
        if(confirm(`Sure you want to ${newStatus ? 'BAN' : 'UNBAN'} this user?`)) {
            await updateDoc(doc(db, "users", currentUID), { banned: newStatus });
            alert("Status Updated!");
            location.reload();
        }
    };
</script>
</body>
</html>
