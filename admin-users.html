<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONCHYRA Control — Kundali Mode</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #070816; color: white; padding: 20px; opacity: 0; transition: opacity 0.5s; }
        body::before { content: ""; position: fixed; inset: 0; background: radial-gradient(circle at 20% 30%, #6d28d922, transparent 40%), radial-gradient(circle at 80% 70%, #2563eb22, transparent 40%); z-index: -1; }
        .container { max-width: 500px; margin: auto; }
        h1 { font-family: 'Manrope'; margin-bottom: 20px; text-align: center; background: linear-gradient(90deg,#a78bfa,#60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px); position: relative;}
        input { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 12px; background: rgba(255,255,255,0.08); color: white; font-size: 16px; outline: none; border: 1px solid transparent; transition: 0.3s; }
        input:focus { border-color: #60a5fa; background: rgba(255,255,255,0.12); }
        
        /* SEARCH SUGGESTIONS STYLE */
        .search-results { position: absolute; top: 100%; left: 0; width: 100%; background: #111225; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 10; display: none; margin-top: 5px;}
        .search-item { padding: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; color: #94a3b8;}
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .search-item span { color: white; font-weight: bold; }

        .info-box { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); display: none; }
        .streak-badge { background: linear-gradient(90deg, #f59e0b, #ef4444); padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 800; margin-left: 8px; }
        .total-team { background: rgba(96, 165, 250, 0.1); border: 1px dashed #60a5fa; padding: 10px; border-radius: 12px; text-align: center; margin-top: 15px; font-weight: bold; color: #60a5fa; }
        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .level-item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .level-item span { display: block; font-size: 16px; font-weight: 700; color: #a78bfa; }
        .level-item label { font-size: 9px; color: #94a3b8; text-transform: uppercase; }
        .row { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .primary-btn { background: linear-gradient(135deg,#a78bfa,#60a5fa); color: #070816; }
        .ban-btn { background: #ef4444; color: white; }
        .unban-btn { background: #22c55e; color: white; }
        .quick-pills { display: flex; gap: 8px; margin-top: 10px; }
        .pill { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>ONCHYRA Control</h1>

    <div class="card">
        <h3>Fast Search (Auto-Suggest) ⚡</h3>
        <input id="search" placeholder="Type Name or Email..." oninput="getSuggestions(this.value)" autocomplete="off">
        <div id="searchResults" class="search-results"></div>
        <div id="info" class="info-box">Select a miner from the list...</div>
    </div>

    <div class="card">
        <h3>Adjust Balance 💰</h3>
        <input id="amount" type="number" placeholder="Enter Amount">
        <div class="quick-pills">
            <div class="pill" onclick="document.getElementById('amount').value=1">+1 ONC</div>
            <div class="pill" onclick="document.getElementById('amount').value=5">+5 ONC</div>
            <div class="pill" onclick="document.getElementById('amount').value=10">+10 ONC</div>
        </div>
        <div class="row">
            <button class="primary-btn" onclick="adjustOnc(true)">Add Balance</button>
            <button style="background:rgba(255,255,255,0.1); color:white;" onclick="adjustOnc(false)">Remove</button>
        </div>
    </div>

    <div class="card">
        <h3>Account Control 🛡️</h3>
        <div class="row">
            <button class="ban-btn" onclick="toggleBan(true)">Ban User</button>
            <button class="unban-btn" onclick="toggleBan(false)">Unban</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
        authDomain: "onchyra.firebaseapp.com",
        projectId: "onchyra",
        storageBucket: "onchyra.firebasestorage.app",
        messagingSenderId: "441822770982",
        appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let currentUID = null;
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (!user) { window.location.href = "admin-login.html"; }
        else { document.body.style.opacity = "1"; }
    });

    // --- AUTO-SUGGEST LIST ---
    window.getSuggestions = async (val) => {
        const resultsDiv = document.getElementById("searchResults");
        if (val.length < 2) { resultsDiv.style.display = "none"; return; }

        // Fetch users matching Name prefix
        const q = query(collection(db, "users"), where("name", ">=", val), where("name", "<=", val + '\uf8ff'));
        const snap = await getDocs(q);

        resultsDiv.innerHTML = ""; // Clear old list

        if (!snap.empty) {
            resultsDiv.style.display = "block";
            snap.forEach(doc => {
                const userData = doc.data();
                const div = document.createElement("div");
                div.className = "search-item";
                div.innerHTML = `<span>${userData.name}</span> (${userData.email})`;
                div.onclick = () => selectUser(doc.id, userData); // Tap to Kundali
                resultsDiv.appendChild(div);
            });
        } else {
            resultsDiv.style.display = "none";
        }
    };

    // --- LOAD KUNDALI (On Tap) ---
    function selectUser(uid, data) {
        currentUID = uid;
        currentUser = data;
        
        // Hide list, show info box
        document.getElementById("searchResults").style.display = "none";
        document.getElementById("search").value = currentUser.name; // Fill input
        document.getElementById("info").style.display = "block";

        const info = document.getElementById("info");
        const l1 = Number(currentUser.l1 || currentUser.referrals || 0);
        const l2 = Number(currentUser.l2 || 0);
        const l3 = Number(currentUser.l3 || 0);
        const totalTeam = l1 + l2 + l3;

        info.innerHTML = `
            <div style="font-size: 18px; font-weight: 700;">${currentUser.name} ${currentUser.streak > 0 ? `<span class="streak-badge">🔥 ${currentUser.streak}</span>` : ''}</div>
            <div style="color: #94a3b8; font-size: 12px; margin-bottom: 8px;">Email: ${currentUser.email}</div>
            <div style="font-size: 14px;">Balance: <b style="color:#60a5fa">${parseFloat(currentUser.balance || 0).toFixed(4)} ONC</b></div>
            
            <div class="total-team">👥 Total Network: ${totalTeam} Users</div>

            <div class="level-grid">
                <div class="level-item"><label>L1 (Direct)</label><span>${l1}</span></div>
                <div class="level-item"><label>L2 (Sub)</label><span>${l2}</span></div>
                <div class="level-item"><label>L3 (Deep)</label><span>${l3}</span></div>
            </div>
        `;
    }

    // --- BALANCE ACTIONS (CONFIRMATION ADDED) ---
    window.adjustOnc = async (isAdd) => {
        if (!currentUID) return alert("Select user first!");
        const amt = parseFloat(document.getElementById("amount").value);
        if (isNaN(amt) || amt <= 0) return alert("Enter valid amount!");
        const final = isAdd ? amt : -amt;

        if (confirm(`Confirm: ${isAdd ? 'Add' : 'Remove'} ${amt} ONC to ${currentUser.name}?`)) {
            await updateDoc(doc(db, "users", currentUID), { balance: increment(final) });
            currentUser.balance = (currentUser.balance || 0) + final;
            selectUser(currentUID, currentUser); // Refresh UI
            alert("Success!");
        }
    };

    window.toggleBan = async (status) => {
        if (!currentUID) return alert("Select user first!");
        if(confirm(`Are you sure you want to ${status ? 'BAN' : 'UNBAN'} this user?`)) {
            await updateDoc(doc(db, "users", currentUID), { banned: status });
            alert(status ? "User Banned!" : "User Unbanned!");
        }
    };
</script>
</body>
</html>
