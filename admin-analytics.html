<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONCHYRA Analytics — Professional</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Manrope:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter;background:#050610;color:white;padding:20px;}
.container{max-width:1200px;margin:auto;}

/* Header & Status */
.header-flex{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:15px;}
h1{font-family:Manrope;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.net-badge{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:1px;background:rgba(16,185,129,0.1);color:#10b981;border:1px solid #10b981;}

/* Grid Layout */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:25px;}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:20px;position:relative;overflow:hidden;}
.card h4{font-size:13px;opacity:0.6;margin-bottom:10px;text-transform:uppercase;}
.card h2{font-size:32px;color:#fff;}

/* Charts Section */
.chart-row{display:grid;grid-template-columns:1.8fr 1fr;gap:20px;margin-bottom:25px;}
.chart-box{background:rgba(255,255,255,0.03);padding:25px;border-radius:18px;border:1px solid rgba(255,255,255,0.05);}

/* Table Styling */
.table-box{background:rgba(255,255,255,0.02);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,0.05);}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{padding:12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;}
th{color:#a78bfa;font-weight:600;}

/* Action Buttons */
.actions{margin-bottom:20px;display:flex;gap:10px;}
button{padding:10px 20px;border:none;border-radius:10px;background:#a78bfa;color:#050610;font-weight:700;cursor:pointer;transition:0.3s;}
button.sec{background:rgba(255,255,255,0.1);color:white;}
button:hover{opacity:0.8;transform:translateY(-2px);}

@media(max-width:900px){ .chart-row{grid-template-columns:1fr;} }
</style>
</head>

<body>

<div class="container">
    <div class="header-flex">
        <h1>ONCHYRA Analytics</h1>
        <div id="netStatus" class="net-badge">NETWORK: OPTIMAL</div>
    </div>

    <div class="actions">
        <button onclick="loadAnalytics()">🔄 Sync Data</button>
        <button class="sec" onclick="exportData()">📥 Export CSV</button>
    </div>

    <div class="grid">
        <div class="card"><h4>Total Users</h4><h2 id="users">0</h2></div>
        <div class="card"><h4>ONC Mined</h4><h2 id="mined">0</h2></div>
        <div class="card"><h4>Active 24h</h4><h2 id="active">0</h2></div>
        <div class="card"><h4>Avg Balance</h4><h2 id="avgBal">0</h2></div>
    </div>

    <div class="chart-row">
        <div class="chart-box">
            <h3>Mining Intensity (User Growth)</h3>
            <canvas id="growthChart" height="120"></canvas>
        </div>
        <div class="chart-box">
            <h3>Wealth Distribution</h3>
            <canvas id="distChart"></canvas>
        </div>
    </div>

    <div class="grid" style="grid-template-columns: 1fr 1fr;">
        <div class="table-box">
            <h3>🏆 Rich List (Top 10)</h3>
            <table id="minersTable"><tr><td>Loading...</td></tr></table>
        </div>
        <div class="table-box">
            <h3>🔗 Referral Kings</h3>
            <table id="refsTable"><tr><td>Loading...</td></tr></table>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey:"AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
    authDomain:"onchyra.firebaseapp.com",
    projectId:"onchyra",
    storageBucket:"onchyra.firebasestorage.app",
    messagingSenderId:"441822770982",
    appId:"1:441822770982:web:f22f6b95fd5148ce21b3e7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let gChart, dChart;

window.loadAnalytics = async function() {
    console.log("Syncing...");
    const usersSnap = await getDocs(collection(db, "users"));
    
    let totalMined = 0;
    let active24h = 0;
    let whaleCount = 0;
    let proCount = 0;
    let growthMap = {};
    const now = Date.now();

    usersSnap.forEach(doc => {
        const d = doc.data();
        const bal = d.balance || 0;
        totalMined += bal;
        
        // Distribution Logic
        if(bal > 100) whaleCount++;
        else if(bal > 50) proCount++;

        // Active Miners Logic
        if(d.lastClaim && (now - d.lastClaim < 86400000)) active24h++;

        // Growth Map
        if(d.createdAt) {
            let date = d.createdAt.toDate ? d.createdAt.toDate().toLocaleDateString() : new Date(d.createdAt).toLocaleDateString();
            growthMap[date] = (growthMap[date] || 0) + 1;
        }
    });

    // Update Stats
    document.getElementById("users").innerText = usersSnap.size;
    document.getElementById("mined").innerText = totalMined.toFixed(2);
    document.getElementById("active").innerText = active24h;
    document.getElementById("avgBal").innerText = (totalMined / (usersSnap.size || 1)).toFixed(2);

    // Dynamic Network Health
    const health = document.getElementById("netStatus");
    if(active24h > usersSnap.size * 0.3) {
        health.innerText = "NETWORK: HIGH TRAFFIC";
        health.style.color = "#f59e0b"; health.style.borderColor = "#f59e0b";
    }

    // Load Charts
    renderGrowthChart(growthMap);
    renderDistChart(whaleCount, proCount, usersSnap.size - (whaleCount + proCount));

    // Load Tables
    loadTables();
}

function renderGrowthChart(map) {
    const ctx = document.getElementById('growthChart').getContext('2d');
    if(gChart) gChart.destroy();
    gChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Object.keys(map).slice(-7),
            datasets: [{
                label: 'New Users',
                data: Object.values(map).slice(-7),
                borderColor: '#60a5fa',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(96, 165, 250, 0.1)'
            }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
    });
}

function renderDistChart(w, p, r) {
    const ctx = document.getElementById('distChart').getContext('2d');
    if(dChart) dChart.destroy();
    dChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Whales', 'Pros', 'Rookies'],
            datasets: [{
                data: [w, p, r],
                backgroundColor: ['#a78bfa', '#60a5fa', '#1e1b4b'],
                borderWidth: 0
            }]
        },
        options: { cutout: '75%', plugins: { legend: { position: 'bottom', labels: { color: '#fff', padding: 20 } } } }
    });
}

async function loadTables() {
    // Top Miners
    const mQuery = query(collection(db, "users"), orderBy("balance", "desc"), limit(10));
    const mSnap = await getDocs(mQuery);
    let mHTML = "<tr><th>Rank</th><th>User</th><th>Balance</th></tr>";
    let i = 1;
    mSnap.forEach(d => {
        mHTML += `<tr><td>#${i++}</td><td>${d.data().name}</td><td>${d.data().balance.toFixed(2)}</td></tr>`;
    });
    document.getElementById("minersTable").innerHTML = mHTML;

    // Top Referrers
    const rQuery = query(collection(db, "users"), orderBy("referrals", "desc"), limit(10));
    const rSnap = await getDocs(rQuery);
    let rHTML = "<tr><th>Rank</th><th>User</th><th>Refs</th></tr>";
    let j = 1;
    rSnap.forEach(d => {
        rHTML += `<tr><td>#${j++}</td><td>${d.data().name}</td><td>${d.data().referrals || 0}</td></tr>`;
    });
    document.getElementById("refsTable").innerHTML = rHTML;
}

window.exportData = async function() {
    const snap = await getDocs(collection(db, "users"));
    let csv = "Name,Balance,Referrals,LastClaim\n";
    snap.forEach(d => {
        const u = d.data();
        csv += `${u.name},${u.balance},${u.referrals || 0},${new Date(u.lastClaim).toLocaleString()}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'onchyra_users.csv'; a.click();
}

loadAnalytics();
</script>
</body>
</html>
