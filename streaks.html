<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streak Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #a78bfa;
  --bg: #03040a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--bg);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Space Grotesk', sans-serif;
  perspective: 1200px;
}

/* Scene */
.scene {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Card */
.card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(15px);
  border-radius: 30px;
  padding: 50px 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  transform-style: preserve-3d;
  transition: transform 0.2s ease-out;
  box-shadow: 0 40px 120px rgba(0,0,0,0.8);
}

/* Title */
.title {
  font-size: 52px;
  font-weight: 900;
  line-height: 0.9;
  text-transform: uppercase;
  background: linear-gradient(135deg,#fff 20%,#a78bfa 50%,#fff 80%);
  background-size: 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 3s linear infinite;
  transform: translateZ(80px);
}

@keyframes shine {
  to { background-position: 200%; }
}

/* Subtitle */
.subtitle {
  margin-top: 20px;
  font-size: 14px;
  letter-spacing: 4px;
  color: var(--primary);
  transform: translateZ(50px);
}

/* Description */
.desc {
  margin-top: 20px;
  font-size: 13px;
  color: #aaa;
  line-height: 1.5;
  transform: translateZ(40px);
}

/* CTA Button */
.btn {
  margin-top: 30px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(135deg,#a78bfa,#7c3aed);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transform: translateZ(60px);
  transition: 0.2s;
}

.btn:hover {
  transform: translateZ(60px) scale(1.05);
}

/* Glow */
.glow {
  position: absolute;
  width: 250px;
  height: 250px;
  background: var(--primary);
  filter: blur(120px);
  opacity: 0.2;
  z-index: -1;
}
</style>
</head>

<body>

<div class="scene">
  <div class="glow"></div>

  <div class="card" id="card">
    <div class="title">COMING<br>SOON</div>
    
    <div class="subtitle">STREAK SYSTEM 🔥</div>

    <div class="desc">
      Stay active. Earn more rewards.<br>
      Don’t break your streak 👀<br><br>
      Launching soon… early users benefit the most 🚀
    </div>

    <button class="btn" onclick="history.back()">Go Back</button>
  </div>
</div>

<script>
const card = document.getElementById('card');

function handleMove(x, y) {
  const w = window.innerWidth;
  const h = window.innerHeight;

  const rotateY = ((x / w) - 0.5) * 40;
  const rotateX = ((y / h) - 0.5) * -40;

  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
}

// Mouse
document.addEventListener('mousemove', e => {
  handleMove(e.clientX, e.clientY);
});

// Touch
document.addEventListener('touchmove', e => {
  const t = e.touches[0];
  handleMove(t.clientX, t.clientY);
});

// Reset smooth
function resetCard() {
  card.style.transform = `rotateX(0deg) rotateY(0deg)`;
}

document.addEventListener('mouseleave', resetCard);
document.addEventListener('touchend', resetCard);
</script>

</body>
</html>
