<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presale Hub — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a78bfa; --bg: #03040a; --card: rgba(255, 255, 255, 0.03); --border: rgba(167, 139, 250, 0.15); }
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: white; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; padding: 20px; padding-top: 80px; overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(3, 4, 10, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; z-index: 1000;
        }
        .nav-logo { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }
        .nav-back {
            text-decoration: none; color: white; font-size: 11px; font-weight: 700;
            background: rgba(255,255,255,0.05); padding: 10px 18px; border-radius: 12px;
            border: 1px solid var(--border); transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }

        /* MAIN CONTAINER */
        .main-container {
            background: var(--card); border: 1px solid var(--border); border-radius: 40px;
            padding: 35px 25px; width: 100%; max-width: 400px; text-align: center;
            backdrop-filter: blur(25px); position: relative;
        }

        /* RPM METER PHYSICS */
        .meter-box { position: relative; width: 260px; height: 140px; margin: 20px auto; overflow: hidden; }
        .base-arc { 
            width: 240px; height: 240px; border: 12px solid #111; border-radius: 50%; 
            border-bottom-color: transparent; border-left-color: transparent; 
            transform: rotate(-135deg); position: absolute; top: 0; left: 10px;
        }
        .needle { 
            position: absolute; bottom: 10px; left: 50%; width: 4px; height: 100px; 
            background: #ff4757; border-radius: 5px; transform-origin: bottom center; 
            transform: rotate(-90deg); transition: 3s cubic-bezier(0.17, 0.67, 0.12, 1);
            box-shadow: 0 0 20px #ff4757; z-index: 10;
        }
        .marks-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .mark { position: absolute; bottom: 10px; left: 50%; width: 2px; height: 8px; background: rgba(255,255,255,0.2); transform-origin: bottom center; }
        .mark.major { height: 14px; background: var(--primary); width: 3px; }

        /* METER VALUE */
        .meter-value { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); text-align: center; width: 100%; }
        #userCount { font-family: 'Space Grotesk'; font-size: 28px; font-weight: 800; color: white; display: block; }
        .user-label { font-size: 9px; opacity: 0.5; letter-spacing: 2px; text-transform: uppercase; }

        .goal-label { font-size: 11px; color: var(--primary); font-weight: 700; margin-top: 10px; font-family: 'Space Grotesk'; letter-spacing: 0.5px; }

        /* PRICE GRID */
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .price-item { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .p-label { font-size: 9px; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; }
        .p-val { font-family: 'Space Grotesk'; font-size: 15px; color: var(--primary); font-weight: 800; }

        /* TILT CARD */
        .tilt-wrapper { perspective: 1000px; margin-top: 35px; }
        .tilt-card {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.1), rgba(10, 10, 15, 0.95));
            border: 2px solid var(--primary); border-radius: 22px;
            padding: 25px; color: #fff; font-weight: 800;
            text-transform: uppercase; letter-spacing: 3px; font-size: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            cursor: not-allowed; transition: 0.1s;
        }

        .badge { background: rgba(251, 191, 36, 0.1); color: #fbbf24; padding: 6px 14px; border-radius: 10px; font-size: 9px; font-weight: 800; margin-bottom: 15px; border: 1px solid rgba(251, 191, 36, 0.2); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">ONCHYRA</div>
        <a href="dashboard.html" class="nav-back">DASHBOARD</a>
    </nav>

    <div class="main-container">
        <div class="badge">PRESALE ENGINE: ANALYZING</div>
        <h1 style="font-family:'Space Grotesk'; font-size:24px; margin-bottom: 5px;">PRESALE RADAR</h1>
        
        <div class="meter-box">
            <div class="base-arc"></div>
            <div class="marks-container" id="marks"></div>
            <div id="needle" class="needle"></div>
            <div class="meter-value">
                <span id="userCount">0</span>
                <span class="user-label">Verified Nodes</span>
            </div>
            <div style="position: absolute; bottom: 0px; left: 50%; transform: translateX(-50%); width: 14px; height: 14px; background: #000; border: 3px solid #ff4757; border-radius: 50%; z-index: 11;"></div>
        </div>

        <div class="goal-label">NETWORK TARGET: 200 USERS 🛰️</div>

        <div class="price-grid">
            <div class="price-item">
                <span class="p-label">Entry Price</span>
                <span class="p-val">1 POL = 100 ONC</span>
            </div>
            <div class="price-item">
                <span class="p-label">Target Exit</span>
                <span class="p-val">1 POL = 50 ONC</span>
            </div>
        </div>

        <div class="tilt-wrapper">
            <div class="tilt-card" id="tiltCard">
                <div class="tilt-content">
                    Coming Soon
                    <div style="font-size: 8px; opacity: 0.5; margin-top: 6px; letter-spacing: 1px; font-weight: 400;">Whitelist Lock: 200 Users</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
            authDomain: "onchyra.firebaseapp.com",
            projectId: "onchyra",
            storageBucket: "onchyra.firebasestorage.app",
            messagingSenderId: "441822770982",
            appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CREATE METER MARKS (0 to 200)
        const marksContainer = document.getElementById('marks');
        for (let i = 0; i <= 200; i += 10) {
            const angle = (i / 200) * 180 - 90;
            const mark = document.createElement('div');
            mark.className = i % 50 === 0 ? 'mark major' : 'mark';
            mark.style.transform = `rotate(${angle}deg) translateY(-110px)`;
            marksContainer.appendChild(mark);
        }

        // SYNC DATA WITH REAL-TIME UPDATES
        function syncMeter() {
            onSnapshot(collection(db, "users"), (snap) => {
                const count = snap.size;
                
                // Update Number with animation
                document.getElementById('userCount').innerText = count;

                // Update Needle Rotation
                const ratio = Math.min(count / 200, 1);
                const rotation = (ratio * 180) - 90;
                
                // Vibration effect for realistic needle
                setTimeout(() => {
                    document.getElementById('needle').style.transform = `rotate(${rotation}deg)`;
                }, 500);
            });
        }
        syncMeter();

        // TILT EFFECT
        const tiltCard = document.getElementById('tiltCard');
        document.addEventListener('mousemove', (e) => {
            const rect = tiltCard.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            if (x > 0 && x < rect.width && y > 0 && y < rect.height) {
                const rotateX = (rect.height / 2 - y) / 5;
                const rotateY = (x - rect.width / 2) / 5;
                tiltCard.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            } else {
                tiltCard.style.transform = `rotateX(0deg) rotateY(0deg)`;
            }
        });
    </script>
</body>
</html>
