<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a78bfa;
            --secondary: #60a5fa;
            --bg: #03040a;
            --card: #0d0e1a; /* Glass effect ki jagah solid dark color lagaya lag rokne ke liye */
            --border: rgba(255, 255, 255, 0.08);
            --transition: all 0.3s ease;
        }

        * { margin:0; padding:0; box-sizing:border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; min-height: 100vh; overflow-x: hidden; }

        /* PC & MOBILE WRAPPER */
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 85px 15px 20px 15px; /* Top padding badhai nav ke liye */
        }

        /* FIXED NAVBAR */
        .nav { 
            position: fixed; 
            top: 0; 
            left: 0;
            right: 0;
            height: 70px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 20px; 
            background: #080914; /* Solid color for performance */
            border-bottom: 1px solid var(--border);
            z-index: 1000; 
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 800; letter-spacing: 1px; color: #fff; }

        /* DASHBOARD GRID */
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 15px; display: none; }
        @media (min-width: 992px) {
            .dashboard-grid { grid-template-columns: 1.5fr 1fr; gap: 20px; }
            .full-width { grid-column: span 2; }
        }

        /* LOADER */
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .spinner { width: 35px; height: 35px; border-radius: 50%; border: 3px solid var(--border); border-top: 3px solid var(--primary); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MENU */
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 1100; }
        .menu { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: #0d0e1a; padding: 40px 20px; transition: var(--transition); z-index: 1200; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .menu-item { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; font-weight: 600; padding: 14px; border-radius: 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 12px; }
        .menu-item.active { background: rgba(167, 139, 250, 0.1); color: var(--primary); }

        /* CARDS */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; position: relative; overflow: hidden; }
        
        /* PRESALE IMAGE */
        .presale-card { padding: 0; }
        .presale-img { width: 100%; height: 160px; object-fit: cover; }
        .presale-content { padding: 15px; text-align: center; }

        /* STREAK */
        .streak-badge { position: absolute; top: 15px; right: 15px; background: rgba(167, 139, 250, 0.1); padding: 5px 10px; border-radius: 15px; border: 1px solid rgba(167, 139, 250, 0.2); color: var(--primary); font-size: 10px; font-weight: 700; }

        /* COIN ANIMATION (Simplified for Lag Fix) */
        .coin-wrapper { width: 100px; height: 100px; margin: 10px auto; }
        .coin { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk'; font-weight: 800; box-shadow: 0 0 30px rgba(167, 139, 250, 0.2); color: #000; font-size: 20px; animation: simpleFloat 3s ease-in-out infinite; }
        @keyframes simpleFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* MINING BUTTON */
        #claimBtn { width: 100%; padding: 16px; border: none; border-radius: 16px; background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000; font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        #claimBtn:active { transform: scale(0.98); }
        #claimBtn:disabled { background: #1a1b26; color: #444; cursor: not-allowed; }

        /* LISTS */
        .holder-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 16px; margin-bottom: 8px; }
        .rank-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; background: #222; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #111; padding: 10px 20px; border-radius: 12px; border: 1px solid var(--primary); display: none; z-index: 2000; font-size: 12px; white-space: nowrap; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<div class="menu" id="menu">
    <div class="logo" style="margin-bottom: 30px; color: var(--primary);">ONCHYRA</div>
    <a href="dashboard.html" class="menu-item active">Dashboard</a>
    <a href="presale.html" class="menu-item">Pre-sale</a>
    <a href="referrals.html" class="menu-item">Referrals</a>
    <a href="leaderboard.html" class="menu-item">Leaderboard</a>
    <a href="roadmap.html" class="menu-item">Roadmap</a>
    <a href="tokenomics.html" class="menu-item">Tokenomics</a>
    <a href="powerdrop.html" class="menu-item">Powerdrop</a>
    <a href="updates.html" class="menu-item">Updates</a>
    <a onclick="logout()" class="menu-item" style="color:#ef4444; margin-top: auto;">Logout</a>
</div>

<div class="nav">
    <div onclick="toggleMenu()" style="cursor:pointer; padding: 10px 0;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></div>
    <div class="logo">ONCHYRA</div>
    <div style="width:38px; height:38px; border-radius:10px; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center;" onclick="window.location='profile.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
</div>

<div class="container">
    <div id="dashboardData" class="dashboard-grid">
        
        <div class="card" style="text-align:center;">
            <div class="streak-badge">STREAK: <span id="streakCount">0</span></div>
            <div style="font-size:13px; opacity:0.6; margin-top:10px;">
                <span id="username">Miner</span> <span id="rankTag" class="rank-tag" style="border: 1px solid var(--primary); padding: 2px 6px; border-radius: 5px; font-size: 9px; color: var(--primary);">ROOKIE</span>
            </div>
            <div class="coin-wrapper"><div class="coin">ONC</div></div>
            <h2 id="balance" style="font-family:'Space Grotesk'; font-size:40px;">0.00</h2>
        </div>

        <div class="card">
            <h3 style="font-size:14px; margin-bottom:15px;">Mining Session</h3>
            <div id="claimStatus" style="font-size:11px; opacity:0.5; margin-bottom:8px;">Initialising...</div>
            <div style="background:#000; height:8px; border-radius:10px; margin-bottom:15px; overflow:hidden;"><div id="progressBar" style="height:100%; width:0%; background:var(--primary); transition: 1s linear;"></div></div>
            <button id="claimBtn" onclick="claim()" disabled>Start Mining</button>
        </div>

        <div class="card presale-card" onclick="window.location='presale.html'">
            <img src="presale.jpg" class="presale-img">
            <div class="presale-content">
                <div style="font-weight: 800; color: var(--primary); font-size: 14px;">TOKEN PRE-SALE</div>
                <div style="font-size: 11px; opacity: 0.6;">Buy ONC before Listing</div>
            </div>
        </div>

        <div class="card">
            <h3 style="font-size:12px; margin-bottom: 15px; opacity: 0.5; letter-spacing: 1px;">TOP NODES</h3>
            <div id="miniLeaderboard"></div>
        </div>

        <div class="card full-width">
            <div id="refcode" style="padding:15px; border-radius:12px; text-align:center; color:var(--primary); font-family:monospace; font-weight:bold; background:rgba(0,0,0,0.5); border:1px dashed var(--border); margin-bottom: 10px;">...</div>
            <button onclick="copyLink()" style="background:transparent; color:white; border:1px solid var(--border); width:100%; padding:12px; border-radius:12px; font-size:12px;">COPY INVITE LINK</button>
        </div>
    </div>
</div>

<div id="toast"><span id="toastText"></span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, onSnapshot, updateDoc, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey:"AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
    authDomain:"onchyra.firebaseapp.com",
    projectId:"onchyra",
    storageBucket:"onchyra.firebasestorage.app",
    messagingSenderId:"441822770982",
    appId:"1:441822770982:web:f22f6b95fd5148ce21b3e7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid, userData;

const showDashboard = () => {
    document.getElementById('loader').style.display = "none";
    document.getElementById('dashboardData').style.display = "grid";
};

onAuthStateChanged(auth, (user) => {
    if(!user) { window.location="login.html"; return; }
    uid = user.uid;
    loadData();
    setTimeout(showDashboard, 3000);
});

async function loadData() {
    onSnapshot(doc(db, "users", uid), (snap) => {
        if(snap.exists()){
            userData = snap.data();
            document.getElementById('username').innerText = userData.name || "Miner";
            document.getElementById('balance').innerText = (userData.balance || 0).toFixed(2);
            document.getElementById('refcode').innerText = userData.referralCode || "---";
            document.getElementById('streakCount').innerText = userData.streak || "0";
            checkClaim();
        }
    });

    const topSnap = await getDocs(query(collection(db, "users"), orderBy("balance", "desc"), limit(3)));
    let html = ""; let r = 1;
    topSnap.forEach(d => {
        html += `<div class="holder-card">
            <div class="rank-num">${r}</div>
            <div style="flex:1; font-size:12px;">${d.data().name}</div>
            <div style="font-weight:800; color:var(--primary); font-size:12px;">${(d.data().balance||0).toFixed(2)}</div>
        </div>`;
        r++;
    });
    document.getElementById('miniLeaderboard').innerHTML = html;
}

window.claim = async() => {
    const last = Number(userData.lastClaim) || 0;
    if(Date.now() - last < 86400000) return;
    await updateDoc(doc(db, "users", uid), { balance: (userData.balance || 0) + 0.10, lastClaim: Date.now(), streak: (userData.streak || 0) + 1 });
    showToast("Mined +0.10 ONC");
}

function checkClaim() {
    const last = Number(userData.lastClaim) || 0;
    const diff = 86400000 - (Date.now() - last);
    const pBar = document.getElementById('progressBar');
    const btn = document.getElementById('claimBtn');
    const status = document.getElementById('claimStatus');
    
    if(diff <= 0) {
        pBar.style.width = "100%"; btn.disabled = false; status.innerText = "Ready to Mine";
    } else {
        let p = ((86400000 - diff) / 86400000) * 100;
        pBar.style.width = p + "%"; btn.disabled = true;
        let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000);
        status.innerText = `Mining: ${h}h ${m}m remaining`;
    }
}

window.toggleMenu = () => {
    const m = document.getElementById('menu'), o = document.getElementById('overlay');
    const open = m.style.left === "0px";
    m.style.left = open ? "-280px" : "0px"; o.style.display = open ? "none" : "block";
};

window.logout = () => signOut(auth).then(() => window.location="login.html");
window.copyLink = () => { navigator.clipboard.writeText(window.location.origin + "/register.html?ref=" + userData.referralCode); showToast("Link Copied!"); };
function showToast(txt) { const t = document.getElementById('toast'); document.getElementById('toastText').innerText = txt; t.style.display = "block"; setTimeout(()=>t.style.display="none", 2500); }
</script>
</body>
</html>
