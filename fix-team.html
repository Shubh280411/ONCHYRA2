<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a78bfa;
            --secondary: #60a5fa;
            --bg: #03040a;
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin:0; padding:0; box-sizing:border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 15px; overflow-x: hidden; }

        /* LOADER */
        #loader { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: 0.5s; }
        .spinner { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border); border-top: 2px solid var(--primary); animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* NAV & MENU */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px; margin-bottom: 20px; background: var(--card); border-radius: 22px; border: 1px solid var(--border); backdrop-filter: blur(15px); }
        .logo { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 800; letter-spacing: 1px; }
        
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 900; backdrop-filter: blur(8px); }
        .menu { position: fixed; top: 0; left: -280px; width: 270px; height: 100%; background: #080914; padding: 40px 20px; transition: var(--transition); z-index: 999; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
        .menu-item { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; font-weight: 600; padding: 12px 15px; border-radius: 12px; margin-bottom: 5px; display: flex; align-items: center; gap: 15px; transition: var(--transition); }
        .menu-item svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
        .menu-item.active { background: rgba(167, 139, 250, 0.08); color: var(--primary); }

        /* CARDS */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 26px; padding: 22px; margin-bottom: 18px; backdrop-filter: blur(12px); position: relative; overflow: hidden; }
        
        /* --- PRESALE BANNER CARD --- */
        .presale-card { padding: 0; border: 1px solid rgba(167, 139, 250, 0.25); }
        .presale-img { width: 100%; height: auto; display: block; border-bottom: 1px solid var(--border); }
        .presale-body { padding: 18px; text-align: center; }
        .presale-btn { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000; margin-top: 10px; font-size: 14px; box-shadow: 0 8px 15px rgba(167, 139, 250, 0.2); }
        /* -------------------------- */

        .streak-badge { position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(167, 139, 250, 0.3); display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: var(--primary); }
        .coin-wrapper { position: relative; width: 100px; height: 100px; margin: 10px auto; }
        .coin { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk'; font-weight: 800; box-shadow: 0 0 40px rgba(167, 139, 250, 0.3); animation: float 4s ease-in-out infinite; color: #000; font-size: 20px; }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        button { width: 100%; padding: 16px; border: none; border-radius: 14px; background: var(--primary); color: #000; font-weight: 800; cursor: pointer; transition: var(--transition); }
        button:disabled { opacity: 0.2; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; padding: 12px 25px; border-radius: 15px; border: 1px solid var(--primary); display: none; z-index: 1000; font-size: 13px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div style="margin-top:15px; font-size:10px; opacity:0.5; letter-spacing:2px;">SYNCING...</div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<div class="menu" id="menu">
    <div class="logo" style="margin-bottom: 30px; color: var(--primary);">ONCHYRA</div>
    <a href="dashboard.html" class="menu-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg> Dashboard</a>
    <a href="referrals.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg> Referrals</a>
    <a href="leaderboard.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M12 15l-2 5L2 14l5-2 1-5 5 2 5-2 1 5 5 2-8 6-2-5z"></path></svg> Leaderboard</a>
    <a href="powerdrop.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg> Powerdrop</a>
    <a href="presale.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg> Pre-sale</a>
    <a href="tokenomics.html" class="menu-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><path d="M12 2v20M2 12h20"></path></svg> Tokenomics</a>
    <a href="roadmap.html" class="menu-item"><svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6M3 12h18"></path></svg> Roadmap</a>
    <a onclick="logout()" class="menu-item" style="color:#ef4444; margin-top: auto;"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path></svg> Logout</a>
</div>

<div class="nav">
    <div onclick="toggleMenu()" style="cursor:pointer;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></div>
    <div class="logo">ONCHYRA</div>
    <div style="width:34px; height:34px; border-radius:10px; background:var(--card); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="window.location='profile.html'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
</div>

<div id="dashboardData" style="display:none;">
    
    <div class="card" style="text-align:center;">
        <div class="streak-badge">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
            STREAK: <span id="streakCount">0</span>
        </div>
        <div style="font-size:13px; opacity:0.8; margin-top:10px;"><span id="username" style="font-weight:700;">Miner</span></div>
        <div class="coin-wrapper"><div class="coin">ONC</div></div>
        <h2 id="balance" style="font-family:'Space Grotesk'; font-size:38px;">0.00</h2>
    </div>

    <div class="card">
        <h3 style="font-size:15px; font-family:'Space Grotesk';">Mining Session</h3>
        <div id="claimStatus" style="font-size:11px; opacity:0.5; margin-top:5px; margin-bottom:10px;">Checking status...</div>
        <div style="background:#0a0b14; height:8px; border-radius:10px; margin-bottom:15px; overflow:hidden; border:1px solid var(--border);"><div id="progressBar" style="height:100%; width:0%; background:var(--primary); transition:1s;"></div></div>
        <button id="claimBtn" onclick="claim()" disabled>START MINING</button>
    </div>

    <div class="card presale-card">
        <img src="presale-banner.png" alt="Presale Banner" class="presale-img">
        <div class="presale-body">
            <div style="font-family:'Space Grotesk'; font-weight:800; font-size:18px;">ONC PRE-SALE</div>
            <p style="font-size:11px; opacity:0.6; margin: 5px 0 12px 0;">Token sale starting soon. Don't miss out!</p>
            <button class="presale-btn" onclick="window.location='presale.html'">VIEW PRE-SALE</button>
        </div>
    </div>

    <div class="card" style="display:flex; text-align:center; padding: 15px;">
        <div style="flex:1; border-right: 1px solid var(--border);">
            <div id="totalUsers" style="font-size:20px; font-weight:800;">0</div>
            <div style="font-size:9px; opacity:0.5; margin-top:4px;">TOTAL NODES</div>
        </div>
        <div style="flex:1;">
            <div id="totalMined" style="font-size:20px; font-weight:800;">0</div>
            <div style="font-size:9px; opacity:0.5; margin-top:4px;">CIRCULATION</div>
        </div>
    </div>
</div>

<div id="toast"><span id="toastText"></span></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, onSnapshot, updateDoc, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey:"AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
    authDomain:"onchyra.firebaseapp.com",
    projectId:"onchyra",
    storageBucket:"onchyra.firebasestorage.app",
    messagingSenderId:"441822770982",
    appId:"1:441822770982:web:f22f6b95fd5148ce21b3e7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid, userData;

const showDashboard = () => {
    document.getElementById('loader').style.opacity = "0";
    setTimeout(() => {
        document.getElementById('loader').style.display = "none";
        document.getElementById('dashboardData').style.display = "block";
    }, 500);
};

setTimeout(showDashboard, 5000);

onAuthStateChanged(auth, async (user) => {
    if(!user) { window.location="login.html"; return; }
    uid = user.uid;
    loadPersonalData();
});

async function loadPersonalData() {
    onSnapshot(doc(db, "users", uid), (snap) => {
        if(snap.exists()){
            userData = snap.data();
            document.getElementById('username').innerText = userData.name || "Miner";
            document.getElementById('balance').innerText = (userData.balance || 0).toFixed(2);
            document.getElementById('streakCount').innerText = userData.streak || "0";
            checkClaim();
        }
    });
}

function checkClaim() {
    setInterval(() => {
        if(!userData) return;
        const last = Number(userData.lastClaim) || 0;
        const diff = 86400000 - (Date.now() - last);
        const pBar = document.getElementById('progressBar');
        const btn = document.getElementById('claimBtn');
        const status = document.getElementById('claimStatus');
        if(diff <= 0) {
            pBar.style.width = "100%"; btn.disabled = false; status.innerText = "Ready to Mine";
        } else {
            let p = ((86400000 - diff) / 86400000) * 100;
            pBar.style.width = p + "%"; btn.disabled = true;
            let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            status.innerText = `Wait: ${h}h ${m}s`;
        }
    }, 1000);
}

window.toggleMenu = () => {
    const m = document.getElementById('menu'), o = document.getElementById('overlay');
    const open = m.style.left === "0px";
    m.style.left = open ? "-280px" : "0px"; o.style.display = open ? "none" : "block";
};
</script>
</body>
</html>
