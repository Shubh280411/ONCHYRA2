<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presale Hub — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a78bfa; --bg: #03040a; --card: rgba(255, 255, 255, 0.03); --border: rgba(167, 139, 250, 0.15); }
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: white; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; padding: 20px; padding-top: 80px; overflow-x: hidden;
        }

        /* NAVBAR */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(3, 4, 10, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 25px; z-index: 1000;
        }
        .nav-logo { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }
        .nav-back {
            text-decoration: none; color: white; font-size: 11px; font-weight: 700;
            background: rgba(255,255,255,0.05); padding: 10px 18px; border-radius: 12px;
            border: 1px solid var(--border); transition: 0.3s;
        }

        /* MAIN CONTAINER */
        .main-container {
            background: var(--card); border: 1px solid var(--border); border-radius: 40px;
            padding: 35px 25px; width: 100%; max-width: 400px; text-align: center;
            backdrop-filter: blur(25px); position: relative;
        }

        /* RPM METER BOX */
        .meter-box { position: relative; width: 280px; height: 160px; margin: 20px auto; overflow: hidden; }
        
        /* THE ARC */
        .base-arc { 
            width: 250px; height: 250px; border: 15px solid #111; border-radius: 50%; 
            border-bottom-color: transparent; border-left-color: transparent; 
            transform: rotate(-135deg); position: absolute; top: 0; left: 15px;
        }

        /* THE NEEDLE (CRITICAL LOGIC) */
        .needle { 
            position: absolute; bottom: 15px; left: 50%; width: 4px; height: 110px; 
            background: #ff4757; border-radius: 5px; transform-origin: bottom center; 
            transform: rotate(-90deg); /* Starts at 0 */
            transition: 2.5s cubic-bezier(0.17, 0.67, 0.12, 1.2); /* Smooth Springy Effect */
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.6); z-index: 10;
        }

        .marks-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
        .mark { position: absolute; bottom: 15px; left: 50%; width: 2px; height: 10px; background: rgba(255,255,255,0.1); transform-origin: bottom center; }
        .mark.major { height: 18px; background: var(--primary); width: 3px; }

        /* CENTER DISPLAY */
        .meter-info { position: absolute; bottom: 15px; width: 100%; text-align: center; z-index: 5; }
        #userCount { font-family: 'Space Grotesk'; font-size: 32px; font-weight: 800; display: block; color: #fff; text-shadow: 0 0 15px rgba(167, 139, 250, 0.4); }
        .label { font-size: 9px; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; }

        .goal-text { font-size: 11px; color: var(--primary); font-weight: 700; font-family: 'Space Grotesk'; margin-top: 10px; }

        /* TILT CARD */
        .tilt-card {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.1), rgba(0,0,0,0.8));
            border: 2px solid var(--primary); border-radius: 25px; padding: 25px; margin-top: 30px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">ONCHYRA</div>
        <a href="dashboard.html" class="nav-back">BACK</a>
    </nav>

    <div class="main-container">
        <div style="font-size: 10px; color: var(--primary); font-weight: 800; margin-bottom: 15px; letter-spacing: 2px;">LIVE NETWORK STATUS</div>
        
        <div class="meter-box">
            <div class="base-arc"></div>
            <div class="marks-container" id="marks"></div>
            <div id="needle" class="needle"></div>
            
            <div class="meter-info">
                <span id="userCount">0</span>
                <span class="label">Total Nodes</span>
            </div>
            
            <div style="position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); width: 20px; height: 20px; background: #000; border: 4px solid #ff4757; border-radius: 50%; z-index: 11;"></div>
        </div>

        <div class="goal-text">TARGET TO UNLOCK PRESALE: 200 USERS</div>

        <div class="tilt-card">
            Coming Soon
            <div style="font-size: 8px; opacity: 0.5; margin-top: 8px; font-weight: 400;">System is waiting for network growth</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
            authDomain: "onchyra.firebaseapp.com",
            projectId: "onchyra",
            storageBucket: "onchyra.firebasestorage.app",
            messagingSenderId: "441822770982",
            appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. GENERATE VISUAL MARKS (0 TO 200)
        const marksContainer = document.getElementById('marks');
        for (let i = 0; i <= 200; i += 10) {
            const angle = (i / 200) * 180 - 90;
            const mark = document.createElement('div');
            mark.className = i % 50 === 0 ? 'mark major' : 'mark';
            mark.style.transform = `rotate(${angle}deg) translateY(-120px)`;
            marksContainer.appendChild(mark);
        }

        // 2. REAL-TIME DATA SYNC & NEEDLE MOVEMENT
        function startLiveUpdate() {
            onSnapshot(collection(db, "users"), (snap) => {
                const totalUsers = snap.size;
                
                // Update text
                document.getElementById('userCount').innerText = totalUsers;

                // NEEDLE LOGIC:
                // 0 users = -90deg
                // 200 users = +90deg
                const ratio = Math.min(totalUsers / 200, 1);
                const targetRotation = (ratio * 180) - 90;

                // Move needle with transition
                const needle = document.getElementById('needle');
                needle.style.transform = `rotate(${targetRotation}deg)`;
            });
        }

        startLiveUpdate();
    </script>
</body>
</html>
