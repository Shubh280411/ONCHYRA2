<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onchyra Ultimate Monitor v2.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0c1a; --card: #161b22; --accent: #7c3aed; --danger: #ef4444; --success: #22c55e; --info: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Stats Styling */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .stat-card h3 { margin: 0; font-size: 14px; color: #aaa; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 24px; font-weight: bold; }

        /* Search Bar */
        .search-area { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 100; }
        .search-input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #444; background: var(--card); color: white; box-sizing: border-box; font-size: 16px; outline: none; }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(124, 58, 237, 0.3); }

        /* Table Styling */
        .table-container { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1a1b2e; padding: 15px; text-align: left; font-size: 12px; color: var(--accent); }
        td { padding: 15px; border-bottom: 1px solid #222; font-size: 14px; }
        
        /* Row States */
        .row-duplicate { background: rgba(239, 68, 68, 0.08); }
        .row-banned { opacity: 0.5; background: #000; }
        .row-safe { border-left: 4px solid var(--info); }

        /* Badges */
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .bg-red { background: var(--danger); }
        .bg-green { background: var(--success); }
        .bg-blue { background: var(--info); }
        
        /* Buttons */
        .btn { border: none; padding: 8px 12px; border-radius: 6px; color: white; cursor: pointer; font-weight: 600; margin-right: 5px; transition: 0.2s; }
        .btn-ban { background: var(--danger); }
        .btn-safe { background: var(--info); }
        .btn-refresh { background: var(--accent); }
        .btn:disabled { background: #444; cursor: not-allowed; }
        .btn:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.1); }

        code { background: #2d333b; padding: 2px 5px; border-radius: 4px; color: #e5c07b; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📱 Device Monitor <small style="font-size: 14px; color: var(--accent);">Admin Panel</small></h1>
        <button class="btn btn-refresh" onclick="location.reload()">Refresh Data</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><h3>Total Users</h3><p id="statTotal">0</p></div>
        <div class="stat-card" style="color: var(--danger);"><h3>Suspected Duplicates</h3><p id="statDupes">0</p></div>
        <div class="stat-card" style="color: var(--success);"><h3>Marked Safe</h3><p id="statSafe">0</p></div>
    </div>

    <div class="search-area">
        <input type="text" id="searchInput" class="search-input" placeholder="Search by Email or Device ID...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>User / Email</th>
                    <th>Device ID</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userTable">
                <tr><td colspan="4" style="text-align:center; padding:50px;">Fetching data from Firebase...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
        authDomain: "onchyra.firebaseapp.com",
        projectId: "onchyra",
        storageBucket: "onchyra.firebasestorage.app",
        messagingSenderId: "441822770982",
        appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let usersMasterList = [];
    let deviceCounts = {};

    async function loadData() {
        try {
            const querySnapshot = await getDocs(collection(db, "users"));
            usersMasterList = [];
            deviceCounts = {};

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const user = { 
                    id: doc.id, 
                    ...data,
                    isSafe: data.isSafe || false, 
                    banned: data.banned || false 
                };
                usersMasterList.push(user);

                // Sirf duplicates count karo jo Safe nahi hain
                if (!user.isSafe) {
                    const dId = user.deviceId || "Unknown";
                    deviceCounts[dId] = (deviceCounts[dId] || 0) + 1;
                }
            });

            renderTable();
        } catch (err) {
            console.error("Fetch Error:", err);
            document.getElementById("userTable").innerHTML = `<tr><td colspan="4" style="color:red; text-align:center;">Error: ${err.message}. Rules check karein!</td></tr>`;
        }
    }

    function renderTable(filterText = "") {
        const tbody = document.getElementById("userTable");
        tbody.innerHTML = "";
        
        let dupeCounter = 0;
        let safeCounter = 0;

        const filtered = usersMasterList.filter(u => {
            const searchStr = filterText.toLowerCase();
            return u.email?.toLowerCase().includes(searchStr) || 
                   u.deviceId?.toLowerCase().includes(searchStr);
        });

        filtered.forEach(user => {
            const dId = user.deviceId || "Unknown";
            const isDuplicate = deviceCounts[dId] > 1 && !user.isSafe;
            
            if(isDuplicate) dupeCounter++;
            if(user.isSafe) safeCounter++;

            const tr = document.createElement("tr");
            if(isDuplicate) tr.className = "row-duplicate";
            if(user.banned) tr.className = "row-banned";
            if(user.isSafe) tr.className = "row-safe";

            tr.innerHTML = `
                <td>
                    <b>${user.email || 'No Email'}</b><br>
                    <small style="color: #666;">UID: ${user.id}</small>
                </td>
                <td><code>${dId.slice(0, 8)}...${dId.slice(-4)}</code></td>
                <td>
                    ${user.banned ? '<span class="badge bg-red">BANNED</span>' : 
                      user.isSafe ? '<span class="badge bg-blue">TRUSTED</span>' :
                      isDuplicate ? '<span class="badge bg-red">DUPLICATE</span>' : 
                      '<span class="badge bg-green">SINGLE</span>'}
                </td>
                <td>
                    <button class="btn btn-ban" onclick="userAction('${user.id}', 'ban')" ${user.banned ? 'disabled' : ''}>Ban</button>
                    <button class="btn btn-safe" onclick="userAction('${user.id}', 'safe')" ${user.isSafe ? 'disabled' : ''}>Safe</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById("statTotal").innerText = usersMasterList.length;
        document.getElementById("statDupes").innerText = dupeCounter;
        document.getElementById("statSafe").innerText = safeCounter;
    }

    // Handle Search
    document.getElementById("searchInput").addEventListener("input", (e) => {
        renderTable(e.target.value);
    });

    // Handle Ban/Safe Actions
    window.userAction = async function(uid, type) {
        const userRef = doc(db, "users", uid);
        const actionText = type === 'ban' ? "Is user ko BAN kar dein?" : "Is user ko SAFE mark kar dein?";
        
        if(confirm(actionText)) {
            try {
                const updateData = type === 'ban' ? { banned: true } : { isSafe: true };
                await updateDoc(userRef, updateData);
                
                alert("Success!");
                loadData(); // Re-fetch to update counts and UI
            } catch (error) {
                console.error("Action Error:", error);
                alert("Error: Action failed. Check your Firebase Rules!");
            }
        }
    };

    loadData();
</script>

</body>
</html>
