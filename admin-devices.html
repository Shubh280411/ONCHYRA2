<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Device Monitor — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0c1a; color: white; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; }
        .stats { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid #333; flex: 1; }
        
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #444; background: #161b22; color: white; font-size: 16px; }
        
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.02); border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        th { background: #1a1b2e; color: #a78bfa; text-transform: uppercase; font-size: 12px; }
        
        .duplicate { background: rgba(239, 68, 68, 0.1) !important; }
        .is-banned { opacity: 0.6; background: rgba(0, 0, 0, 0.3) !important; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-red { background: #ef4444; color: white; }
        .badge-green { background: #22c55e; color: white; }
        .badge-blue { background: #3b82f6; color: white; }

        .actions { display: flex; gap: 5px; }
        button { cursor: pointer; padding: 6px 10px; border-radius: 5px; border: none; font-size: 12px; color: white; transition: 0.2s; }
        .btn-ban { background: #dc2626; }
        .btn-safe { background: #059669; }
        .btn-refresh { background: #4f46e5; padding: 10px 20px; }
        button:disabled { background: #333; cursor: not-allowed; }
        button:hover:not(:disabled) { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📱 Device Monitor <small style="font-size: 12px; color: #666;">v2.0</small></h1>
        <button class="btn-refresh" onclick="location.reload()">Refresh Data</button>
    </div>

    <div class="stats-container">
        <div class="stats">Total Users: <b id="totalUsers">0</b></div>
        <div class="stats" style="color:#f87171;">Flagged Duplicates: <b id="totalDupes">0</b></div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="Search by Email or Device ID...">

    <table>
        <thead>
            <tr>
                <th>User Details</th>
                <th>Device ID (Last 12)</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
        authDomain: "onchyra.firebaseapp.com",
        projectId: "onchyra",
        storageBucket: "onchyra.firebasestorage.app",
        messagingSenderId: "441822770982",
        appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let allUsers = [];
    let deviceCounts = {};

    async function fetchData() {
        const querySnapshot = await getDocs(collection(db, "users"));
        allUsers = [];
        deviceCounts = {};

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const uData = { id: doc.id, ...data };
            allUsers.push(uData);
            
            // Count devices (only if not marked safe)
            if(!uData.isSafe) {
                const dId = uData.deviceId || "Unknown";
                deviceCounts[dId] = (deviceCounts[dId] || 0) + 1;
            }
        });

        renderTable();
    }

    function renderTable(filter = "") {
        const tableBody = document.getElementById("userTable");
        tableBody.innerHTML = "";
        let dupeCounter = 0;

        const filtered = allUsers.filter(u => 
            u.email?.toLowerCase().includes(filter.toLowerCase()) || 
            u.deviceId?.toLowerCase().includes(filter.toLowerCase())
        );

        filtered.forEach(user => {
            const dId = user.deviceId || "Unknown";
            const isDuplicate = deviceCounts[dId] > 1 && !user.isSafe;
            if(isDuplicate) dupeCounter++;

            const tr = document.createElement("tr");
            if(isDuplicate) tr.className = "duplicate";
            if(user.banned) tr.classList.add("is-banned");

            tr.innerHTML = `
                <td>
                    <b>${user.email}</b><br>
                    <small style="color:#888">${user.id}</small>
                </td>
                <td><code>...${dId.slice(-12)}</code></td>
                <td>
                    ${user.banned ? '<span class="badge badge-red">BANNED</span>' : 
                      user.isSafe ? '<span class="badge badge-blue">TRUSTED</span>' :
                      isDuplicate ? '<span class="badge badge-red">DUPLICATE</span>' : 
                      '<span class="badge badge-green">CLEAN</span>'}
                </td>
                <td class="actions">
                    <button class="btn-ban" onclick="handleAction('${user.id}', 'ban')" ${user.banned ? 'disabled' : ''}>Ban</button>
                    <button class="btn-safe" onclick="handleAction('${user.id}', 'safe')" ${user.isSafe ? 'disabled' : ''}>Safe</button>
                </td>
            `;
            tableBody.appendChild(tr);
        });

        document.getElementById("totalUsers").innerText = allUsers.length;
        document.getElementById("totalDupes").innerText = dupeCounter;
    }

    // Search Logic
    document.getElementById("searchInput").addEventListener("input", (e) => {
        renderTable(e.target.value);
    });

    // Global Action Handler
    window.handleAction = async function(uid, type) {
        const userRef = doc(db, "users", uid);
        
        try {
            if(type === 'ban') {
                if(confirm("Confirm Ban? User login nahi kar payega.")){
                    await updateDoc(userRef, { banned: true });
                    alert("User Banned!");
                }
            } else if(type === 'safe') {
                await updateDoc(userRef, { isSafe: true });
                alert("User marked as Safe!");
            }
            fetchData(); // Refresh list without page reload
        } catch (error) {
            console.error("Error:", error);
            alert("Action failed! Check Console.");
        }
    }

    fetchData();
</script>
</body>
</html>
