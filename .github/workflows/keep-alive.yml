name: Render Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          curl -sS --connect-timeout 10 "${{ vars.RENDER_URL }}/api/health" || echo "Ping failed (expected if not deployed yet)"
