<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #a78bfa; 
            --bg: #03040a; 
            --card: rgba(255, 255, 255, 0.03); 
            --border: rgba(255, 255, 255, 0.1);
            --red: #ff4757;
            --yellow: #f1c40f;
            --green: #2ecc71;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #150d2b 0%, #03040a 100%);
            color: white; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            perspective: 1200px; 
            overflow-x: hidden;
            padding: 40px 20px;
        }

        /* --- 1. BIG 3D COMING SOON SECTION --- */
        .coming-soon-container {
            margin-bottom: 50px;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .cs-text {
            font-family: 'Space Grotesk';
            font-size: clamp(40px, 10vw, 80px); /* Responsive size */
            font-weight: 900;
            letter-spacing: 8px;
            position: relative;
            transform-style: preserve-3d;
            text-shadow: 0 10px 30px rgba(167, 139, 250, 0.5);
        }

        .cs-text::before {
            content: 'COMING SOON';
            position: absolute; inset: 0;
            transform: translateZ(-40px);
            color: rgba(167, 139, 250, 0.1);
            -webkit-text-stroke: 1px rgba(255,255,255,0.1);
        }

        /* --- 2. RPM METER CARD --- */
        .card { 
            background: var(--card); 
            border-radius: 40px; 
            padding: 30px; 
            width: 100%; max-width: 380px; 
            text-align: center; 
            backdrop-filter: blur(30px); 
            border: 1px solid var(--border); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .meter-box { position: relative; width: 240px; height: 140px; margin: 20px auto; transform: translateZ(30px); }
        
        .meter-bg-glow {
            position: absolute; width: 220px; height: 110px;
            top: 0; left: 10px;
            border-radius: 120px 120px 0 0;
            background: conic-gradient(from 180deg at 50% 100%, var(--red) 0deg, var(--yellow) 90deg, var(--green) 180deg);
            opacity: 0.1;
            filter: blur(15px);
        }

        .meter-center-text {
            position: absolute; top: 65%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        .meter-center-text .num { font-family: 'Space Grotesk'; font-size: 38px; font-weight: 800; }
        .meter-center-text .label { font-size: 10px; letter-spacing: 2px; opacity: 0.5; }

        .needle { 
            position: absolute; bottom: 10px; left: calc(50% - 2px); 
            width: 4px; height: 90px; 
            background: linear-gradient(to top, var(--red), #fff);
            border-radius: 10px; transform-origin: bottom center; 
            transform: rotate(-90deg); 
            transition: transform 2.5s cubic-bezier(0.17, 0.67, 0.12, 1); 
            box-shadow: 0 0 15px var(--red);
            z-index: 10;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-item { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-val { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 700; color: var(--primary); }

        .btn { 
            display: block; width: 100%; padding: 16px; margin-top: 20px;
            border-radius: 15px; background: rgba(255,255,255,0.05); color: white;
            text-decoration: none; font-weight: 800; font-size: 12px;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

    </style>
</head>
<body>

    <div class="coming-soon-container" id="csContainer">
        <div class="cs-text">COMING SOON</div>
    </div>

    <div class="card" id="rpmCard">
        <div style="font-size: 9px; opacity: 0.4; letter-spacing: 3px; font-weight: 800;">NETWORK STATUS</div>
        
        <div class="meter-box">
            <div class="meter-bg-glow"></div>
            <div class="meter-center-text">
                <span class="num" id="centerCount">0</span>
                <span class="label">NODES</span>
            </div>
            <div id="needle" class="needle"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-val" id="neededCount">200</span>
                <span style="font-size: 8px; opacity: 0.5;">REMAINING</span>
            </div>
            <div class="stat-item">
                <span class="stat-val">200</span>
                <span style="font-size: 8px; opacity: 0.5;">TARGET</span>
            </div>
        </div>

        <a href="dashboard.html" class="btn">BACK TO TERMINAL</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
            authDomain: "onchyra.firebaseapp.com",
            projectId: "onchyra",
            storageBucket: "onchyra.firebasestorage.app",
            messagingSenderId: "441822770982",
            appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 3D INTERACTION LOGIC ---
        const cs = document.getElementById('csContainer');
        const card = document.getElementById('rpmCard');

        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 20;
            let y = (window.innerHeight / 2 - e.pageY) / 20;

            // Dono elements ko synchronize karke tilt karna
            cs.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
            card.style.transform = `rotateY(${x/2}deg) rotateX(${-y/2}deg)`;
        });

        // --- DATA SYNC ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(collection(db, "users"), (snap) => {
                    const count = snap.size;
                    const target = 200;
                    const ratio = Math.min(count / target, 1);
                    const rotation = (ratio * 180) - 90;

                    document.getElementById('centerCount').innerText = count;
                    document.getElementById('neededCount').innerText = Math.max(target - count, 0);
                    
                    const needle = document.getElementById('needle');
                    needle.style.transform = `rotate(${rotation}deg)`;
                    
                    // Needle Color Gradient
                    if(ratio > 0.8) needle.style.setProperty('--red', '#2ecc71');
                    else if(ratio > 0.4) needle.style.setProperty('--red', '#f1c40f');
                    else needle.style.setProperty('--red', '#ff4757');
                });
            } else { window.location.href = "login.html"; }
        });
    </script>
</body>
</html>
