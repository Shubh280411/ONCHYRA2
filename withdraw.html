<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #a78bfa; 
            --bg: #03040a; 
            --card: rgba(255, 255, 255, 0.03); 
            --border: rgba(255, 255, 255, 0.1);
            --red: #ff4757;
            --yellow: #f1c40f;
            --green: #2ecc71;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #150d2b 0%, #03040a 100%);
            color: white; min-height: 100vh; 
            display: flex; align-items: center; justify-content: center;
            perspective: 1000px; /* Essential for 3D */
            overflow: hidden;
        }

        /* 3D TILT CARD */
        .card { 
            background: var(--card); 
            border-radius: 40px; 
            padding: 40px 30px; 
            width: 100%; max-width: 380px; 
            text-align: center; 
            backdrop-filter: blur(30px); 
            border: 1px solid var(--border); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            position: relative;
        }

        /* RPM METER DESIGN */
        .meter-box { position: relative; width: 240px; height: 140px; margin: 20px auto; transform: translateZ(50px); }
        
        /* The colored background arc */
        .meter-bg {
            position: absolute; width: 240px; height: 240px;
            border: 15px solid transparent; border-radius: 50%;
            border-top: 15px solid var(--red);
            border-right: 15px solid var(--green);
            transform: rotate(45deg); /* Aligns colors to sectors */
            opacity: 0.15;
        }

        /* Center Count inside Meter */
        .meter-center-text {
            position: absolute; top: 60%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        .meter-center-text .num { font-family: 'Space Grotesk'; font-size: 40px; font-weight: 800; color: white; display: block; }
        .meter-center-text .label { font-size: 10px; letter-spacing: 2px; opacity: 0.5; text-transform: uppercase; }

        .needle { 
            position: absolute; bottom: 10px; left: calc(50% - 2px); 
            width: 4px; height: 100px; 
            background: linear-gradient(to top, var(--red), #fff);
            border-radius: 10px; transform-origin: bottom center; 
            transform: rotate(-90deg); 
            transition: transform 2s cubic-bezier(0.17, 0.67, 0.12, 1); 
            box-shadow: 0 0 15px var(--red);
            z-index: 10;
        }

        .coming-soon {
            display: inline-block; background: linear-gradient(90deg, #ff4757, #ff6b81);
            color: white; padding: 5px 15px; border-radius: 8px;
            font-size: 11px; font-weight: 800; margin-top: 15px;
            animation: pulse 2s infinite; transform: translateZ(30px);
        }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; transform: translateZ(40px) scale(1.05); } 100% { opacity: 0.6; } }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; transform: translateZ(20px); }
        .stat-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-item span { display: block; }
        .stat-val { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 700; color: var(--primary); }

        .btn { 
            display: block; width: 100%; padding: 16px; margin-top: 20px;
            border-radius: 15px; background: white; color: black;
            text-decoration: none; font-weight: 800; font-size: 12px;
            transform: translateZ(40px); transition: 0.3s;
        }
    </style>
</head>
<body>

    <div class="card" id="tiltCard">
        <div style="font-size: 10px; opacity: 0.4; letter-spacing: 3px; font-weight: 800;">ONCHYRA NETWORK</div>
        <h2 style="font-family: 'Space Grotesk'; margin: 10px 0;">Withdrawal Hub</h2>
        
        <div class="meter-box">
            <div class="meter-bg"></div>
            <div class="meter-center-text">
                <span class="num" id="centerCount">0</span>
                <span class="label">Nodes</span>
            </div>
            <div id="needle" class="needle"></div>
        </div>

        <div class="coming-soon">COMING SOON</div>

        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-val" id="neededCount">200</span>
                <span style="font-size: 9px; opacity: 0.5;">REMAINING</span>
            </div>
            <div class="stat-item">
                <span class="stat-val">200</span>
                <span style="font-size: 9px; opacity: 0.5;">GOAL</span>
            </div>
        </div>

        <a href="dashboard.html" class="btn">RETURN TO TERMINAL</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
            authDomain: "onchyra.firebaseapp.com",
            projectId: "onchyra",
            storageBucket: "onchyra.firebasestorage.app",
            messagingSenderId: "441822770982",
            appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 3D TILT LOGIC ---
        const card = document.getElementById('tiltCard');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 15;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 15;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Reset tilt on mouse leave
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // --- FIREBASE LOGIC ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(collection(db, "users"), (snap) => {
                    const count = snap.size;
                    const target = 200;
                    const ratio = Math.min(count / target, 1);
                    const rotation = (ratio * 180) - 90;

                    // Update Displays
                    document.getElementById('centerCount').innerText = count;
                    document.getElementById('neededCount').innerText = Math.max(target - count, 0);
                    
                    // Needle Color Logic
                    const needle = document.getElementById('needle');
                    needle.style.transform = `rotate(${rotation}deg)`;
                    
                    if(ratio > 0.8) needle.style.setProperty('--red', '#2ecc71');
                    else if(ratio > 0.4) needle.style.setProperty('--red', '#f1c40f');
                    else needle.style.setProperty('--red', '#ff4757');
                });
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
