<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #a78bfa; 
            --bg: #03040a; 
            --card: rgba(255, 255, 255, 0.02); 
            --border: rgba(255, 255, 255, 0.08);
            --red: #ff3e3e;
            --yellow: #f1c40f;
            --green: #00ff88;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 20%, #1a123d 0%, #03040a 80%);
            color: white; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            perspective: 1500px;
            padding: 20px;
        }

        /* --- 3D COMING SOON --- */
        .cs-wrapper { margin-bottom: 50px; transform-style: preserve-3d; }
        .cs-text {
            font-family: 'Space Grotesk';
            font-size: clamp(30px, 8vw, 70px);
            font-weight: 800;
            letter-spacing: 12px;
            color: #fff;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            text-shadow: 0 0 20px rgba(167, 139, 250, 0.3);
        }
        .cs-text::before {
            content: 'COMING SOON';
            position: absolute; inset: 0;
            transform: translateZ(-40px);
            color: rgba(255, 255, 255, 0.02);
            -webkit-text-stroke: 1px rgba(167, 139, 250, 0.1);
        }

        /* --- CLEAN GAUGE CARD --- */
        .card { 
            background: var(--card); 
            border-radius: 40px; 
            padding: 40px 30px; 
            width: 100%; max-width: 360px; 
            text-align: center; 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--border);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        /* Pure Clean Meter */
        .meter-box { 
            position: relative; 
            width: 200px; 
            height: 100px; 
            margin: 20px auto 40px; 
        }
        
        .gauge-svg { 
            width: 100%; height: 100%; 
            transform: rotate(-180deg);
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }
        .gauge-bg { fill: none; stroke: #111; stroke-width: 8; stroke-linecap: round; }
        .gauge-fill { 
            fill: none; stroke: var(--red); stroke-width: 10; stroke-linecap: round; 
            stroke-dasharray: 283; stroke-dashoffset: 283; 
            transition: stroke-dashoffset 2.5s cubic-bezier(0.4, 0, 0.2, 1), stroke 1s;
            filter: drop-shadow(0 0 5px var(--red));
        }

        .needle { 
            position: absolute; bottom: 0; left: calc(50% - 1.5px); 
            width: 3px; height: 85px; 
            background: #fff; border-radius: 10px; 
            transform-origin: bottom center; 
            transform: rotate(-90deg); 
            transition: transform 2.5s cubic-bezier(0.17, 0.67, 0.12, 1); 
            z-index: 10;
        }
        .needle-hub {
            position: absolute; bottom: -5px; left: 50%;
            transform: translateX(-50%);
            width: 12px; height: 12px;
            background: #000; border: 2px solid #fff; border-radius: 50%;
            z-index: 11;
        }

        /* Data moved below the meter */
        .data-label { font-size: 10px; opacity: 0.3; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .total-nodes { font-family: 'Space Grotesk'; font-size: 32px; font-weight: 800; color: #fff; margin-bottom: 25px; }

        .stats-footer { 
            display: flex; justify-content: space-between; 
            border-top: 1px solid var(--border); 
            padding-top: 20px; margin-top: 10px;
        }
        .stat-block { text-align: left; }
        .stat-block:last-child { text-align: right; }
        .stat-n { display: block; font-family: 'Space Grotesk'; font-size: 16px; font-weight: 700; color: var(--primary); }
        .stat-t { display: block; font-size: 9px; opacity: 0.4; letter-spacing: 1px; }

        .btn-back { 
            margin-top: 30px; display: inline-block; 
            color: rgba(255,255,255,0.3); text-decoration: none; 
            font-size: 11px; font-weight: 600; transition: 0.3s;
        }
        .btn-back:hover { color: var(--primary); }
    </style>
</head>
<body>

    <div class="cs-wrapper">
        <div class="cs-text" id="tiltText">COMING SOON</div>
    </div>

    <div class="card">
        <div class="meter-box">
            <svg class="gauge-svg" viewBox="0 0 200 100">
                <path class="gauge-bg" d="M 20 100 A 80 80 0 0 1 180 100" />
                <path id="gaugeFill" class="gauge-fill" d="M 20 100 A 80 80 0 0 1 180 100" />
            </svg>
            <div id="needle" class="needle"></div>
            <div class="needle-hub"></div>
        </div>

        <span class="data-label">Live Network Nodes</span>
        <div class="total-nodes" id="centerCount">0</div>

        <div class="stats-footer">
            <div class="stat-block">
                <span class="stat-n" id="neededCount">200</span>
                <span class="stat-t">REMAINING</span>
            </div>
            <div class="stat-block">
                <span class="stat-n">200</span>
                <span class="stat-t">PHASE 1 GOAL</span>
            </div>
        </div>

        <a href="dashboard.html" class="btn-back">EXIT TERMINAL</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
            authDomain: "onchyra.firebaseapp.com",
            projectId: "onchyra",
            storageBucket: "onchyra.firebasestorage.app",
            messagingSenderId: "441822770982",
            appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 3D TILT EFFECT ---
        const tiltText = document.getElementById('tiltText');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 15;
            let y = (window.innerHeight / 2 - e.pageY) / 15;
            tiltText.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // --- FIREBASE SYNC ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(collection(db, "users"), (snap) => {
                    const count = snap.size;
                    const target = 200;
                    const ratio = Math.min(count / target, 1);
                    
                    // Update Numbers
                    document.getElementById('centerCount').innerText = count;
                    document.getElementById('neededCount').innerText = Math.max(target - count, 0);
                    
                    // Needle & SVG Gauge Animation
                    const rotation = (ratio * 180) - 90;
                    document.getElementById('needle').style.transform = `rotate(${rotation}deg)`;
                    
                    const fill = document.getElementById('gaugeFill');
                    const dashOffset = 283 - (ratio * 283);
                    fill.style.strokeDashoffset = dashOffset;

                    // Dynamic Glow & Color
                    if(ratio > 0.8) { fill.style.stroke = "var(--green)"; fill.style.filter = "drop-shadow(0 0 8px var(--green))"; }
                    else if(ratio > 0.4) { fill.style.stroke = "var(--yellow)"; fill.style.filter = "drop-shadow(0 0 8px var(--yellow))"; }
                    else { fill.style.stroke = "var(--red)"; fill.style.filter = "drop-shadow(0 0 8px var(--red))"; }
                });
            } else { window.location.href = "login.html"; }
        });
    </script>
</body>
</html>
