<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #a78bfa; 
            --bg: #03040a; 
            --card: rgba(255, 255, 255, 0.04); 
            --border: rgba(255, 255, 255, 0.1);
            --red: #ff4757;
            --yellow: #f1c40f;
            --green: #00ff88;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 10%, #150d2b 0%, #03040a 70%);
            color: white; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            perspective: 1500px; /* For the 3D text */
            overflow-x: hidden;
            padding: 20px;
        }

        /* --- 3D COMING SOON (ONLY) --- */
        .cs-wrapper {
            margin-bottom: 60px;
            transform-style: preserve-3d;
            cursor: default;
        }

        .cs-text {
            font-family: 'Space Grotesk';
            font-size: clamp(35px, 9vw, 75px);
            font-weight: 800;
            letter-spacing: 10px;
            color: #fff;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            text-shadow: 0 0 15px rgba(167, 139, 250, 0.4);
        }

        /* 3D Layers */
        .cs-text::before {
            content: 'COMING SOON';
            position: absolute; inset: 0;
            transform: translateZ(-30px);
            color: rgba(255, 255, 255, 0.03);
            -webkit-text-stroke: 1px rgba(167, 139, 250, 0.2);
        }

        .cs-text::after {
            content: 'COMING SOON';
            position: absolute; inset: 0;
            transform: translateZ(-60px);
            color: rgba(255, 255, 255, 0.01);
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.05);
        }

        /* --- CLEAN FLAT CARD --- */
        .card { 
            background: var(--card); 
            border-radius: 35px; 
            padding: 35px; 
            width: 100%; max-width: 380px; 
            text-align: center; 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }

        .meter-box { position: relative; width: 220px; height: 120px; margin: 30px auto 10px; }
        
        .meter-center {
            position: absolute; bottom: 0; left: 50%;
            transform: translate(-50%, 0);
            text-align: center;
        }
        .meter-center .num { font-family: 'Space Grotesk'; font-size: 42px; font-weight: 800; color: #fff; line-height: 1; }
        .meter-center .label { font-size: 10px; letter-spacing: 3px; opacity: 0.4; text-transform: uppercase; margin-top: 5px; display: block; }

        /* The Gauge Arc */
        .gauge-svg { width: 220px; height: 110px; transform: rotate(-180deg); }
        .gauge-bg { fill: none; stroke: #1a1a1a; stroke-width: 12; stroke-linecap: round; }
        .gauge-fill { 
            fill: none; stroke: var(--red); stroke-width: 12; stroke-linecap: round; 
            stroke-dasharray: 314; stroke-dashoffset: 314; 
            transition: stroke-dashoffset 2s ease-out, stroke 1s; 
        }

        .needle { 
            position: absolute; bottom: 0; left: calc(50% - 2px); 
            width: 4px; height: 95px; 
            background: #fff; border-radius: 10px; 
            transform-origin: bottom center; 
            transform: rotate(-90deg); 
            transition: transform 2.5s cubic-bezier(0.17, 0.67, 0.12, 1); 
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            z-index: 10;
        }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .stat-card { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-label { font-size: 9px; opacity: 0.4; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .stat-val { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 700; color: var(--primary); }

        .back-btn { 
            display: inline-block; margin-top: 25px; color: var(--primary); 
            text-decoration: none; font-size: 12px; font-weight: 600; 
            letter-spacing: 1px; transition: 0.3s;
        }
        .back-btn:hover { opacity: 0.7; }
    </style>
</head>
<body>

    <div class="cs-wrapper">
        <div class="cs-text" id="tiltText">COMING SOON</div>
    </div>

    <div class="card">
        <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px; font-weight: 600;">WITHDRAWAL ENGINE</div>
        
        <div class="meter-box">
            <svg class="gauge-svg">
                <path class="gauge-bg" d="M 20 110 A 90 90 0 0 1 200 110" />
                <path id="gaugeFill" class="gauge-fill" d="M 20 110 A 90 90 0 0 1 200 110" />
            </svg>
            <div id="needle" class="needle"></div>
            <div class="meter-center">
                <span class="num" id="centerCount">0</span>
                <span class="label">Nodes</span>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <span class="stat-label">REMAINING</span>
                <span class="stat-val" id="neededCount">200</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">TARGET</span>
                <span class="stat-val">200</span>
            </div>
        </div>

        <a href="dashboard.html" class="back-btn">← BACK TO DASHBOARD</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
            authDomain: "onchyra.firebaseapp.com",
            projectId: "onchyra",
            storageBucket: "onchyra.firebasestorage.app",
            messagingSenderId: "441822770982",
            appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- 3D TILT FOR TEXT ONLY ---
        const tiltText = document.getElementById('tiltText');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 12;
            let y = (window.innerHeight / 2 - e.pageY) / 12;
            tiltText.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // --- FIREBASE LOGIC ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(collection(db, "users"), (snap) => {
                    const count = snap.size;
                    const target = 200;
                    const ratio = Math.min(count / target, 1);
                    
                    // Update Numbers
                    document.getElementById('centerCount').innerText = count;
                    document.getElementById('neededCount').innerText = Math.max(target - count, 0);
                    
                    // Needle & Gauge Animation
                    const rotation = (ratio * 180) - 90;
                    document.getElementById('needle').style.transform = `rotate(${rotation}deg)`;
                    
                    const fill = document.getElementById('gaugeFill');
                    const dashOffset = 314 - (ratio * 314);
                    fill.style.strokeDashoffset = dashOffset;

                    // Color Shift
                    if(ratio > 0.8) fill.style.stroke = "var(--green)";
                    else if(ratio > 0.4) fill.style.stroke = "var(--yellow)";
                    else fill.style.stroke = "var(--red)";
                });
            } else { window.location.href = "login.html"; }
        });
    </script>
</body>
</html>
