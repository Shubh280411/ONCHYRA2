<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #a78bfa; 
            --bg: #03040a; 
            --card: rgba(255, 255, 255, 0.02); 
            --border: rgba(255, 255, 255, 0.08);
            --red: #ff3e3e; --yellow: #f1c40f; --green: #00ff88;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); 
            background-image: radial-gradient(circle at 50% 20%, #1a123d 0%, #03040a 80%);
            color: white; min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; perspective: 1500px; padding: 20px;
        }

        /* 3D TEXT */
        .cs-wrapper { margin-bottom: 50px; transform-style: preserve-3d; }
        .cs-text {
            font-family: 'Space Grotesk'; font-size: clamp(30px, 8vw, 70px);
            font-weight: 800; letter-spacing: 12px; transform-style: preserve-3d;
            transition: transform 0.1s ease-out; text-shadow: 0 0 20px rgba(167, 139, 250, 0.3);
        }

        /* CARD */
        .card { 
            background: var(--card); border-radius: 40px; padding: 40px 30px; 
            width: 100%; max-width: 360px; text-align: center; 
            backdrop-filter: blur(25px); border: 1px solid var(--border);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        /* METER BOX */
        .meter-box { 
            position: relative; width: 220px; height: 110px; margin: 20px auto 30px; 
            display: flex; align-items: flex-end; justify-content: center;
        }
        
        /* Marking Layer */
        .markings {
            position: absolute; inset: -5px;
            border-radius: 50%;
            background: repeating-conic-gradient(
                from 270deg,
                rgba(255,255,255,0.1) 0deg 1deg,
                transparent 1deg 18deg
            );
            mask: radial-gradient(farthest-side, transparent 85%, black 86%);
            -webkit-mask: radial-gradient(farthest-side, transparent 85%, black 86%);
            clip-path: inset(0 0 50% 0); /* Meter ko sirf upper half rakhta hai */
        }

        .gauge-svg { width: 100%; height: 100%; }
        .gauge-bg { fill: none; stroke: #111; stroke-width: 10; stroke-linecap: round; }
        .gauge-fill { 
            fill: none; stroke: var(--red); stroke-width: 12; stroke-linecap: round; 
            stroke-dasharray: 251.2; stroke-dashoffset: 251.2; 
            transition: stroke-dashoffset 2s ease-out, stroke 1s;
        }

        .needle { 
            position: absolute; bottom: 0; left: calc(50% - 1.5px); 
            width: 3px; height: 90px; background: #fff; border-radius: 10px; 
            transform-origin: bottom center; transform: rotate(-90deg); 
            transition: transform 2.5s cubic-bezier(0.17, 0.67, 0.12, 1); z-index: 10;
        }
        .needle-hub {
            position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 12px; background: #000; border: 2px solid #fff; 
            border-radius: 50%; z-index: 11;
        }

        /* DATA INFO */
        .total-nodes { font-family: 'Space Grotesk'; font-size: 36px; font-weight: 800; margin-bottom: 25px; }
        .stats-footer { 
            display: flex; justify-content: space-between; border-top: 1px solid var(--border); 
            padding-top: 20px;
        }
        .stat-n { display: block; font-family: 'Space Grotesk'; font-size: 18px; font-weight: 700; color: var(--primary); }
        .stat-t { display: block; font-size: 9px; opacity: 0.4; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div class="cs-wrapper">
        <div class="cs-text" id="tiltText">COMING SOON</div>
    </div>

    <div class="card">
        <div class="meter-box">
            <div class="markings"></div>
            <svg class="gauge-svg" viewBox="0 0 200 100">
                <path class="gauge-bg" d="M 20 100 A 80 80 0 0 1 180 100" />
                <path id="gaugeFill" class="gauge-fill" d="M 20 100 A 80 80 0 0 1 180 100" />
            </svg>
            <div id="needle" class="needle"></div>
            <div class="needle-hub"></div>
        </div>

        <div style="font-size: 10px; opacity: 0.3; letter-spacing: 2px; text-transform: uppercase;">Live Nodes</div>
        <div class="total-nodes" id="centerCount">0</div>

        <div class="stats-footer">
            <div style="text-align: left;">
                <span class="stat-n" id="neededCount">200</span>
                <span class="stat-t">REMAINING</span>
            </div>
            <div style="text-align: right;">
                <span class="stat-n">200</span>
                <span class="stat-t">PHASE 2 GOAL</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
            authDomain: "onchyra.firebaseapp.com",
            projectId: "onchyra",
            storageBucket: "onchyra.firebasestorage.app",
            messagingSenderId: "441822770982",
            appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 3D TILT
        const tiltText = document.getElementById('tiltText');
        document.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 15;
            let y = (window.innerHeight / 2 - e.pageY) / 15;
            tiltText.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // DATA SYNC
        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(collection(db, "users"), (snap) => {
                    const count = snap.size;
                    const target = 200;
                    const ratio = Math.min(count / target, 1);
                    
                    document.getElementById('centerCount').innerText = count;
                    document.getElementById('neededCount').innerText = Math.max(target - count, 0);
                    
                    // Needle Rotate (-90 to +90)
                    const rotation = (ratio * 180) - 90;
                    document.getElementById('needle').style.transform = `rotate(${rotation}deg)`;
                    
                    // Fill Arc (251.2 is the length of path)
                    const fill = document.getElementById('gaugeFill');
                    fill.style.strokeDashoffset = 251.2 - (ratio * 251.2);

                    if(ratio > 0.8) fill.style.stroke = "var(--green)";
                    else if(ratio > 0.4) fill.style.stroke = "var(--yellow)";
                    else fill.style.stroke = "var(--red)";
                });
            } else { window.location.href = "login.html"; }
        });
    </script>
</body>
</html>
