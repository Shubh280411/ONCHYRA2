<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #03040a;
            perspective: 1000px; /* 3D Depth ke liye */
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }

        .container {
            transform-style: preserve-3d;
            padding: 50px;
        }

        .coming-soon-3d {
            position: relative;
            font-size: 80px; /* Bada size */
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            
            /* Neon Glow */
            text-shadow: 
                0 0 10px rgba(167, 139, 250, 0.8),
                0 0 20px rgba(167, 139, 250, 0.4);
        }

        /* Peeche ki layer (Depth effect) */
        .coming-soon-3d::before {
            content: 'COMING SOON';
            position: absolute;
            top: 0;
            left: 0;
            transform: translateZ(-30px); /* 30px peeche */
            color: rgba(167, 139, 250, 0.2);
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.1);
            z-index: -1;
        }

        /* Ek aur layer layer (Extra depth) */
        .coming-soon-3d::after {
            content: 'COMING SOON';
            position: absolute;
            top: 0;
            left: 0;
            transform: translateZ(-60px); /* 60px peeche */
            color: rgba(255, 71, 87, 0.1);
            z-index: -2;
        }

        .glow-line {
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, transparent, #a78bfa, transparent);
            transform: translateZ(20px);
            box-shadow: 0 0 20px #a78bfa;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="coming-soon-3d" id="tiltElement">
            COMING SOON
            <div class="glow-line"></div>
        </div>
    </div>

    <script>
        const el = document.getElementById('tiltElement');
        const container = document.body;

        container.addEventListener('mousemove', (e) => {
            // Mouse ki position ke hisaab se angle calculate karna
            let x = (window.innerWidth / 2 - e.pageX) / 10;
            let y = (window.innerHeight / 2 - e.pageY) / 10;

            // Reverse tilt for natural feel
            el.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
        });

        // Reset position jab mouse move na ho
        container.addEventListener('mouseleave', () => {
            el.style.transform = `rotateY(0deg) rotateX(0deg)`;
            el.style.transition = "transform 0.5s ease";
        });

        container.addEventListener('mouseenter', () => {
            el.style.transition = "none";
        });
    </script>
</body>
</html>
