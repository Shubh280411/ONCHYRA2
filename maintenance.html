<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONCHYRA — Maintenance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#a78bfa; --secondary:#60a5fa; --bg:#03040a; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.1); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:white; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
        .card { background:rgba(255,255,255,0.03); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:32px; padding:48px 32px; max-width:420px; width:100%; text-align:center; }
        .logo-img { width:64px; height:64px; border-radius:50%; margin:0 auto 16px; display:block; object-fit:cover; }
        .logo { font-family:'Space Grotesk'; font-weight:900; font-size:28px; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px; letter-spacing:4px; }
        h1 { font-size:20px; font-weight:800; margin:16px 0 8px; }
        p { font-size:13px; color:rgba(255,255,255,0.5); line-height:1.6; margin-bottom:24px; }
        .status { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; background:rgba(239,68,68,0.1); color:#ef4444; padding:6px 14px; border-radius:100px; border:1px solid rgba(239,68,68,0.15); }
        .dot { width:6px; height:6px; background:#ef4444; border-radius:50%; animation:pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        .countdown { margin-top:16px; display:none; }
        .cd-row { display:flex; justify-content:center; gap:12px; }
        .cd-unit { min-width:48px; }
        .cd-num { font-family:'Space Grotesk'; font-size:28px; font-weight:900; color:var(--primary); line-height:1; }
        .cd-label { font-size:8px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,0.2); margin-top:2px; }
        .done-msg { display:none; font-size:14px; font-weight:700; color:#22c55e; margin-top:16px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://onchyra.netlify.app/logo.png" alt="ONCHYRA" class="logo-img" onerror="this.style.display='none'">
        <div class="logo">ONCHYRA</div>
        <h1>Under Maintenance</h1>
        <p id="maintenanceMsg">We're currently performing scheduled maintenance to improve your experience. Please check back shortly.</p>
        <div class="status"><span class="dot"></span> Maintenance in progress</div>
        <div class="countdown" id="countdownWrap">
            <div class="cd-row">
                <div class="cd-unit"><div class="cd-num" id="cdDays">00</div><div class="cd-label">Days</div></div>
                <div class="cd-unit"><div class="cd-num" id="cdHours">00</div><div class="cd-label">Hrs</div></div>
                <div class="cd-unit"><div class="cd-num" id="cdMins">00</div><div class="cd-label">Min</div></div>
                <div class="cd-unit"><div class="cd-num" id="cdSecs">00</div><div class="cd-label">Sec</div></div>
            </div>
        </div>
        <div class="done-msg" id="doneMsg">Maintenance complete! Please check back later.</div>
    </div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({ apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI", authDomain: "onchyra.firebaseapp.com", projectId: "onchyra" });
const db = getFirestore(app);

let endTime = null;

function toMillis(ts) {
  if (!ts) return 0;
  if (typeof ts === 'object' && ts.toMillis) return ts.toMillis();
  if (typeof ts === 'number') return ts;
  return Date.parse(ts) || 0;
}

async function loadMaint() {
    try {
        const snap = await getDoc(doc(db, 'settings', 'maintenance'));
        if (snap.exists()) {
            const d = snap.data();
            if (d.message) document.getElementById('maintenanceMsg').textContent = d.message;
            const startedAt = toMillis(d.startedAt);
            const durationMs = (d.durationHours || 2) * 3600000;
            if (startedAt > 0) {
                endTime = startedAt + durationMs;
                const now = Date.now();
                if (endTime > now) {
                    document.getElementById('countdownWrap').style.display = 'block';
                    tick();
                } else {
                    document.getElementById('countdownWrap').style.display = 'none';
                    document.getElementById('doneMsg').style.display = 'block';
                }
            }
        }
    } catch(e) {}
}

function tick() {
    if (!endTime) return;
    const diff = endTime - Date.now();
    if (diff <= 0) {
        document.getElementById('countdownWrap').style.display = 'none';
        document.getElementById('doneMsg').style.display = 'block';
        return;
    }
    document.getElementById('cdDays').textContent = String(Math.floor(diff/86400000)).padStart(2,'0');
    document.getElementById('cdHours').textContent = String(Math.floor((diff%86400000)/3600000)).padStart(2,'0');
    document.getElementById('cdMins').textContent = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
    document.getElementById('cdSecs').textContent = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
}

loadMaint();
setInterval(tick, 1000);
</script>
</body>
</html>
