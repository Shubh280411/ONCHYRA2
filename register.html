<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — ONCHYRA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#070816;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  width:360px;
  padding:40px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  text-align:center;
}
h1{
  font-family:'Manrope';
  margin-bottom:20px;
  background:linear-gradient(90deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}
button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
  color:#0b0b20;
  font-weight:700;
  cursor:pointer;
}
button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}
</style>
</head>

<body>

<div class="card">
  <h1>ONCHYRA</h1>
  <input id="name" placeholder="Full Name">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="referral" placeholder="Referral Code (Optional)">
  <button id="regBtn" onclick="registerUser()">Create Account</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, query, where, getDocs, updateDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
  authDomain: "onchyra.firebaseapp.com",
  projectId: "onchyra",
  storageBucket: "onchyra.firebasestorage.app",
  messagingSenderId: "441822770982",
  appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let deviceId = localStorage.getItem("onc_device") || crypto.randomUUID();
localStorage.setItem("onc_device", deviceId);

// 🔥 AUTO REF FROM LINK
window.addEventListener("DOMContentLoaded", () => {
  const ref = new URLSearchParams(window.location.search).get("ref");
  if(ref){
    document.getElementById("referral").value = ref.toUpperCase();
  }
});

window.registerUser = async function(){

  const btn = document.getElementById("regBtn");

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const referralInput = document.getElementById("referral").value.trim().toUpperCase();

  if(!name || !email || !password){
    alert("Fill all fields");
    return;
  }

  // 🔒 prevent double click
  btn.disabled = true;
  btn.innerText = "Creating...";

  try {

    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;

    const myRefCode = Math.random().toString(36).substring(2,8).toUpperCase();

    let finalReferredBy = null;

    // 🔥 CREATE USER FIRST (IMPORTANT)
    await setDoc(doc(db,"users",uid),{
      name,email,uid,
      deviceId,
      balance:0,
      referralCode:myRefCode,
      referredBy: referralInput || null,
      referrals:0,
      refLevel1:0,
      refLevel2:0,
      refLevel3:0,
      createdAt: serverTimestamp()
    });

    // 🔥 REFERRAL SYSTEM
    if(referralInput){

      const q1 = query(collection(db,"users"), where("referralCode","==",referralInput));
      const snap1 = await getDocs(q1);

      if(!snap1.empty){

        const l1Doc = snap1.docs[0];
        const l1Data = l1Doc.data();

        finalReferredBy = referralInput;

        // L1
        await updateDoc(doc(db,"users",l1Doc.id),{
          balance: increment(0.25),
          referrals: increment(1),
          refLevel1: increment(1)
        });

        // L2
        if(l1Data.referredBy){
          const q2 = query(collection(db,"users"), where("referralCode","==",l1Data.referredBy));
          const snap2 = await getDocs(q2);

          if(!snap2.empty){
            const l2Doc = snap2.docs[0];
            const l2Data = l2Doc.data();

            await updateDoc(doc(db,"users",l2Doc.id),{
              balance: increment(0.10),
              refLevel2: increment(1)
            });

            // L3
            if(l2Data.referredBy){
              const q3 = query(collection(db,"users"), where("referralCode","==",l2Data.referredBy));
              const snap3 = await getDocs(q3);

              if(!snap3.empty){
                await updateDoc(doc(db,"users",snap3.docs[0].id),{
                  balance: increment(0.05),
                  refLevel3: increment(1)
                });
              }
            }
          }
        }
      }
    }

    alert("Registration Successful 🚀");
    window.location.href="dashboard.html";

  } catch(e){
    alert(e.message);
    btn.disabled = false;
    btn.innerText = "Create Account";
  }
}
</script>

</body>
</html>
