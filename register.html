<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — ONCHYRA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#070816;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}
.card{
  width:380px;
  padding:40px 36px;
  border-radius:24px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
  backdrop-filter:blur(20px);
}
h1{
  font-family:'Manrope';
  font-size:28px;
  margin-bottom:4px;
  background:linear-gradient(90deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.sub{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:24px;letter-spacing:1px;}
.input-wrap{
  position:relative;
  margin-top:14px;
}
.input-wrap input{
  width:100%;
  padding:16px 18px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.05);
  color:white;
  font-size:14px;
  outline:none;
  transition:0.25s;
}
.input-wrap input:focus{
  border-color:rgba(167,139,250,0.4);
  background:rgba(255,255,255,0.07);
}
.input-wrap input::placeholder{color:rgba(255,255,255,0.25);}
.pass-toggle{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:rgba(255,255,255,0.3);
  cursor:pointer;
  padding:4px;
  display:flex;
  transition:0.2s;
}
.pass-toggle:hover{color:rgba(255,255,255,0.6);}
button[type="submit"]{
  width:100%;
  margin-top:22px;
  padding:16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
  color:#0b0b20;
  font-weight:800;
  font-size:14px;
  cursor:pointer;
  transition:0.25s;
}
button[type="submit"]:hover{opacity:0.9;transform:translateY(-1px);}
button[type="submit"]:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.login-link{
  display:block;
  margin-top:20px;
  font-size:13px;
  color:rgba(255,255,255,0.35);
  text-decoration:none;
  transition:0.2s;
}
.login-link:hover{color:var(--primary);}
.login-link span{color:#a78bfa;font-weight:600;}
</style>
</head>

<body>

<div class="card">
  <h1>ONCHYRA</h1>
  <div class="sub">CREATE YOUR MINING ACCOUNT</div>

  <div class="input-wrap">
    <input type="text" id="name" placeholder="Full Name" autocomplete="name">
  </div>
  
  <div class="input-wrap">
    <input type="email" id="email" placeholder="Email" autocomplete="email">
  </div>
  
  <div class="input-wrap">
    <input type="password" id="password" placeholder="Password" autocomplete="new-password">
    <button class="pass-toggle" id="passToggle" type="button" onclick="togglePass()" tabindex="-1">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path id="eyeIcon" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle id="eyeDot" cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>
  
  <div class="input-wrap">
    <input type="text" id="referral" placeholder="Referral Code (Optional)" autocomplete="off">
  </div>

  <button type="submit" id="regBtn" onclick="registerUser()">Create Account</button>
  
  <a href="login.html" class="login-link">Already have an account? <span>Sign In</span></a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { doc, setDoc, collection, query, where, getDocs, updateDoc, serverTimestamp, increment, initializeFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
  authDomain: "onchyra.firebaseapp.com",
  projectId: "onchyra",
  storageBucket: "onchyra.firebasestorage.app",
  messagingSenderId: "441822770982",
  appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = initializeFirestore(app, { experimentalForceLongPolling: true });

let deviceId = localStorage.getItem("onc_device") || crypto.randomUUID();
localStorage.setItem("onc_device", deviceId);

// Auto-fill referral from URL
window.addEventListener("DOMContentLoaded", () => {
  const ref = new URLSearchParams(window.location.search).get("ref");
  if(ref) document.getElementById("referral").value = ref.toUpperCase();
});

window.togglePass = () => {
  const p = document.getElementById("password");
  const icon = document.getElementById("eyeIcon");
  const dot = document.getElementById("eyeDot");
  if (p.type === "password") {
    p.type = "text";
    icon.setAttribute("d", "M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24");
    dot.style.display = "none";
  } else {
    p.type = "password";
    icon.setAttribute("d", "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z");
    dot.style.display = "";
  }
};

window.registerUser = async function() {
  const btn = document.getElementById("regBtn");
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const referralInput = document.getElementById("referral").value.trim().toUpperCase();

  if(!name || !email || !password){
    alert("Fill all fields");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Creating...";

  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;
    const myRefCode = Math.random().toString(36).substring(2,8).toUpperCase();

    await setDoc(doc(db,"users",uid),{
      name,email,uid,deviceId,
      balance:0,
      referralCode:myRefCode,
      referredBy: referralInput || null,
      referrals:0,
      refLevel1:0,
      refLevel2:0,
      refLevel3:0,
      streak:0, lastClaim:0,
      createdAt: serverTimestamp()
    });

    if(referralInput){
      const q1 = query(collection(db,"users"), where("referralCode","==",referralInput));
      const snap1 = await getDocs(q1);

      if(!snap1.empty){
        const l1Doc = snap1.docs[0];
        const l1Data = l1Doc.data();

        await updateDoc(doc(db,"users",l1Doc.id),{
          balance: increment(0.25),
          referrals: increment(1),
          refLevel1: increment(1)
        });

        if(l1Data.referredBy){
          const q2 = query(collection(db,"users"), where("referralCode","==",l1Data.referredBy));
          const snap2 = await getDocs(q2);

          if(!snap2.empty){
            const l2Doc = snap2.docs[0];
            const l2Data = l2Doc.data();

            await updateDoc(doc(db,"users",l2Doc.id),{
              balance: increment(0.10),
              refLevel2: increment(1)
            });

            if(l2Data.referredBy){
              const q3 = query(collection(db,"users"), where("referralCode","==",l2Data.referredBy));
              const snap3 = await getDocs(q3);

              if(!snap3.empty){
                await updateDoc(doc(db,"users",snap3.docs[0].id),{
                  balance: increment(0.05),
                  refLevel3: increment(1)
                });
              }
            }
          }
        }
      }
    }

    alert("Registration Successful 🚀");
    window.location.href="dashboard.html";

  } catch(e){
    alert(e.message);
    btn.disabled = false;
    btn.innerText = "Create Account";
  }
}
</script>

</body>
</html>
