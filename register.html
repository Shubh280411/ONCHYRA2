<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — ONCHYRA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:#070816;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  width:360px;
  padding:40px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  text-align:center;
}
h1{
  font-family:'Manrope';
  margin-bottom:20px;
  background:linear-gradient(90deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
}
button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
  color:#0b0b20;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <h1>ONCHYRA</h1>
  <input id="name" placeholder="Full Name">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="referral" placeholder="Referral Code (Optional)">
  <button onclick="registerUser()">Create Account</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, query, where, getDocs, updateDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"YOUR_KEY",
  authDomain:"onchyra.firebaseapp.com",
  projectId:"onchyra"
});

const auth = getAuth(app);
const db = getFirestore(app);

let deviceId = localStorage.getItem("onc_device") || crypto.randomUUID();
localStorage.setItem("onc_device", deviceId);

window.registerUser = async function(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const referralInput = document.getElementById("referral").value.trim().toUpperCase();

  try {

    // CREATE USER
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;

    const myRefCode = Math.random().toString(36).substring(2,8).toUpperCase();

    // CREATE USER DOC FIRST
    await setDoc(doc(db,"users",uid),{
      name,email,uid,
      deviceId,
      balance:0,
      referralCode:myRefCode,
      referredBy: referralInput || null,
      referrals:0,
      refLevel1:0,
      refLevel2:0,
      refLevel3:0,
      createdAt: serverTimestamp()
    });

    // REFERRAL REWARD
    if(referralInput){
      const q = query(collection(db,"users"), where("referralCode","==",referralInput));
      const snap = await getDocs(q);

      if(!snap.empty){
        const refUser = snap.docs[0];
        await updateDoc(doc(db,"users",refUser.id),{
          balance: increment(0.25),
          referrals: increment(1)
        });
      }
    }

    alert("Account Created 🚀");
    window.location.href="dashboard.html";

  } catch(e){
    alert(e.message);
  }
}
</script>

</body>
</html>
