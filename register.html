<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — ONCHYRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Inter',sans-serif;
            background:#070816;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        body::before {
            content:"";
            position:fixed;
            inset:0;
            background: radial-gradient(circle at 20% 30%, #6d28d9aa, transparent 40%), radial-gradient(circle at 80% 70%, #2563ebaa, transparent 40%);
            z-index:-1;
        }
        .card {
            width:360px;
            padding:40px;
            border-radius:18px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.1);
            text-align:center;
        }
        h1 {
            font-family:'Manrope';
            margin-bottom:20px;
            background:linear-gradient(90deg,#a78bfa,#60a5fa);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        input {
            width:100%;
            padding:14px;
            margin-top:12px;
            border-radius:10px;
            border:none;
            background:rgba(255,255,255,0.08);
            color:white;
            outline: none;
        }
        button {
            width:100%;
            margin-top:18px;
            padding:14px;
            border:none;
            border-radius:12px;
            background:linear-gradient(135deg,#a78bfa,#60a5fa);
            color:#0b0b20;
            font-weight:700;
            cursor:pointer;
            transition: 0.3s;
        }
        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }
        .link { margin-top:14px; font-size:0.9rem; opacity:0.85; }
        .link a { color:#a78bfa; text-decoration:none; cursor:pointer; }
    </style>
</head>
<body>

<div class="card">
    <h1>ONCHYRA</h1>
    <input id="name" placeholder="Full Name">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="referral" placeholder="Referral Code (Optional)">
    <button id="regBtn" onclick="registerUser()">Create Account</button>
    <div class="link">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, query, where, getDocs, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
        authDomain: "onchyra.firebaseapp.com",
        projectId: "onchyra",
        storageBucket: "onchyra.firebasestorage.app",
        messagingSenderId: "441822770982",
        appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref');
        if (refCode) {
            document.getElementById('referral').value = refCode.toUpperCase();
        }
    });

    let deviceId = localStorage.getItem("onc_device") || crypto.randomUUID();
    localStorage.setItem("onc_device", deviceId);

    window.registerUser = async function(){
        const btn = document.getElementById("regBtn");
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const referral = document.getElementById("referral").value.trim();

        if(!name || !email || !password){
            alert("Please fill all fields!");
            return;
        }

        // 1. Disable Button Immediately
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            /* 2. DEVICE CHECK (ANTI-CHEAT) */
            const deviceQuery = query(collection(db,"users"), where("deviceId","==",deviceId));
            const deviceSnap = await getDocs(deviceQuery);
            if(deviceSnap.size >= 3){
                throw new Error("Device limit reached (Max: 3 accounts)");
            }

            /* 3. CREATE AUTH */
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            const uid = userCred.user.uid;
            const myRefCode = Math.random().toString(36).substring(2,8).toUpperCase();
            let referredBy = null;

            /* 4. REFERRAL SYSTEM */
            if(referral){
                const q = query(collection(db,"users"), where("referralCode","==",referral));
                const snap = await getDocs(q);
                if(!snap.empty){
                    const l1Doc = snap.docs[0];
                    const l1Data = l1Doc.data();
                    
                    // Update Level 1
                    await updateDoc(doc(db,"users",l1Doc.id), {
                        referrals: (l1Data.referrals||0)+1,
                        refLevel1: (l1Data.refLevel1||0)+1
                    });

                    // Level 2 Logic (Optional Chain)
                    if(l1Data.referredBy){
                        const q2 = query(collection(db,"users"), where("referralCode","==",l1Data.referredBy));
                        const snap2 = await getDocs(q2);
                        if(!snap2.empty) {
                            await updateDoc(doc(db,"users",snap2.docs[0].id), {
                                refLevel2: (snap2.docs[0].data().refLevel2||0)+1
                            });
                        }
                    }
                    referredBy = referral;
                }
            }

            /* 5. CREATE SINGLE DOC (FIXED) */
            // Using 'uid' as the document name ensures NO DUPLICATES
            await setDoc(doc(db,"users",uid), {
                name, email, uid, balance:0, deviceId, 
                banned:false, referrals:0, refLevel1:0, 
                refLevel2:0, refLevel3:0, referralCode: myRefCode,
                referredBy, totalClaimed:0, lastClaim:0, 
                createdAt: serverTimestamp()
            });

            alert("Registration Successful!");
            window.location.href="dashboard.html";

        } catch(err) {
            alert(err.message);
            btn.disabled = false;
            btn.innerText = "Create Account";
        }
    }
</script>

</body>
</html>
