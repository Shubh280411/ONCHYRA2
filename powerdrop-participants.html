<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ONCHYRA PowerDrop Participants</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#070816;
color:white;
padding:30px;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 30%, #6d28d9aa, transparent 40%),
radial-gradient(circle at 80% 70%, #2563ebaa, transparent 40%);
z-index:-1;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
font-family:'Manrope';
margin-bottom:20px;
background:linear-gradient(90deg,#a78bfa,#60a5fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
margin-bottom:20px;
}

select{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.08);
color:white;
margin-top:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#a78bfa,#60a5fa);
color:#070816;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
border-bottom:1px solid rgba(255,255,255,0.1);
text-align:left;
}

th{
opacity:0.7;
}

.small{
font-size:13px;
opacity:0.8;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>PowerDrop Participants</h1>

<div class="card">

<div class="small">Select PowerDrop Event</div>

<select id="eventSelect"></select>

<div class="row">

<button onclick="pickWinners()">Pick Winners</button>

<button onclick="exportCSV()">Export Winners CSV</button>

</div>

</div>

<div class="card">

<h3>Participants</h3>

<table>

<thead>
<tr>
<th>UID</th>
<th>USDT Address</th>
<th>Joined</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="card">

<h3>Selected Winners</h3>

<table>

<thead>
<tr>
<th>UID</th>
<th>USDT Address</th>
</tr>
</thead>

<tbody id="winnerTable"></tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
authDomain: "onchyra.firebaseapp.com",
projectId: "onchyra",
storageBucket: "onchyra.firebasestorage.app",
messagingSenderId: "441822770982",
appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const eventSelect=document.getElementById("eventSelect");
const tableBody=document.getElementById("tableBody");
const winnerTable=document.getElementById("winnerTable");

let participants=[];
let winners=[];

/* ADMIN LOGIN CHECK */

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location="admin-login.html";

}

});

/* LOAD POWERDROPS */

async function loadEvents(){

const snap=await getDocs(collection(db,"powerdrops"));

snap.forEach(doc=>{

const data=doc.data();

const option=document.createElement("option");

option.value=doc.id;
option.textContent=data.title;

eventSelect.appendChild(option);

});

loadParticipants(eventSelect.value);

}

loadEvents();

/* EVENT CHANGE */

eventSelect.addEventListener("change",()=>{

loadParticipants(eventSelect.value);

});

/* LOAD PARTICIPANTS */

async function loadParticipants(eventId){

participants=[];

tableBody.innerHTML="";

const ref=collection(db,"powerdrops",eventId,"participants");

const snap=await getDocs(ref);

snap.forEach(doc=>{

const d=doc.data();

participants.push(d);

tableBody.innerHTML+=`

<tr>

<td>${d.uid}</td>

<td>${d.address}</td>

<td>${new Date(d.joinedAt.seconds*1000).toLocaleString()}</td>

</tr>

`;

});

}

/* PICK RANDOM WINNERS */

window.pickWinners = ()=>{

const winnersCount = prompt("Enter number of winners");

if(!winnersCount) return;

winners=[];

let shuffled=[...participants].sort(()=>0.5-Math.random());

winners=shuffled.slice(0,winnersCount);

winnerTable.innerHTML="";

winners.forEach(w=>{

winnerTable.innerHTML+=`

<tr>

<td>${w.uid}</td>

<td>${w.address}</td>

</tr>

`;

});

}

/* EXPORT CSV */

window.exportCSV = ()=>{

if(winners.length===0){

alert("Pick winners first");

return;

}

let csv="UID,Address\n";

winners.forEach(w=>{

csv+=`${w.uid},${w.address}\n`;

});

const blob=new Blob([csv],{type:"text/csv"});

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;

a.download="powerdrop-winners.csv";

a.click();

}

</script>

</body>
</html>
