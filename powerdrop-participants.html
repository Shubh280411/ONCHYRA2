<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONCHYRA | PowerDrop Admin</title>
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap)" rel="stylesheet">
    <style>
        :root {
            --accent: #7C3AED;
            --accent-glow: rgba(124, 58, 237, 0.5);
            --bg: #03040B;
            --card: rgba(15, 17, 26, 0.7);
            --text: #F8FAFC;
            --muted: #94A3B8;
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b, transparent);
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-weight: 800; font-size: 20px; letter-spacing: -1px; background: linear-gradient(to right, #A78BFA, #60A5FA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .stat-group { display: flex; gap: 30px; }
        .stat-item { text-align: center; }
        .stat-item span { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-item b { font-size: 20px; color: #fff; }

        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 25px;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { font-size: 18px; margin-top: 0; display: flex; align-items: center; gap: 10px; color: #A78BFA; }

        .controls {
            grid-column: 1 / -1;
            display: flex;
            gap: 20px;
            align-items: flex-end;
            margin-bottom: 10px;
        }

        .input-group { flex: 1; }
        label { font-size: 12px; color: var(--muted); margin-bottom: 8px; display: block; }
        select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 12px;
            color: #fff;
            outline: none;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
        .btn-pick { background: var(--accent); color: white; box-shadow: 0 0 20px var(--accent-glow); }
        .btn-export { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .table-container { height: 500px; overflow-y: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 10px; font-size: 11px; color: var(--muted); text-transform: uppercase; }
        td { padding: 15px 10px; background: rgba(255,255,255,0.02); }
        td:first-child { border-radius: 12px 0 0 12px; font-weight: 600; color: #fff; }
        td:last-child { border-radius: 0 12px 12px 0; font-family: monospace; color: var(--muted); font-size: 12px; }

        .winner-row td { background: rgba(124, 58, 237, 0.1) !important; border: 1px solid rgba(124, 58, 237, 0.2); }

        /* Address styling - truncate with ellipsis */
        .address-cell {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="logo">ONCHYRA ADMIN</div>
    <div class="stat-group">
        <div class="stat-item">
            <span>Live Participants</span>
            <b id="countTotal">0</b>
        </div>
        <div class="stat-item">
            <span>Target Winners</span>
            <b id="countWinners">0</b>
        </div>
    </div>
</div>

<div class="main-container">
    
    <div class="card controls">
        <div class="input-group">
            <label>Select Event</label>
            <select id="eventSelect">
                <option value="">-- Select an Event --</option>
            </select>
        </div>
        <button class="btn btn-pick" onclick="pickWinners()">✨ Pick Winners</button>
        <button class="btn btn-export" onclick="exportCSV()">📤 Export CSV</button>
    </div>

    <div class="card">
        <h2>👥 Participants List</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>User Name</th><th>Wallet Address</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="2" style="text-align: center; color: var(--muted);">Select an event to load participants</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card">
        <h2>🏆 Selected Winners</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Name</th><th>Wallet Address</th></tr>
                </thead>
                <tbody id="winnerTable">
                    <tr><td colspan="2" style="text-align: center; color: var(--muted);">No winners selected yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script type="module">
    import { initializeApp } from "[gstatic.com](https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js)";
    import { getFirestore, collection, getDocs, doc, getDoc } from "[gstatic.com](https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js)";
    import { getAuth, onAuthStateChanged } from "[gstatic.com](https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js)";

    const firebaseConfig = {
        apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
        authDomain: "onchyra.firebaseapp.com",
        projectId: "onchyra",
        storageBucket: "onchyra.firebasestorage.app",
        messagingSenderId: "441822770982",
        appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const eventSelect = document.getElementById("eventSelect");
    const tableBody = document.getElementById("tableBody");
    const winnerTable = document.getElementById("winnerTable");
    const countTotal = document.getElementById("countTotal");

    let participants = [];
    let winners = [];

    onAuthStateChanged(auth, user => { 
        if(!user) window.location = "admin-login.html"; 
    });

    async function loadEvents() {
        try {
            const snap = await getDocs(collection(db, "powerdrops"));
            snap.forEach(docSnap => {
                const opt = document.createElement("option");
                opt.value = docSnap.id;
                opt.textContent = docSnap.data().title;
                eventSelect.appendChild(opt);
            });
        } catch (error) {
            console.error("Error loading events:", error);
            tableBody.innerHTML = `<tr><td colspan="2" style="color: #ef4444;">Error loading events. Check console.</td></tr>`;
        }
    }
    loadEvents();

    eventSelect.addEventListener("change", () => {
        const eventId = eventSelect.value;
        if (eventId) {
            loadParticipants(eventId);
        } else {
            tableBody.innerHTML = `<tr><td colspan="2" style="text-align: center; color: var(--muted);">Select an event to load participants</td></tr>`;
            countTotal.innerText = "0";
            participants = [];
        }
    });

    async function loadParticipants(eventId) {
        participants = [];
        tableBody.innerHTML = `<tr><td colspan="2" style="text-align: center;">⏳ Syncing data...</td></tr>`;
        
        try {
            const snap = await getDocs(collection(db, "powerdrops", eventId, "participants"));
            countTotal.innerText = snap.size;

            if (snap.empty) {
                tableBody.innerHTML = `<tr><td colspan="2" style="text-align: center; color: var(--muted);">No participants yet</td></tr>`;
                return;
            }

            // Fetch all user names in parallel for better performance
            const participantPromises = snap.docs.map(async (d) => {
                const data = d.data();
                let name = "Miner #" + (data.uid ? data.uid.slice(0, 4) : "????");
                
                try {
                    if (data.uid) {
                        const uSnap = await getDoc(doc(db, "users", data.uid));
                        if (uSnap.exists() && uSnap.data().name) {
                            name = uSnap.data().name;
                        }
                    }
                } catch (err) {
                    console.warn("Could not fetch user name for uid:", data.uid);
                }

                return { 
                    name: name, 
                    address: data.address || "No address provided"
                };
            });

            // Wait for all user fetches to complete
            participants = await Promise.all(participantPromises);

            // Render the table
            let html = "";
            for (const p of participants) {
                html += `
                    <tr>
                        <td>${escapeHtml(p.name)}</td>
                        <td class="address-cell" title="${escapeHtml(p.address)}">${escapeHtml(p.address)}</td>
                    </tr>
                `;
            }
            tableBody.innerHTML = html;

        } catch (error) {
            console.error("Error loading participants:", error);
            tableBody.innerHTML = `<tr><td colspan="2" style="color: #ef4444;">Error loading participants: ${error.message}</td></tr>`;
        }
    }

    // Helper function to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    window.pickWinners = () => {
        if (participants.length === 0) {
            alert("No participants loaded! Please select an event first.");
            return;
        }

        const num = prompt(`Enter number of winners (max ${participants.length}):`);
        if (!num) return;

        const numWinners = parseInt(num);
        if (isNaN(numWinners) || numWinners < 1) {
            alert("Please enter a valid number.");
            return;
        }

        if (numWinners > participants.length) {
            alert(`Cannot pick ${numWinners} winners from ${participants.length} participants.`);
            return;
        }

        document.getElementById("countWinners").innerText = numWinners;
        
        // Fisher-Yates shuffle for better randomness
        const shuffled = [...participants];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        winners = shuffled.slice(0, numWinners);
        
        winnerTable.innerHTML = winners.map(w => `
            <tr class="winner-row">
                <td>${escapeHtml(w.name)}</td>
                <td class="address-cell" title="${escapeHtml(w.address)}">${escapeHtml(w.address)}</td>
            </tr>
        `).join("");
    };

    window.exportCSV = () => {
        if (!winners.length) {
            alert("Pick winners first!");
            return;
        }
        
        // Properly escape CSV values
        const escapeCSV = (val) => `"${String(val).replace(/"/g, '""')}"`;
        let csv = "Name,Wallet Address\n" + winners.map(w => `${escapeCSV(w.name)},${escapeCSV(w.address)}`).join("\n");
        
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "onchyra_winners.csv";
        a.click();
    };

    // Make escapeHtml available globally for the inline event handlers
    window.escapeHtml = escapeHtml;
</script>
</body>
</html>
