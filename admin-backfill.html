<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Admin Backfill — ONCHYRA</title>
    <style>
        body { font-family: sans-serif; background: #070816; color: white; text-align: center; padding-top: 50px; }
        .box { background: #111; border: 1px solid #333; padding: 20px; width: 350px; margin: auto; border-radius: 15px; }
        #status { text-align: left; height: 150px; overflow-y: auto; background: #000; padding: 10px; margin: 10px 0; font-size: 12px; }
        button { background: #a78bfa; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Admin Backfill</h3>
        <div id="status">Ready to scan...</div>
        <button id="runBtn" onclick="run()">Process 52 Users</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, query, where, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLAekP6DO0oKQQzD7USkiyCm0M3BFoyYI",
        authDomain: "onchyra.firebaseapp.com",
        projectId: "onchyra",
        storageBucket: "onchyra.firebasestorage.app",
        messagingSenderId: "441822770982",
        appId: "1:441822770982:web:f22f6b95fd5148ce21b3e7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.run = async function() {
        const log = (m) => document.getElementById("status").innerHTML += `<div>> ${m}</div>`;
        document.getElementById("runBtn").disabled = true;
        log("Fetching all users...");

        const snap = await getDocs(collection(db, "users"));
        let count = 0;

        for (const userDoc of snap.docs) {
            const data = userDoc.data();
            if (data.rewardProcessed === true) continue;

            if (data.referredBy) {
                log(`Processing rewards for referral by: ${data.email}`);
                const q1 = query(collection(db, "users"), where("referralCode", "==", data.referredBy));
                const s1 = await getDocs(q1);
                if (!s1.empty) {
                    await updateDoc(doc(db, "users", s1.docs[0].id), { balance: increment(0.25), refLevel1: increment(1) });
                    
                    const l1Data = s1.docs[0].data();
                    if (l1Data.referredBy) {
                        const q2 = query(collection(db, "users"), where("referralCode", "==", l1Data.referredBy));
                        const s2 = await getDocs(q2);
                        if (!s2.empty) {
                            await updateDoc(doc(db, "users", s2.docs[0].id), { balance: increment(0.10), refLevel2: increment(1) });
                            
                            const l2Data = s2.docs[0].data();
                            if (l2Data.referredBy) {
                                const q3 = query(collection(db, "users"), where("referralCode", "==", l2Data.referredBy));
                                const s3 = await getDocs(q3);
                                if (!s3.empty) await updateDoc(doc(db, "users", s3.docs[0].id), { balance: increment(0.05), refLevel3: increment(1) });
                            }
                        }
                    }
                }
            }
            await updateDoc(doc(db, "users", userDoc.id), { rewardProcessed: true });
            count++;
        }
        log(`Done! ${count} users updated.`);
        alert("All users processed!");
    }
</script>
</body>
</html>
